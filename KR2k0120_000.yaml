body:
  text: 御製題増補武林舊事補因廷煥朱原周密舊事武林想像間正向金朝稱姪際那仍豪興賞湖山都人士女走如狂天子真稱孝夀皇便是北方有歸櫬安能五國解凄凉朝歌暮舞勝都京水秀山明凑雅情繪出承平真氣象爾時豈果是承平欽定四庫全書史部十一增補武林舊事目錄地理類八雜記之屬巻一慶夀冊寶大禮南郊明堂登門肆赦恭謝聖節卷二睿藻増御教御教儀衛次第燕射公主下降恩澤增唱名元正立春元夕舞隊燈品挑菜進茶賞花巻三西湖逰幸都人逰賞放春社㑹祭掃浴佛迎新端午禁中納凉都人避暑乞巧中元中秋觀潮重九開爐冬至嵗除嵗晚節物巻四故都宫殿巻五乾淳教坊樂部巻六湖山勝槩上巻七湖山勝槩下增吳山巻八諸市瓦子勾欄酒樓歌館賃物作坊驕民㳺手物産增市食諸色酒名小經紀諸色伎藝人災異增臣等謹案増補武林舊事八巻明朱廷煥輯宋周宻嘗錄南渡後百二十年典故及風俗逰宴諸事勒成一書名為武林舊事廷煥因宻舊本復採西湖志鶴林玉露容齋隨筆輟耕錄及密所著癸辛雜識諸書續加増訂釐為八巻自序謂増補數十則今按書中共補一百五十四則與原序之數不符殆序中脱去一百二字也其書義例稍涉泛濫雖不及周宻原本之精雅有法而於宋代臨安軼事搜括靡遺亦頗足資考古者見聞之助盖宻為宋遺民主於感念盛衰多仿孟元老東京夢華錄之體而廷煥則專取蒐羅故實拾遺補闕以為地志之外篇與李濓汴京遺蹟志約畧相近雖名為増輯而用意有殊今故並著之於錄以備參證焉廷煥字中白單縣人崇禎甲戌進士其為此書時方以工部主事司𣙜杭州云乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀増補武林舊事原序武林為東南都㑹顯於唐盛於宋人文秀出山水清麗物産殷富天下莫與埒也翠華南遷仁和駐蹕延祚百五十餘年雖偏安一隅乎非若金陵六代旦暮易姓使王氣常收者比厥後獨松䦨入厓山胥淪説者盡咎湖山謂尤物惑人甚於西子噫亦太過矣夫虎踞龍蟠不為芳樂臨春分謗顧欲以鳯山鷲嶺代趙宋府辜将置賦臣闇主何地哉矧茂陵在御絶游幸務節儉逺邇安晏櫂歌一曲寄在康衢則武林猶是盤庚之偃師周武之鎬洛也余司𣙜至此朱㓜晉先生以四水濳夫所著舊事見貽暇時按籍披尋覺湖山之美逾于昔聞而繁侈之風競勝未己然􅢂舊事所紀昔猶江海此僅涓勺昔猶京坻此僅稊粒也昔馬卿虚詞歸引節儉風勸之㫖猶存濳夫從容燕薊之朝絶無亡國之戚豈以陋僿為耻故津津其言乎余長夏苦熱憇古梅臨竒石徧簡湖山諸志始知濳夫所載尚有闕畧偶為增補數十則友輩讀而快之從㬰夀梓雖續貂可嗤飾蛾多事然補入詩什以存風流末志災傷使知靡侈過甚足招天譴有汴京之樂即有靖康之悲有武林之侈即有厓山之變運若循環後人不昧此理持以節儉使武林常為樂邦可也舊止六巻今益為八郎仁寶謂四水濳夫即著癸辛雜識之周公謹别號弁陽老人集中往往見之今直著其名不欲使子虚無是徒為後人疑揣耳朱廷煥撰
