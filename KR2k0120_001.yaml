body:
  text: 增補武林舊事卷一宋周密原本明朱廷煥補慶夀冊寶夀皇聖孝冠絶古今承顔兩宫以天下養一時盛事莫大於慶夀之典今托録大略於此淳熙三年光堯聖夀七十預於舊嵗冬至加上兩宫尊號立春日行慶夀禮至十三年太上八十正月元日再舉慶典其日文武百僚集大慶殿各服朝服用法駕五百三十四人大樂四十八架正樂一百八十八人及列儀仗鼓吹於殿門外上服通天冠絳紗袍執大圭恭行冊寶之禮禮儀使以下皆𨗳從上乘輦從至德夀宫俟太上升御座宫架樂作皇帝北向再拜奏起居致詞曰臣某稽首言伏惟聖號太上皇帝陛下夀同天永德與日新典册揚徽華夷賴慶左相宣答曰聖號太上皇帝聖㫖皇帝迎陽展采鏤牒榮親何幸吾身屢觀盛事次皇太子以下稱賀致詞宣答訖並再拜舞蹈禮畢次詣太上皇后殿行禮如前候解嚴訖皇帝入宫進奉禮物行家人禮御宴極歡自皇帝以至羣臣禁衛吏卒往來皆簪花後三日百官拜表稱賀於文德殿四方快覩盛事都民垂白之老喜極有至泣下者楊誠齊詩云長樂宫前望翠華玊皇來賀太皇家青天白日仍飛雪錯認東風轉栁花春色何須羯鼓催君王元日領春回牡丹芍藥薔薇朵都向千官帽上開任斯菴詩云金爵觚稜曉日開三朝喜氣一時回聖人先御紅鸞扇天子龍輿萬騎來霜曉君王出問安寶香隨輦護朝寒五雲深處三宫宴九奏聲中二聖歡四孟駕出先期禁衛所及閣門牒臨安府約束居民不許登髙衩袒觀看男子並令衫帶婦人裙背仍先一日封閉樓門取責知委不許容看來歷不明之人殿步三司各撥統制將官軍兵六千二百人擺齪諸巷大禮則倍此數至日五鼓地分頭項沿門驅逐雜人外儀衛節次如後地分約攔諸廂約攔緝捕使臣都轄官約爛軍器庫從物內藏庫從物御酒庫從物御厨從物祗候庫從物騏驥院御馬兩行御藥院藥架引從舍人兩行諸司庫務官兩行搜視行宫司行宫殿門控攏親從二百十五人前驅親從兩行各二十一人贊喝舍人兩行各八人天武兩行各八人居內都下親從兩行各八人居內駕頭閣門祗候引主駕首兩行各五人閣門提㸃兩行御史臺知班兩行尚書省録事密院副承㫖珠子御座院馬御馬喝御座閣門簿書兩行宣贊舍人兩行茶酒班環衛官帶御器械攔前等輦官人員逍遙輦輦官十六人御輦院官閣門承受兩行御燎子頭籠翰林司官御絲鞋所御服所御座馬兩行十匹馬院總管御軍器庫睿思殿庫閣子庫閣門覺察官兩行長入祗候兩行各二十六人茶酒班殿侍各三十一人快行親從各三十二人繫鞭兩行各七人殿前指揮使兩行各三十一人居外茶酒班殿侍兩行各六人執從物居內編排禁衛行子三十一人於內往來編排等子人員十將兩行各四人居外御龍直共八十二人執從物居內知閣門事乘馬行圍子內步帥乘馬行圍子內親從方圍子兩行各一百四十人圍子兩邊各四重第一重內殿直已下兩邉各一百人第二重崇政殿圍子兩邊各一百人第三重御龍直兩邊各一百人第四重崇政殿圍子兩邊各一百人水手并戲捕等子兩邊各五人攔前崇政殿親從十七人殿帥乘騎行圍子內中道主管禁衛所內官等子兩邊各二十五人居外中道第二日并參謝教坊樂人迎駕念致語口號等并教坊樂部於此排立快行親從兩邊各三十人麈斧拂子水晶骨朵香毬二打燭快行兩行駕回不用編排官二人執燈籠親從兩行各七十四人列至衆安橋去燭駕回先行行門兩行各十二人當食官聽宣官輦官人員平輦輦官一十六人黃羅御繖二黃羅御扇二挾輦御藥帶插外御帶帶插閣下官閣門覺察舍人攔後圍子挾輦指揮使各二十二人輦後樂東西兩班各三十六人第一日不作天武兩行各八人居外都下親從兩行各八人扇筤挾輦內殿直各二十二人宰臣使相執政宰執後約攔親從各二十二人閣門覺察宣贊舍人侍從後約攔親從各二十二人從駕臣僚分東西班東班繫尚書侍郎兩制等官西班繫正任宗室遙郡車駕所經諸百官司皆結綵門迎駕起居俟駕頭將至知班行門喝班到排立次喝躬身拜再拜駕回不拜值兩免拜班首奏聖躬萬福唱喏直身立齪巷軍兵則呼萬嵗大禮南郊明堂三嵗一郊預於元日降詔以冬至有事於南郊或用次年元日行事明堂止於半年前降詔用是嵗季秋上辛日先於五六月內擇日命帥漕及修內司修飾郊壇及絞縛青城齊殿等屋凡數百間悉覆以葦席護以青布拜差官兵修築泥路自太廟至泰禋門又自嘉㑹門至麗正門計九里三百二十步明堂止自太廟至麗正門皆以潮沙填築其平如席以便五輅之往來每隊各有歌頭以綵旗為號唱和杵歌等曲以相兩街居民各以綵段錢酒為犒又命象院教象前𨗳朱旗以二金三鼓為節各有幞頭紫衣蠻奴乘之手執短钁旋轉跪起悉如人意市井因競市繪塑小象以饋遺四方又以車五乘壓以鐵多至萬斤與輅輕重適等以觀疾徐傾側之勢前一月進呈謂之閃試駕出前一日縛大綵屋於太廟前置輅其中許都人觀瞻前一月以來次第按試習儀殆無虛日郊前十日執事陪祀等官並受誓戒於尚書省宗室赴太廟受誓戒前三日百官奏請皇帝致齊於大慶殿是日上服通天冠絳紗袍綪結佩升髙座侍中奏請降座就齊室次日車駕詣景靈宫服衮冕行禮儀從並同四孟禮畢駕回就赴太廟齊殿宿齊是夕四鼓上服衮冕詣祖宗諸室行朝饗之禮是夜鹵簿儀仗軍兵於御路兩傍分列間以籸盆蕡燭自太廟直至郊壇泰禋門輝映如晝宰執親王貴家巨室列幕櫛比皆不逺千里不憚重費預定於數月之前至期猶為有力所奪珠翠錦繡絢爛於二十里間雖寸地不容閒也歌舞逰遨工藝百物輻輳爭售通宵駢闐至五更則䂍矟先驅所至皆滅燈火蓋清道袚除之義黎明上御玊輅從以四輅金象革木𨗳以馴象千官百司法駕儀仗錦繡雜遝蓋十倍孟饗之數聲容文物不可盡述次第出嘉㑹門至青城宿齊明堂側徑入麗正門齊殿齊宿四壁皆三衙諸軍周廬坐甲軍幕旌旗布列前後傳呼唱號列燭互巡往來如織行宫至暮則嚴更警惕太廟齊宿亦然鼓角轟振又有衛士十餘隊每隊十餘人互喝云是與不是衆應曰是又喝曰是甚人衆應曰殿前都指揮使某人謂之喝探至三鼓執事陪祀官並入就黃壇排立萬燈輝耀粲若列星凡齪燈皆自為志號如捧俎官則畫一人為捧俎之狀蓋燈多不容不以此辨認亦有好竒可笑者用丑時一刻行事至期上服通天冠絳紗袍乘輦至大次禮部侍郎奏中嚴外辦禮儀使奏請皇帝行事上服衮冕步至小次升自午階天步所臨皆藉以黃羅謂之黃道中貴一人以大金合貯片腦迎前撒之禮儀使前𨗳殿中監進大圭至版位禮直官奏有司謹具請行事宫架樂作自此上進止皆樂作時壝壇內外凡數萬衆皆肅然無譁天風時送佩環韶濩之音真如九天吹下也太社令升煙燔牲首上先詣昊天位次皇地祗次祖宗位奠玉祭酒讀冊文武二舞次亞終獻行禮畢上詣飲福位爵飲福酒登歌樂作禮直官喝賜胙次送神次望燎訖禮儀使奏禮畢上還大次更衣乘輦還齊宫百僚追班賀禮成於端誠殿黎明上乘大安輦從以五輅進發教坊排立奏念致語口號訖樂作諸軍隊伍亦次第鼓吹振作千乘萬騎如雲奔潮涌四方萬姓如鱗次蟻聚迤邐入麗正門教坊排立再奏致語口號舞畢降輦小憩以俟辦嚴登門肆赦辨陽老人有詩云黃道宫羅瑞腦香衮袍升降佩鏘鏘大安輦奏乾安曲萬㸃明星簇紫皇萬騎雲從簇錦圍內官排立馬如飛九重閶闔開清曉太母登樓望駕歸李鶴田詩云嚴更頻報夜何其萬甲聲傳逺近隨梔子燈前紅炯炯大安輦上赴壇時九月十五日明堂大禮十三日雨未時奏請宿齊十四日駕詣景靈宫回太廟宿齊雨不止午後太上遣提舉至太廟傳語官家連日祀事不易十六日詣宫飲福隂雨泥濘可免勞煩天氣隂寒請美進御膳頻添御服上遣閣長回奏上感聖恩至日若登樓肆赦依舊詣宫行禮不登門時當奏聞晚雨不止宣諭大禮使趙雄來早更不乘輅止用逍遙輦詣文德殿齊一應儀仗排立並免放從駕官並常服以從併遣御藥奏聞北內大禮使趙雄雖已得㫖猶不許放仗上聞之曰來早若不晴時有何靣目雄聞之曰縱使不晴得罪不過罷相耳堅執不肯放散至黃昏後雨止月明上大喜遣內侍李思恭宣諭趙雄仍舊乘輅再遣御藥奏聞北內天晴仍舊乘輅候登門訖詣宫行禮十五日晴色甚佳車駕自太廟乘輅還內日映御袍天顔甚喜都民皆讃嘆聖德至巳時太上遣直閣官往齊殿傳語官家且喜晴明可見誠心感格賜御用段匹至鞦轡七寶篦刀子事件素食果子等仍奏連日勞頓免行飲福禮上就遣知閣回奏上感聖恩天氣轉晴皆太上皇帝聖心感格容肆赦訖詣宫行禮併謝聖恩十六日登門肆赦畢車駕詣宫小次降輦提舉傳太上聖㫖特減八拜仍免至夀聖處飲福行禮畢略至絳華堂進泛索知閣張掄進臨江詞云聞道彤廷森寶仗霜風逐雨驅雲六龍扶輦下青冥香隨鑾扇逺日映赭袍明簾捲天街人頂戴滿城喜氣氤氲等閒散作八荒春秪知天意好昨夜月華新西湖志餘東都舊有青城齊宫渡江後以幕屋絞縛為之每郊費緡錢十餘萬淳熙末張杓為京尹始議築齊宫為一勞永逸上從之宇文寶學價時宿直奏曰陛下方經略河南今築青城於臨安是無中原意也上以為然亟命罷役朝野雜紀郊壇天盤至地髙三丈二尺四寸通七十二級分四成上廣七丈共十二階分三十六龕午階濶一丈主上升降繇此階其餘各濶五尺圎壇之上止設昊天上帝皇地祗二神位及太祖太宗配天十六龕共祀五帝太一感生北極北斗及分祀衆星三百六十位仗用六千八百八十九人自太廟排列至青城玉輅下祗應人共三百二十一人呵喝人員二人教馬官二人挾捧輪將軍四人推輪車子官健八人駕士班直二百三十二人千牛衛將軍二員抱太常龍旗官六員職掌五人專知官一名手分一名庫子八人裝掛匠二人諸作工匠十五人蓋覆儀鸞司十一人監官三員金衆革木輅每輅下一百五十六人玉輅青飾金輅黃飾象輅紅飾革輅淺色飾木輅黑飾輅下有人冠服並依輅色玉輅前儀仗騎𨗳騎𨗳官左壁文臣右壁武臣六軍儀仗官兵二千二百三十二人左右諸將軍十三員中道五員左右八員金吾衛仗司執䂍矟八十人攝將軍八員仗下監門二十六員鼓吹五百八十三人𨗳駕樂人三百三十人登門肆赦補一條其日駕自文德殿詣麗正門御樓教坊作樂迎𨗳參軍色念致語雜劇色念口號至御幄降輦門下閣門進中嚴外辦牌訖御藥喝捲簾上出幄臨軒門下鳴鞭宫架奏曲簾捲扇開樂止撞右五鐘黃繖才出門下宰臣已下兩拜分班立門上中書令稱有敕立金雞門下侍郎應喏宣奉敕立金雞雞竿一起門上仙鶴童子捧赦書降下閣門接置案上太常寺擊鼓鼓止捧案至樓前中心知閣稱宣付三省參政跪受捧制書出班跪奏請付外施行門上中書令承㫖宣曰制可門下參政稱宣付三省遂以制書授宰臣跪受訖閣門提㸃開拆授宣赦舍人捧詣宣制位起居舍人一員摘句讀舍人稱有制宰臣已下再拜俟讀至咸赦除之獄級奏脫枷訖罪囚應喏三呼萬嵗歌呼而出候宣赦訖門上舍人贊樞密及中書令曲賀兩拜門下宣制舍人捧制書授宰臣宰臣授刑部尚書尚書授刑房録事訖歸班兩拜致詞三舞蹈三叩頭知閣稱有制宰臣已下再拜知閣宣答云云若時大慶與卿等同之又拜舞如前門上中書令奏禮畢扇合宫架樂作簾降樂止撞左五鐘門下禮部郎中奏解嚴上還幄次門下鳴鞭舍人喝奉敕放仗宰臣已下再拜退次宣勞將士訖乘輦歸內至南宫門教坊司迎駕念致語口號如前至文德殿降輦舞畢退辨陽翁詩云換輦登門捲御簾侍中承制舍人宣鳳書乍脫金雞口一𣲖歡聲下九天孝宗受禪赦文云凡今者發政施仁之日皆得之問安視膳之餘天下誦之洪景嚴筆也鶴林玉露金雞竿長五丈五尺四靣各百戲一人緣索而上謂之搶金雞先到者得利物呼萬嵗纈羅襖子一領絹十匹銀碗一隻重三兩諸州進奏院各有遞鋪腰鈴黃旗者數人俟宣敕訖即先發太平州萬州夀春府取太平萬夀之語以次俱發鈴聲滿道都人競觀樓下排立次第青龍白虎旗各一信旗二方扇二方圓罕罼二􅓚四劍二將軍二僧衆居左道衆居右玉輅居中太常宫架樂宣赦臺招拜紅旗擊鼓三院罪囚獄級居左御馬六匹居右宣制位居中橫門快行承㫖三省官已下恭謝大禮後擇日行恭謝禮第一日駕出如四孟儀詣景靈宫天興殿聖祖前行恭謝禮次詣中殿祖宗神御前行禮還齊殿進膳訖引宰臣已下賜茶茶畢奏事訖還內第二日上乘輦自後殿門出教坊都管已下於祥曦殿南迎駕起居參軍色念致語雜劇色念口號樂作駕後樂東西班則於和寧門外排立後從作樂將至太一宫道士率衆執威儀於萬夀觀前入圍子內迎駕起居作法事前𨗳入太一宫門降輦候班齊詣靈休殿參神次詣五福十神太一次詣申佑殿本命北辰殿通真殿佑聖順福殿太后本命延夀殿南極火德殿禮畢宣宰臣已下合赴坐官並簪花對御賜宴上服幞頭紅上蓋玉束帶不簪花教坊樂作前三盞用盤盞後二盞屈巵御筵畢百官侍衛吏卒等並賜簪花從駕鏤翠滴金各競華麗望之如錦繡衙前樂都管己下三百人自新椿橋西中道排立迎駕念致語口號如前樂動滿路花至殿門起夀同天曲破舞畢退姜白石有詩云六軍文武浩如雲花簇頭冠樣樣新惟有至尊渾不戴盡將春色賜羣臣萬數簪花滿御街聖人先自景靈回不知後靣花多少但見紅雲冉冉來是日皇后及內中車馬先還宫中呼后為聖人聖節補八條其日俟宰執奏事訖追班上坐垂拱殿先引樞密院并管軍官上夀東京分為二日今只併為一日禮畢再坐紫宸殿上公已下分立候奏班齊上公詣御茶牀前躬進御酒跪致詞云文武百僚臣某等稽首言天基令節聖節名逐朝換臣等不勝大慶謹上千萬嵗夀下殿再拜樞密宣答云得公等夀酒與公等內外同慶又再拜教坊樂作接盞訖跪起舞蹈如儀閣門官喝不該赴坐官先退樞密喝羣臣升殿閣門分引上公已下合赴坐官升殿第一盞宣視盞送御酒歌板色唱祝堯齡賜百官酒觱篥起舞三臺後並准此供進內鹹豉第二盞送御酒歌板起中腔供進雜爆第三盞歌板唱踏歌供進內鮓候內官起茶牀樞密跪奏禮畢羣臣降階舞蹈拜退此上夀大略也若錫宴節次大率如夢華録所載閲理宗朝禁中夀筵及排當樂次可想承平之盛觀淳熙三年天申節先十日駕詣德夀宫進香并進奉銀五萬兩絹二千匹錢五萬貫度牒一百道緑匣二百箇上簽云臣某謹進令幕士安頓寢殿前候閣長移入殿上并鋪放進奉七寶金銀器皿等十二日皇后到宫進香排日皇太子太子妃并大內職典等進香至日卯時駕率皇后太子太子妃文武百官上夀駕至小次降輦太上遣本宫提舉官傳㫖减拜行禮上回奏上感聖恩容臣依儀上夀太上再命减十拜俟升殿皇帝起居踏舞如儀率皇后百官上酒樂作衛士山呼駕興入幄次少歇樂人再排立殿上降簾太上再坐太后率皇后太子妃上夀六宫次第起居禮畢退於右太上過寢殿進早膳太上宣吳郡王等官前來伴話上侍太上同往射㕔看百戲依例宣賜仍八幄次少歇上遣閣長奏知太上午時正刻恭請駕赴德夀殿排當皇帝已下並簪花侍宴至第三盞太上遣內侍請官家免花帽束帶卸上蓋衣又免皇后大冠皇太子穿執並謝恩訖太上泛賜皇太子纍金篏寶盤盞紫羅紫紗南北內互賜承應人目子錢主管禁衛官率禁衛等人於殿門謝恩少歇請太上至樂堂再坐教坊大使回正德進新製萬嵗興龍樂曲破對舞各賜銀絹有差移燕清華看蟠松宫嬪五十人皆仙粧奏清樂進酒并衙前呈新藝約至五盞太上賜官裏御書急就章并金剛經官家亦進御書真草千文太上看了甚喜云大哥近來筆力甚進上起謝同皇太子步至蟠松下看御書詩再入太上宣索翡翠鸚鵡杯官裏與皇后親捧杯進酒太上曰此是宣和間外國進到今以賜皇帝上謝恩時太上官家並已七八分醉遂率皇后太子謝恩升輦太上宣諭知省云官家已醉可一路小心看管知省等領㫖還內來早上遣知省至宫恭問太上起居并奏欲親到宫謝恩太上就令提舉往問興居并免到宫禮西湖志八月二十八日夀聖皇太后生辰先十日車駕過宫先至太上處起居次入本殿進香皇后太子太子妃莊文太子妃張娘娘已下並進香起居至太上內書院進泛索遂奏安止還內十二日婉容到宫至西便門廊下先至太上處奏起居次入本殿進香諭雨免下階起居太內進香十三日知省及大官到宫進香閣長就管押進奉銀絹度牒等并七寶金銀器皿比天申節減半官屬進香并設放夀星及神仙書畫等物隔簾奏喏免起居退次日皇太后宅親屬到宫進香并本宫人吏後苑官屬作院使等臣節次進香二十一日卯時皇后先到宫候駕至到太上前殿起居次至本宫殿官家第一班皇后第二班太子并妃第三班各上夀訖太后宅親屬上夀並同天申節儀太上邀官裏至清心堂進泛索值雨不呈戲依例支賜午刻奏辦就本殿大堂靣北坐官家花帽上蓋皇后三叉頭冠并賜簪花酒至第五盞免大衣官裏便背兒赴坐第七盞小劉婉容進自製十色菊千秋嵗曲破內人瓊瓊柔柔對舞上於閣子庫支賜五兩數珠子一號細色北段十匹太后賜七寶花十枝珠翠芙蓉領緣一幅又移坐靈芝殿有木樨處進酒次到至樂堂再坐更盡後還內西湖志十月二十二日孝宗㑹慶聖節車駕至太上外殿起居簪花拜舞進夀酒太上回賜次至太后殿行禮乃從太上至後苑梅坡看早梅浣溪亭看小春海棠午至載欣堂排當官裏換素帽太后賜官裏女樂二十人上再拜謝恩教坊都管王喜等進新製㑹慶萬年薄媚曲破對舞並賜銀絹太上以白玊桃杯賜上御酒云學取老爺年紀早早還京上飲酒再拜謝恩三杯後官家換背兒免拜皇后換團冠背兒太子免繫褁再坐本宫御侍六人並升郡夫人就賜誥謝恩照例支散目子錢太上又賜官裏玉酒器十件纍珠嵌寶器一千兩尅絲作金龍裝花軟套閣子一副侍宴官吳郡王以下各賜金盤盞段匹薇露酒香茶等是日官裏大醉申後宣逍遙子入便門升輦還內西湖志淳熙十三年光堯聖夀八十肆赦推恩蒙被甚廣太學諸生至於武學皆得免文解一次凡該此恩者千二三百人而宗子在學者不預諸人相率詣宰府且遍謁侍從臺諫各納一劄子叙述大㫖其要以為德夀濡典普天同慶而玉牒支派辱居膠庠顧不獲與布衣書生等竊譬之世俗尊長生日召㑹族姻而本家子孫不享杯酒臠炙外議謂何今厖鴻之澤如此而宗學乃不許厠名於義於禮恐為未愜是時諸公莫肯出手為言洪侍制邁以侍講內宿適蒙宣引因出其紙以奏仍為敷陳此輩所云尊長生日㑹客而本家子弟不得坐譬諭可謂明白孝宗亦笑曰甚是切當有理時所携只是白劄子蒙徑付出施行遂一例免舉洪邁容齊隨筆德夀生日每嵗進奉有常數一日忽減數項德夀大怒孝宗惶懼召宰相虞允文語之允文曰臣請見而解之孝宗曰朕立待卿回奏允文到宫上謁德夀盛氣頃之曰朕老而不死為人所厭允文曰皇帝聖孝本不欲如此罪在小臣謂陛下聖夀無疆生民膏血有限減生民有限之膏血益陛下無疆之聖夀德夀大喜酌以御醖一杯因以金酒器賜之允文回奏孝宗孝宗大喜酌酒賜金如德夀云西湖志四月初八日謝太后夀崇節初九日度宗乾㑹節賈似道命司封郎中黃鋭致語有一聫云聖母神子萬夀無疆亦萬夀無疆昨日今朝一佛出世又一佛出世人皆稱之西湖志宣政極盛時宫中以河陽花蠟燭無香為恨遂用龍涎沉腦屑灌蠟燭列兩行數百枝熖光香滃鈞天所無也建炎紹興久不進此韋太后旋鑾沙漠復值稱夀髙宗極天下之養用宣政故事然僅列十數炬太后陽若不聞上至奉巵白太后云此燭頗愜聖意否太后曰爾爹爹每夜常設數百枝賜諸人閣內亦然上因太后起更衣微謂憲聖曰如何比得爹爹富貴孝宗御宇髙宗在德夀光宗在青宫寧宗在平陽邸四世本支之盛亘古未有楊誠齊時為宫僚賀光宗誕辰詩云祖堯父舜真千載禹子湯孫更一家讀者服其精切又云天意分明昌火德誕辰三世總丁年蓋髙宗生於丁亥孝宗生於丁未光宗生於丁卯也丁年字出李陵書借用亦佳羅大經天基聖節排當樂次正月五日樂奏夾鐘宫觱篥起萬夀永無疆引子王恩上夀第一盞觱篥起聖夀齊天樂慢周潤第二盞笛起帝夀昌慢潘俊第三盞笙起升平樂慢侯璋第四盞方響起萬方寧慢余勝第五盞觱篥起永遇樂楊茂第六盞笛起夀南山慢盧寧第七盞笙起戀春光慢任榮祖第八盞觱篥起賞仙花慢王榮顯第九盞方響起碧牡丹慢彭先第十盞笛起上苑春慢胡寧第十一盞笙起慶夀樂慢侯璋第十二盞觱篥起栁初新慢劉昌第十三盞諸部合萬夀無疆薄媚曲破初坐樂奏夷則宫觱篥起上林春引子王榮顯第一盞觱篥起萬嵗梁州曲破齊汝賢舞頭豪俊邁舞尾范宗茂第二盞觱篥起聖夀永歌曲子陸恩顯琵琶起捧瑶巵慢王榮祖第三盞唱延夀長歌曲子李文慶嵇琴起花稍月慢李松第四盞玉軸琵琶獨彈正黃宫福夀永康寧俞達拍王良卿觱篥起慶夀新周潤進談子笛哨潘俊杖鼓朱堯卿拍王良卿進念致語等時和伏以華樞紀節瑶墀先五日之春玉厯發祥聖世啓千齡之運歡騰薄海慶溢大廷恭惟皇帝陛下濬哲如堯儉勤邁禹躬行德化躋民夀域之中治洽泰和措世春臺之上皇后殿下道符坤順位儷乾剛宫闈資隂教之修海㝢仰母儀之正有德者必夀八十箇甲子環周申命以下舊本失二十行第九盞簫起鏤金蟬慢傅昌寧笙起託嬌鶯慢任榮祖第十盞諸部合齊天樂曲破再坐第一盞觱篥起慶芳春慢楊茂笛起延夀慢潘俊第二盞箏起月中仙慢侯端嵇琴起夀爐香慢李松第三盞觱篥起慶簫韶慢王榮祖笙起月明起花燈慢任榮祖第四盞琵琶獨彈髙雙調㑹羣仙方響起玉京春慢余勝雜劇何晏喜已下做楊飯斷送四時歡第五盞諸部合老人星降黃龍曲破第六盞觱篥獨吹商角調筵前保夀樂雜劇時和已下做四偌少年逰斷送賀時豐第七盞鼓笛曲拜舞六么㺯傀儡踢架兒盧逢春第八盞簫獨吹雙聲調玉簫聲第九盞諸部合無射宫碎錦梁州歌頭大曲雜手藝永團圎趙喜第十盞笛獨吹髙手調慶千秋第十一盞琵琶獨彈大吕調夀齊天撮㺯夀果放生姚潤第十二盞諸部合萬夀興隆樂法曲第十三盞方響獨打髙宫惜春傀儡舞鮑老第十四盞箏琶方響合纒令神曲第十五盞諸部合夷則羽六么巧百戲趙喜第十六盞管下獨吹無射商栁初春第十七盞鼓板舞綰夀星姚潤第十八盞諸部合梅花伊州第十九盞笙獨吹正平調夀長春傀儡羣仙㑹盧逢春第二十盞觱篥起萬花新曲破祗應人都管周朝清陸恩顯雜劇色吳師賢趙恩王太一朱旺猪兒頭時和金寶俞慶何晏喜沈定吳國賢王夀趙寧胡寧鄭喜陸夀歌板色李文慶拍板色王良卿張亨謝用簫色傅昌寧朱明復李允信箏色陳儀豪輔文吳宣豪俊賢徐顯祖張廣琵琶色王榮祖俞逹豪俊民豪俊邁段繼祖嵇琴色李松侯端孫民顯笙色侯璋葉茂青任榮祖董茂張瑾潘寶姚拱范椿孫昌莫正周珍馬椿姚舜臣陳保觱篥色齊汝賢周潤楊茂王恩王榮顯姜師賢劉昌楊彬王福杜明喻祥周忠恕夏福徐珏周喜聞澄沈夀丁預鄭亨周佐楊瑾沈康鄭聰莫夀潘顯祖時潤胡佾周信李圭李潤史顯金夀笛色楊德茂潘俊盧寧彭俊賀昌賀夀胡師文夀椿姚寶張茂祖崔興朱珍張茂才金貴潘顯祖沈夀周興李大用董大有金明趙喜莫及張春葉茂胡寧任顯張椿孫寧彭進李榮全寧金彥恭董喜王佑來亨王喜顧和顧松金顯董寧杜松李椿張椿何福管思齊朱喜花椿李拱辰方響色余勝彭先劉民和黃桂姜大亨張榮杖鼓色朱堯卿馮喜時忠施榮朱拱辰周忠李顯姚寶葉茂李榮祖大鼓色王喜鄧珍王宣顧榮舞旋色范宗茂內中上教張明倪椿潘恩石琇張琳㺯傀儡盧逢春等六人雜手藝姚潤等九人女厮撲張椿等十人築毬軍陸寶等二十四人百戲沈慶等六十四人百禽鳴胡福等二人增補武林舊事卷一
