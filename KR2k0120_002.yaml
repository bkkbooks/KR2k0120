body:
  text: 增補武林舊事巻二宋周宻原本明朱廷煥補睿藻增光堯御製盤松贊墨本云天賜瑞木得自嶔岑枝蟠數萬榦不倍尋怒騰雲勢静奏琴音凌寒鬱茂當暑隂森封以腴壤邇以碧潯越千萬年以慰我心碑在宫中又汪季路逵得御製祭土地文藁真蹟文云維淳熈五年嵗次戊戌十一月日太上皇帝遣具階張宗尹特設牲牢㫖酒珍菓香花致祭於本宫土地之神神有百職職各不同典司草木土示是供我逰湖園乃獲竒松植之禁苑百態千容婆娑偃盖天矯騰龍翠色凝露清音舞風醉吟閒遣予情所鍾壅培封殖久或力窮鳥烏外擾蟻蠧内攻神其勦絶勿使能終精邪竊據盜斧適逢神其呵逐勿使遺蹤常令勁質坐閲隆冬堅踰五柞弱異雙桐歴千萬年鬱鬱葱葱牲牢㫖酒嗣錄汝功周必大玉堂雜記光堯當内修外攘之際尤以文徳服逺至於宸章睿藻日星昭垂者非一紹興二十八年將郊祀有司以太常樂章篇序失次文義勿協請遵真宗仁宗朝故事親製祭享樂章詔從之自郊社宗廟等共十有四章肆筆而成睿思雅正宸文典贍所謂大哉王言也至於一時閒適寓景而作則有漁父辭十五章又清新蕳逺備騷雅之體其辭有曰薄晚烟林淡翠㣲江邊秋月已明輝縱逺柁適天機水底閒雲片段飛青草開時己過船錦鱗躍處浪痕圓竹葉酒栁花氊有意沙鷗伴我眠水涵㣲影湛虚明小笠輕簔未易晴明鏡裏縠紋生白鷺飛來空外聲觀此雖古騷人詞客老於江湖擅名一時者豈能企及廖瑩中江行雜錄吳郡王益憲聖太后弟也一日竹冠練衣芒鞋笻杖獨携一童縱行三竺靈隠山中濯足冷泉盤石上逰人望之儼如神仙邏者奏聞次日徳夀以小詩召之曰趂此一椽風月好橘香酒熟待君來令小璫持賜王遂亟往光堯笑迎曰昨日冷泉之逰樂乎王恍然頓首謝光堯曰朕宫中亦有此景卿欲見否盖疊石引泉象飛來香林之勝架堂其上冷泉亭中揭一畫乃圗王野服濯足於盤石上具御製一贊云富貴不驕戚畹稱賢掃除膏粱放曠林泉滄浪濯足風度蕭然國之元舅人中神仙於是盡醉而罷因舉圗賜之西湖志髙宗以府治為行宫題中和堂詩云六龍轉淮海萬騎臨吳津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉夏禹勤神功既盛大後世蒙其仁願同越句踐焦思先吾身艱難務遵養聖賢有屈伸髙風動君子屬意種蠡臣西湖志光堯雅愛湖山恐數蹕煩民鑿大池宫内引水注之疊石為山象飛來峰有堂名冷泉孝宗賦詩云山中色秀何佳哉一峰獨立名飛來參差翠麓儼如畫石骨蒼潤神所開忽聞彷像來宫囿指顧已驚成列岫規模絶似靈隠前靣勢恍疑天竺後孰云人力非自然千巖萬壑藏雲煙上有崢嶸倚空之翠壁下有潺湲潄玉之飛泉一堂虚敞臨清沼宻䕃交加森羽葆山頭草木四時春閲盡嵗寒長不老聖心仁智情優閒壺中天地非人間蓬萊方丈渺空濶豈若坐對三神山日長雅趣超塵俗散步逍遥快心目山光水色無盡時長將挹向盃中淥光堯跋曰吾兒自幼岐嶷進徳修業如雲升川增一日千里吾比就寛閒之地疊石為山引湖為泉作小亭於其旁用為娛老之具且俾吾兒萬幾之暇時来逰豫父子杯酒相屬挹山光而聴泉流濯喧埃而發清興恍若徜徉乎靈隠天竺之間其樂可勝紀哉吾兒乃肆筆成章形容盡美雖吟詠之作帝王之餘事然造語用意髙出百世之上非巨儒積力可窺其粗亦有以見天縱之多能覽之欣然老眼為之增明矣西湖志餘御教補一則夀皇留意武事在位凡五大閲乾道二年四年六年淳熈四年十年或幸白石或幸茅灘或幸龍山一時儀文士馬戈甲旌旗之盛雖各不同今撮其要以著於此先一日諸軍人馬全裝執色於教塲東布列軍幕宿營至日殿前馬步諸軍先赴教塲下方營并親隨軍排列將壇之後質明三衙管軍官並全裝從駕上自祥曦殿戎服乗馬太子親王宰執近臣並戎服乗馬以從䕶聖馬軍八百騎分執鎗旗弓矢軍器前後奏隨軍番部大樂等詳見後御教儀衛次第駕入教塲升幄殿殿帥執撾躬奏諸司人馬排立齊舉黄旗招諸軍向御殿梆子一鼔唱喏一鼓呼萬嵗再一鼓又呼萬嵗疊鼓呼萬萬嵗又一鼔唱喏殿帥奏取聖㫖鳴角發嚴上御金裝甲胄登將壇幄殿鳴角戒嚴殿帥奏取聖㫖馬步軍整隊成屯以備教戰連三鼓馬軍上馬步軍起旗槍分東西為應敵之勢舉白旗教方陣黄旗變圓陣皂旗變曲陣青旗變直陣緋旗變鋭陣緋心皂旗作長蛇陣緋心白旗作伏虎陣殿帥奏取聖㫖兩陣各遣勇將挑戰變八圓陣疊鼓舉旗左馬軍戰右步軍右馬軍戰左步軍再疊鼔交旗擊刺混戰三疊金分陣大勢馬軍四靣大戰三疊金分陣殿帥奏教陣訖取㫖人馬排列當頭鳴角簇隊以俟放教諸軍呈大刀車砲煙槍諸色武藝御前傳宣撫諭將士射生官進獻獐鹿上更戎服賜宰臣己下對御酒五行殿帥奏取㫖謝恩如前唱喏訖駕出教塲是日太上皇於都亭驛設簾幄以觀駕至邀上入幄宣喚管軍官賜大金碗酒於簾外都人贊歎以為盛觀時殿司旗幟以黄馬司以緋步司以白道路隘促止用從駕軍一萬二千四百人分為二百四十八小隊戈甲耀日旌旗蔽天連亘二十餘里粲如錦繡都人縱觀以為前所未有凡支犒金銀錢帛以鉅萬計悉出内庫户部不與焉御教儀衛次第文物儀衛並同四孟駕出今止添入後項彈壓前隊侍立使臣都轄執黄龍旗使臣執繡龍旗使臣帶弓箭汗胯豹尾使四員帶汗胯員騎劍使臣十員彈壓後隊侍立使臣都轄黄羅戲珠龍旗黄繡龍旗二豹尾使臣四員騎劍使臣十人供進馬四疋帶甲御馬御前全裝甲馬管押使臣幕士内中正供馬獸醫押槽黄繡龍傳宣旗二小龍傳宣旗十隨逐廵視官馬院禁衛官引馬監官二員供馬監官二員聖駕供鞭通管二員掇梢提轄二員日烏獨脚旗挾駕指揮四十二人銷金龍旗二犀皮御座椅鈐鎚刀子左匙筯刀子右青氊御笠褐氊御笠金鳳瓶絲鞵篋子御膳篋子玉靶于闐刀馬腦于闐刀水晶于闐刀金洗𠻳皂白御靴通犀于闐刀角靶于闐刀酒鱉子大小白虎皮杖榼白豹皮杖榼梳刷馬盂袋黑漆套盤圭木套盤銷金弓箭葫蘆虎豹皮弓袋箭葫蘆飲水角拍板二哨笛四番鼓二十四人彈壓樂器使臣管押訓練官杏黄龍旗二觱篥二札子九大鼓十龍笛四從駕官幸臣已下並如常日臨安府彈壓官屬隆興初孝宗鋭志復古戒燕安之鴆躬御鞍馬習勞事倣陶侃運甓意時召諸將擊鞠殿中雖風雨亦張油帟布沙除地羣臣以宗廟之重不宜乗危交章進諫弗聴一日上親按鞠折旋稍乆馬不勝勩逸入廡間簷甚低觸於楣挟陛驚呼失色亟奔凑馬已馳而過上手擁楣垂立扶下神采不動顧指馬所往使逐之殿下皆稱萬嵗盖與藝祖抵城挽鬃事若合符節英武天縱固宜有神助也岳珂挰史燕射淳熈元年九月孝宗幸玉津園講燕射禮皇太子宰執使相侍從正任皆從輦至殿門外少駐教坊進念致語口號作樂至麗正門繇嘉會門至玉津園賜宴酒三行上服頭巾窄衣束帶絲鞵臨軒内侍御帶進弓箭看箭人喝看御箭教坊樂作射垜前排立招箭班應喏皇帝第二箭射中皇太子已下各再拜稱賀進御酒并宣勸訖皇太子已下及臣僚射弓第四箭射中上再射第三箭又中的傳㫖不賀舍人先引皇太子當殿賜窄衣金束帶次引射中臣僚受賜如前再進御酒奏樂用雜劇次賜宰臣已下十兩銀碗各一隻上賦七言詩丞相曾懐已下屬和以進上乗逍遥輦出玉津園門教坊進念口號至祥曦殿降輦招箭班者服紫衣幞頭乂手立於垜前御箭之來能以幞頭取勢轉𨗳入的亦絶伎也公主下降補一條南渡以来公主無及嫁者獨理宗朝周漢國公主出降慈眀太后姪孫楊鎮禮文頗盛今摭梗槩於此先是擇日遣天使宣召駙馬至東華門引見便殿賜玉帶靴笏鞍馬及紅羅百疋銀器百兩衣著百疋聘財銀一萬兩對御賜筵五盞用教坊樂俟畢謝恩訖乗塗金御仙花鞍轡狨座馬執絲鞭張三簷傘教坊樂部五十人前引還第謂之宣繫進財物件並照國朝會要太常寺闗報有司辦造先一月宣宰執常服繫鞵詣後殿西廊觀看公主房奩真珠九翬四鳳冠褕翟衣一副真珠玉珮一副金革帶一條玉龍冠綬玉環北珠冠花箆環七寶冠花箆環真珠大衣背子真珠翠領四時衣服纍珠嵌寶金器塗金器貼金器出從貼金銀裝擔等錦繡銷金帳幔陳設茵褥地衣步障等物其日駙馬常服玉帶乗馬至和寧門易冕服至東華門用鴈幣玉馬等行親迎禮用熈寧故事公主服九翬四鳳冠褕翟纁袖升其前天文官本位從物從人燭籠二十本位使臣挿釵童子八人方扇四圓扇四引障花十提燈二十行障坐障皇后親送乗九龍子皇太子乗馬圍子左右兩重其後太師判宗正寺榮王榮王夫人及諸命婦至第賜御筵九盞筵畢皇后太子先還公主歸位行同牢禮用開寶禮然後親行盥饋舅姑之禮開寶通禮謁見舅姑用名紙一副衣一襲手帕一合粧盝藻豆袋銀器三百兩衣著五百疋餘親各有差三朝公主駙馬並入内謝恩宣賜禮物賜宴禁中外庭奉表稱賀賜宰執親王侍從内職管軍副都指使已上金銀錢盛包子有差依熈寧式駙馬家親屬各等第推恩周漢國公主下降諸閫及權貴各獻添房之物如珠領寶花金銀器之類時馬天驥為平江發運使獨獻螺鈿細栁箱籠百隻并鍍金銀鎻百具錦袱百條實以芝楮百萬理宗為之大喜西湖志唱名補三條第一名承事郎第二第三名並文林郎第一甲賜進士及第第二甲同進士及第第三第四甲賜進士出身第五甲同進士出身武舉第一名秉義郎特奏第一名同進士出身上御集英殿拆號唱進士名各賜綠襴袍白簡黄襯衫武舉人賜紫羅袍鍍金帶牙笏賜狀元等三人酒食五盞餘人各賜泡飯前三名各進謝恩詩一首皆重戴絲袍絲鞭駿馬快行各持敕黄於前黄旗雜沓多至數十百靣各書詩句於上呵殿如雲皆平日交逰親舊相迓之人或三學使令齋臧輩若執事人則繫帥漕司差到狀元局祗應亦有術人相士輩自衒預定魁選鼓舞於中自東華門至期集所豪家貴邸競列綵幕縱觀少年未有室家者亦往往於此擇壻焉期集所例置局於禮部貢院前三人主之於内遴選所長以充職事有紏彈牋表主管題名小錄掌儀典客掌計掌器掌膳掌酒果監門等後旬日朝謝又數日拜黄甲叙同年其儀三名設褥於堂上東西相向四十已上立於東廊四十已下立於西廊皆再拜拜巳擇榜中年長者一人狀元拜之復擇少者一人拜狀元又數日赴國子監謁謝先聖先師訖賜聞喜宴於局中侍從已上及館職皆與知舉官押宴遂立題名石刻凡費悉出於官及諸閫饋遺云光堯與子孝愛日隆每問安北宫間及治道時孝宗鋭志大功新進逢意務為可喜效每落落淳熈中上益眀習國事老成鄉用矣一日躬朝徳夀從容曰天下事不必乗快要在堅忍終於有成上再拜請書紳歸而大字揭於選徳殿壁辛丑嵗將廷䇿多士貢名者或謂時事於朝路間聞其語而不敢形於大對即其近似或曰持守或曰要終既御集英臚唱宰執進讀獨有巻曰天下未嘗有難成之事人主不可無堅忍之心上覽而是之遂為第一岳珂桯史紹興間黄公度榜第三人陳修福建解試四海想中興之美賦第五韻隔對云葱嶺金隄不日復廣輪之大泰山玉牒何時清封禪之塵時諸郡試巻多經御覽髙宗親書此聫粘之殿壁及唱名上云卿便是陳修因誦此聮淒然出涕問卿有子否對曰臣年六十三嵗尚未娶乃詔出内人施氏嫁之年三十三奩具甚厚時人戯為之語曰新人若問郎年幾四十年前二十三第五人方翥興化人解試中興日月可冀賦一聮云停觀僚屬復光司𨽻之儀忍死須臾咸泣山東之詔亦經御覽唱名特加一資西湖志餘髙宗孝宗在御每三年大比下詔前一日捧詔露香黙禱曰朝廷用人别無他路止有科舉願天生幾箇好人來輔國家及進殿試䇿題臨軒唱名必三日前精禱於天所以兩朝人才彬彬有聞二帝祈天之効也西湖志恩澤增楊和王居殿巖日建第清湖洪福橋規制甚廣自居其中旁列子舍四皆極宏麗落成日縱人逰觀一僧善相宅云此龜形也得水則吉失水則㐫時和王方被殊眷從容聞奏欲引湖水環其居思陵首肯曰朕無不可第恐外庭有語宜宻速為之退即督濠寨兵數百且多募民夫夜以繼晝入自五房院出自惠利井蜿蜒縈繞凡數百丈三晝夜竣事未幾臺臣果有疏言擅灌湖水入私第以擬宫禁者上曉之曰南渡初敵人退而羣盜起朕用議者羈糜之䇿刻印盡封之所有者止淮浙數郡耳會諸將盡平羣盜朕因自誓除土地外凡府庫金帛置不問故諸將有餘力給泉池園圃之費若以平盜之功言雖盡以西湖賜之曾不為過况此役已成惟卿容之言者遂止繼後建傑閣藏思陵御劄且揭上賜風雲慶會四大字於上盖取大龜昻首下視西湖之象以成僧說自此百餘年間無復火災人皆神之癸辛雜識夀皇登極赦恩凡宗子不以服屬逺近人數多少其曾獲文解兩次者並直赴殿試畧通文墨者所在州量試即補承信郎由是入仕者過千人以上淳熈十六年二月紹熈五年七月二赦皆然故皇族得官不可以數計洪邁容齋隨筆舊傳三嵗拜郊或明堂大禮所有在前誤國奸臣首級在大理寺者必以文祭盖訛傳謂以汚穢物祭之實乃少牢也其文云國家於三年恩霈汝雖誤國然今亦不忘汝之舊特用以祭繆傳若此豈朝廷寛大之恩哉李有古杭雜記景定春詔以魏國公賈似道有再造功命有司建第宅家廟賈固辭遂以集芳園及緡錢百萬賜之園故思陵舊物古木夀籐多南渡以前所植者積翠四抱仰不見日架廊疊磴幽𣺌逶迤極營度之巧猶以為未也則隧地通道抗以石梁傍透湖濱架百餘楹飛樓層臺凉亭燠館華卉精妙前揖孤山後據葛嶺兩嶺映帶一水横陳各隨地勢搆架焉堂榭之有名曰蟠翠古松雪香古梅翠巖竒石倚繡雜花浥露海棠玉蘂瓊花荼􅐘清勝假山已上集舊物髙宗御扁西湖一曲竒勛理宗御書秋壑遂初容堂度宗御書初陽精舍熈然夢砌臺山坳曰無邊風月見天地心水濱曰琳琅步歸身旱船通名曰後樂園四世家廟則居第左廟有記又以為未足於第左數百步瞰湖作别墅曰光漾閣春雨觀養樂堂嘉生堂干頭木奴生意瀟然生物之府通名曰養樂園其傍則廖羣玉香月陵在焉又於西隣之外樹竹干挺架樓臨之曰秋水觀第一春梅塢剡船亭則通謂之水竹院落後復葺南山水樂洞賜園有聲在堂介堂愛此留照獨喜玉淵潄石宜晚上下四方之宇諸亭據勝專竒殆無遺䇿矣其後志之郡乗從而為之辭曰園圃一也有藏歌貯舞流連光景者有曠志怡神蜉蝣塵外者有澄想遐觀運量宇宙而㳺特其寄焉者意使園圃常興而無廢天下常治而無亂非後天下之樂而樂者其誰能嗚呼當時為此語者亦安知俯仰間遽有荒田野草之悲哉昔陸務觀作南園記於平原極盛之時尚能勉之以抑畏退休今賈氏當國十有六年諛之者惟恐不極其至况敢幾㣲及此意乎近世以詩弔之者甚衆吳人湯益一詩頗為人所稱云檀板歌殘陌上花過牆荆棘刺簷牙指揮已失鐵如意賜予寧存玉辟邪李輔國敗屋春歸無主燕廢池雨産在官蛙朩綿庵外尤愁絶月黑夜深聞鬼車李彭老一絶云瑶房錦樹曲相通能幾畨春事已空惆悵舊時吹笛處壊窓風雨剝青紅癸辛雜識元正朝廷元日冬至行大朝會儀則百官冠冕朝服備法駕設黄麾仗三千三百五十人視東京已减三之一用太常雅樂宫架登歌太子上公親王宰執並赴紫宸殿立班進酒上千萬嵗夀上公致辭樞宻宣答諸國使人及諸州入獻朝賀然後奏樂進酒賜宴此禮不能常行每嵗禁中止是以三茅鐘鳴駕興上服幞頭玉帶靴袍先詣福寧殿龍墀及聖堂炷香用蠟沉腦子次至天章閣祖宗神御殿行酌獻禮次詣東朝奉賀復回福寧殿受皇后太子皇子公主貴妃至郡夫人内官大内已下賀賀畢駕始過大慶殿御史臺閤門分引文武百僚追班稱賀大起居十六拜致辭上夀樞宻宣答禮畢放仗是日後苑排辦御筵於清燕殿用插食盤架午後修内司排辦晚筵於慶瑞殿用煙火進市食賞燈並如元夕立春前一日臨安府進大春牛設福寧殿庭駕臨幸内官皆用五色絲綵杖鞭牛御藥院例取牛睛以充眼藥餘屬直閤婆號管人都行首掌管預造小春牛數十飾綵旛雪栁分送殿閤巨璫各以金銀錢彩段為酬是日賜百官春旛勝宰執親王以金餘以金褁銀及羅帛為之繫文思院造進各垂於幞頭之左入謝後苑辦造春盤供進及分賜貴邸宰臣巨璫翠縷紅絲金雞玉燕備極精巧毎盤直萬錢學士院撰進春帖子帝后貴妃夫人諸閤各有定式綘羅金縷華粲可觀臨安府亦鞭春開宴邸第饋遺則多效内庭焉元夕補一條禁中自去嵗九月賞菊燈後迤邐試燈謂之預賞一入新正燈火日盛皆修内司諸璫分主之競出新意年異而嵗不同往往於復古膺福清燕眀華等殿張掛及宣徳門梅堂三間臺等處臨時取㫖起立鰲山燈之品極多見後燈品以蘇燈為最圈片大者徑三四尺皆五色琉璃所成山水人物花竹翎毛種種竒妙儼然着色便靣也其後福州所進則純用白玉晃耀奪目如清氷玉壺爽徹心目近嵗新安所進益竒雖圈骨悉皆琉璃所為號無骨燈禁中嘗作琉璃燈山髙五丈人物皆用機闗活動結大綵樓貯之又於殿堂梁棟窓户間為涌壁作諸色故事龍鳳噀水蜿蜒如生為諸燈之冠前後設玉柵簾寶光花影不可正視仙韶内人迭奏新曲聲聞人間殿上鋪連五色琉璃閤皆毬文戯龍百花小窻間垂小水晶簾流蘇寶帶交映璀璨中設御座恍然在廣寒清虚府中也至二鼓上乗小輦幸宣徳門觀鼇山擎輦者皆倒行以便觀賞金爐腦麝如祥雲五色熒煌炫轉照耀天地山燈凡數千百種極其新巧怪怪竒竒無所不有中以五色玉柵簇成皇帝萬嵗四大字其上伶官奏樂稱念口號致語其下為大露臺百藝羣工競呈竒伎内人及小黄門百餘皆巾褁翠蛾傚街坊清樂傀儡繚繞燈月之下既而取㫖宣喚市井舞隊及市食盤架先是京尹預擇華潔及善歌呌者謹伺於外至是歌呼競入既經進御妃嬪内人而下亦爭買之皆數倍得直金珠磊落有一夕至富者宫漏既深始宣放烟大百餘架樂聲四起燭影縱横而駕始還矣大率傚宣和盛際愈加精妙特無登樓賜宴之事人間不能詳知耳都城自舊嵗冬孟駕囘則已有乗肩小女鼓吹舞綰者數十隊以供貴邸豪家幕次之翫而天街茶肆漸已羅列燈毬等求售謂之燈市自此以後每夕皆然三橋等處客邸最盛舞者往来最多每夕樓燈初上則簫鼔已紛然自獻扵下酒邊一笑所費殊不多往往至四鼓乃還自此日盛一日姜白石有詩云燈已闌珊月氣寒舞兒往往夜深還只應不盡婆娑意更向街心㺯影看又云南陌東城盡舞兒畫金刺繡滿羅衣也知愛惜春逰夜舞落銀蟾不肯歸吳夢窓玉樓春云茸茸貍帽遮梅額金蟬羅剪胡衫窄乗肩爭看小腰身倦態强隨閒鼔笛問稱家在城東陌欲買千金應不惜歸来困頓殢春眠猶夢婆娑斜趂拍深得其意態也至節後漸有大隊如四國朝傀儡杵歌之類日趨於盛其多至數十百隊天府每夕差官㸃視各給錢酒油燭多寡有差且使之南至昇暘宫支酒燭北至春風樓支錢終夕天街鼓吹不絶都民士女羅綺如雲無夕不然至五夜則京尹乗小提轎諸舞隊次第簇擁前後連亘十餘里錦繡填委簫鼓振作耳目不暇給吏魁以大囊貯楮劵凡遇小經紀人必犒數十謂之買市至有黠者以小盤貯梨藕數片騰身迭出於稠人之中支請官錢數次者亦不禁也李篔房詩云斜陽盡處蕩輕烟輦路東風入管絃五夜好春隨步暖一年明月打頭圓香塵掠粉翻羅帶宻炬籠綃鬭玉鈿人影漸稀花露冷踏歌吹度曉雲邊京尹幕次例占市西坊繁閙之地蕡燭籸盆照耀如晝其前列荷校囚數人大書犯繇云某人不合搶撲釵環挨搪婦女繼而行遣一二謂之裝燈實皆獄囚借此以警姦民分委府僚巡警風燭及命轄房使臣等分任地方以緝姦盜三獄亦張燈建淨獄道塲多裝獄户故事及陳列獄具邸第好事者如清河張府蔣御藥家間設雅戯煙火花邊水際燈燭粲然逰人士女縱觀則迎門酌酒而去又有幽坊靜巷好事之家多設五色琉璃泡燈更自雅潔靚粧笑語望之如神仙白石詩云沙河雲合無行處惆悵来逰路已迷却入靜坊燈火空門門相似列蛾眉又云逰人歸後天街靜坊陌人家未閉門簾裏垂燈照樽俎坐中嬉笑覺春温或戯扵小樓以人為大影戯兒童歡呼終夕不絶此類不可遽數也西湖諸寺惟三竺張燈最盛往往有宫禁所賜貴璫所遺者都人好竒亦往觀焉白石詩云珠絡琉璃到地垂鳳頭御帶玉交枝君王不賞無人進天竺堂深夜雨時元夕節物婦人皆帶珠翠閙蛾玉梅雪栁菩提葉燈毬銷金合蟬貉袖項帕而衣多尚白盖月下所宜也㳺手浮浪輩則以白紙為大蟬謂之夜蛾又以棗肉炭屑為丸繫以鐵絲然之名火楊梅節食所尚則乳糖丸子䭔科斗粉豉湯水晶膾韭餅及南北珍果并皂兒糕宜利少澄沙糰子滴酥鮑螺酪麵玉消膏琥珀餳輕餳生熟灌藕諸色瓏蜜煎蜜褁糖𤓰蔞煎七寶姜豉十般糖之類皆用鏤鍮裝花盤架車兒簇挿飛蛾紅燈綵盝歌呌喧闐幕次往往使之吟呌倍酬其直白石亦有詩云貴客鈎簾看御街市中珍品一時来簾前花架無行路不得金錢不肯囘競以金盤鈿合簇飣饋遺謂之市食合兒翠簾綃幕絳燭紗籠遍呈舞隊宻擁歌姬脆管清吭新聲交奏戯具粉嬰鬻歌售藝者紛然而集至夜闌則有持小燈照路拾遺者謂之掃街遺鈿墮珥往往得之亦東都遺風也杭州元宵之盛自唐已然白樂天詩云嵗熟人心樂朝逰復夜逰春風来海上眀月在江頭燈火家家市笙歌處處樓無妨思帝里不合厭杭州西湖志舞隊大小全棚傀儡查查鬼查大李大口一字口賀豐年長瓠歛長頭兎吉兎毛大伯吃遂大憨兒麤姐麻婆子快活三郎黄金杏瞎判官快活三娘沈承務一臉膜猫兒相公洞公觜細姐河東子黒遂王缺兒交椅夾棒屏風男女竹馬男女杵歌大小斫刀鮑老交衮鮑老子弟清音女童清音諸國獻寶交國朝四國朝穿心國入貢孫武子教女兵遏雲社緋盝社胡女鳳阮嵇琴撲蝴蝶回陽丹大樂瓦鼓焦鎚架兒喬三教喬迎酒喬親事喬樂神馬明王喬捉蛇喬學堂喬宅眷喬像生喬師娘獨自喬地仙旱划船教象裝態村田樂鼓板踏蹺撲旗抱鑼裝鬼獅豹蠻牌十齋郎耍和尚劉衮散錢行貨郎打嬌惜其品甚夥不可悉數首飾衣裝相矜侈靡珠翠錦綺炫耀華麗如傀儡杵歌竹馬之類多至十餘隊十二十三兩日國忌禁樂則有裝宅眷籠燈前引珠翠盛飾少年尾其後訶殿而来卒然遇之不辨真偽及為喬經紀人如賣蜂糖餅小八塊風子賣字本䖍婆賣旗兒之類以資一笑者尤多也燈品燈品至多蘇福為冠新安晚出精妙絶倫無骨燈用絹囊貯粟為胎燒之及成去粟則混然玻璃毬也景物竒巧前無其比又為大屏灌水轉機百物活動趙忠惠守吳日嘗命製春雨堂五大間左為汴京御樓右為武林燈市歌舞雜藝纖悉曲盡凡用干工外此有魫燈則刻鏤犀珀玳瑁以飾之珠子燈則以五色珠為網下垂流蘇或為龍船鳳輦樓臺故事羊皮燈則鏃鏤精巧五色粧染如影戯之法羅帛燈尤多或為百花或細眼間以紅白號萬眼羅者為最竒外此有五色蠟紙菩提葉若沙戯影燈馬騎人物旋轉如飛又有深閨巧娃剪紙而成尤為精妙又有絹燈剪為詩詞時寓譏笑及畫人物藏頭隐語及舊京諢語戯㺯行人有貴邸出新意以細竹絲為之加以彩飾疎眀可愛穆陵喜之令製百盞期限既迫勢難卒成内苑諸璫恥於不自已出思所以勝之遂以黄草布剪縷加之㸃染與竹無異凡兩日百盞已進御矣挑菜二月一日謂之中和節唐人最重今惟作假及進單羅御服百官服單羅公裳而已二日宫中排辦挑菜御宴先是預備朱綠花斛下以羅帛作小巻書品目於上繫以紅絲上植生菜薺花諸品俟宴酬樂作自中殿以次各以金箆挑之后妃皇子貴主媫妤及都知等皆有賞無罰以次毎斛十號五紅字為賞五黑字為罰上賞則成號真珠玉杯金器北珠箆環珠翠領抹次亦鋌銀酒器冠鋌翠花段帛龍涎御扇筆墨官窑定器之類罰則唱舞吟詩念佛飲冷水吃生薑用此以資戯笑王宫貴邸亦多傚之進茶補一條仲秋上旬福建漕司進第一綱茶名北苑試新方寸小銙進御止百銙䕶以黄羅軟盝藉以青篛褁以黄羅夾複臣封朱印外用朱漆小匣鍍金鎻又以細竹絲織笈貯之凡數重此乃雀舌水芽所造一銙之直四十萬僅可供數甌之啜耳或以一二賜外邸則以生線分解轉遺好事以為竒玩茶之初進御也翰林司例有品嘗之費皆漕司邸吏賂之間不滿欲則入鹽少許茗花為之散漫而味亦漓矣禁中大慶會則用大鍍金􅜔以五色韻果簇飣龍鳳謂之繡茶不過悦目亦有專工者外人罕知寶雲山産者名寶雲茶下天竺香林洞者名香林茶上天竺白雲峯者名白雲茶蘇東坡詩有云白雲山下兩旗新又寶嚴院垂雲亭亦産茶東坡有僧怡然以垂雲新茶見餉報以大龍團戯作一律云妙供来香積珍烹具大官揀芽分雀舌賜茗出龍團曉日雲庵暖春風浴殿寒聊將試道眼莫作兩般看又嘗逰諸寺一日飲釅茶七碗戯書云示病維摩元不病在家靈運已忘家何須魏帝一丸藥且盡盧仝七碗茶又南屏謙師妙於茶事自云得心應手非可以言傳學到者贈之詩云道人曉出南屏山来試㸃茶三昧手怒驚午盞兎毛班打作春甕鵞兒酒天台乳花世不見玉川風腋今安有先生有意續茶經會使老謙名不朽盖西湖南北諸山及諸旁邑皆産茶而龍井徑山尤馳譽也西湖志餘賞花禁中賞花非一先期後苑及修内司分任排辦凡海苑亭榭花木粧㸃一新錦簾綃幕飛梭繡毬以至茵褥設放器玩盆窠珍禽異物各務竒麗又命小璫内司列肆闗撲珠翠冠朶箆環繡段畫領花扇官窑定器孩兒戯具閙竿龍船等物及有賣買果木酒食餅餌蔬茹之類莫不備具悉傚西湖景物起自梅堂賞梅芳春堂賞杏花桃源觀桃粲錦堂金林檎照粧亭海棠蘭亭修褉至於鍾美堂大花為極盛堂前三靣皆以花石為臺三層各植名品標以象牌覆以碧幕臺後分植玉繡毬數百株儼如鏤玉屏堂内左右各列三層雕花綵檻䕶以彩色牡丹畫衣間列碾玉水晶金壺及大食玻璃官窑等瓶各簪竒品如姚魏御衣黄照殿紅之類幾千朶别以銀箔間貼大斛分種數千百窠分列四靣至於梁棟牕户間亦以湘筒貯花鱗次簇挿何翅萬朶堂中設牡丹紅錦地茵自中殿妃嬪以至内官各賜翠葉牡丹分枝鋪翠牡丹御書畫扇龍涎金合之類有差下至伶官樂部應奉等人亦霑恩賜謂之隨花賞或天顔悦懌謝恩賜予多至數次至春暮則稽古堂會瀛堂賞瓊花靜侣亭紫笑淨香亭采蘭挑筍則春事已在綠隂芳草間矣大抵内宴賞初坐再坐挿金盤架者謂之排當否則但謂之進酒乾道三年春南内遣閤長至徳夀宫奏知連日天氣甚好欲恭邀車駕幸聚景園看花取自聖意定日太上云傳語官家備見聖孝但頻出不惟費用又且勞人本宫後園亦有幾株好花不若来日請官家過来閒看遂遣提舉官同到南内奏過遵依次早車駕與皇后太子過宫起居二殿訖先至燦錦亭進茶宣召吳郡王曾兩府已下六員侍宴同至後苑看花兩廊並是小内侍及幕士效學西湖鋪放珠翠花朶玩具疋帛及花籃閙竿市食等許從内人闗撲次至毬場看小内侍抛綵毬蹴鞦韆又至射㕔看百戯依例宣賜囘至清妍亭看荼䕷就登御舟繞堤閒逰亦有小舟數十隻供應雜藝嘌唱鼔板蔬菓無異湖中太上倚闌閒看適有雙燕掠水飛過令曾覿進詞賦遂進阮郎歸云栁隂庭院占風光呢喃春晝長碧波新漲小池塘雙雙蹴水忙萍散漫絮飛揚輕盈體態狂為憐流水落花香啣將歸畫梁既登舟知閤張掄進栁梢青云栁色初濃餘寒似水纖雨如塵一陣東風縠紋㣲皺碧沼鱗鱗仙娥花月精神奏鳳筦鸞絃鬬新萬嵗聲中九霞盃内長醉芳春曾覿和進云桃靨紅勻梨腮粉薄鴛徑無塵鳳閣凌虚龍池澄碧芳意鱗鱗清時酒聖花神看内苑風光又新一部仙韶九重鸞仗天上長春各有宣賜次至靜樂堂看牡丹進酒三盃太后邀太皇官家同到劉婉容奉華堂聴摘阮奏曲罷婉容進茶訖遂奏太后云近教得二女童瓊華綠華並能琴阮下棊冩字畫竹背誦古文欲得納與官家則劇遂令各逞伎藝併進自製阮譜三十曲太后遂宣賜婉容宣和殿玉軸沉香槽三峡流泉正阮一靣白玉九芝道冠北珠緣領道氅銀絹三百疋兩會子三百萬貫是日三殿並醉酉牌還内西湖志馬塍藝花如藝粟槖駞之技名天下往往發非時之品真足以侔造化通仙靈凡花之早放者名曰堂花其法以紙飾宻室鑿地作坎緶竹置花其上糞土以牛溲硫黄盡培溉之法然後置沸湯於坎中少候湯氣薰蒸則扇之㣲風盎然融淑之氣經宿則花放矣若牡丹梅花之類無不然獨桂花則反是盖桂必清凉而後放法當置之石洞巖竇間暑氣不到處鼓以凉颸養以清氣竟日乃開此雖揠而助長然必適其寒温之性而後能臻其妙癸辛雜識增補武林舊事巻二
