body:
  text: 增補武林舊事卷三宋周密原本明朱廷煥補西湖逰幸都人逰賞補八條淳熙間夀皇以天下養每奉德夀三殿逰幸湖山御大龍舟宰執從官以至大璫應奉諸司及京府彈壓等各乘大舫無慮數百時承平日久樂與民同凡逰觀買賣皆無所禁畫楫輕舫旁午如織至于果蔬羮酒關撲宜男戲具閙竿花籃畫扇綵旗糖魚粉餌時花泥嬰等謂之湖中土宜又有珠翠冠梳銷金綵段犀鈿髹漆織藤窑器玩具等物無不羅列如先賢堂三賢堂四聖觀等處最盛或有以輕橈趂逐求售者歌妓舞鬟嚴粧自衒以待招呼謂之水仙子吹彈舞拍雜劇雜扮撮㺯勝花泥丸鼓板投壺花彈蹴踘分茶㺯水踏滚水撥盆雜藝散耍謳唱息器教水族飛禽水傀儡鬻道術烟火起輪走線流星水爆風箏不可指數總謂之趕趂人蓋耳目不暇給焉御舟四垂珠簾錦幕懸掛七寶珠翠龍船梭子閙竿花籃等物宫姬韶部儼如神仙天香濃郁花栁避妍小舟時有宣喚賜豫如宋五嫂魚羮嘗經御賞人所共趨遂成富媪朱靜佳六言詩云栁下白頭釣叟不知生長何年前度君王逰幸賣魚收得金錢往往修舊京金眀池故事以安太上之心豈特事逰觀之美哉湖上御園南有聚景真珠南屏北有集芳延祥玉壺然多幸聚景一日御舟經斷橋橋旁有小酒肆頗雅潔中飾素屏風書風入松一詞於上光堯駐目稱賞久之宣問何人所作乃太學生俞國寶醉筆也其詞云一春長費買花錢日日醉湖邊玉驄慣識湖邊路驕嘶過沽酒樓前紅杏香中歌舞緑楊影裏鞦韆暖風十里麗人天花壓鬢雲偏畫船載取春歸去餘情付湖水湖烟明日重携殘酒來尋陌上花鈿上笑曰此詞甚好但末句未免儒酸因為改定云眀日重扶殘醉則逈不同矣即日命解褐云淳熙六年春車駕過宫請太上太后逰聚景園至會芳殿降輦上及皇后翠華殿降輦兩殿至瑶津少坐並乘步輦遍逰園中再坐瑶津西軒酒三行都管劉景供進新製泛蘭舟曲破吳興佑舞各賜銀絹上親捧玉酒船上夀酒斟船中人物皆動太上喜至錦壁賞花牡丹千餘叢各有牙牌金字别採好色千朵安頓花架並水晶玻璃天青汝窑金瓶中間放沉香卓安白玉碾花商尊髙三尺徑一尺三寸獨插照殿紅十五枝隨駕官各賜兩靣翠葉滴金牡丹沉香柄金絲御書扇各一把知閣張掄進壺中天詞云洞天深處賞嬌紅輕玉髙張雲幕國艷天香相競秀瓊苑風光如昨露洗妖妍風傳馥郁雲雨巫山約春光濃如酒五雲臺榭樓閣聖代道治功成一塵不動四境無鳴柝屢有豐年天助順基業增隆山嶽兩世眀君千秋萬嵗永享升平樂東皇呈瑞更無一片花落太上喜賜金杯盤法錦數事又至翠華登御舟入裏湖至斷橋入真珠園太上命買湖中魚鱉放生宣喚湖中買賣人等內侍用小旗招引各有支賜時有賣魚羮宋五嫂東京人太上念其老宣上船賜金錢十文銀錢百文絹十匹仍令後苑供應泛索至申時御舟稍泊花光亭至會芳少歇太上已醉上親扶上船乘轎都人傾城瞻嘆聖孝西湖志兩宫幸聚景園夜過萬松嶺索火炬三千趙從善命取諸瓦舍妓館蘆簾實以脂油卷而繩之繫于夾道松樹左右照耀如同白日西湖志西湖天下景朝昏晴雨四序總宜杭人亦無時不逰而春逰特盛承平時頭船如大緑間緑十樣錦百花寶勝眀玉之類何翅百餘其次不計數皆華麗雅靚誇竒競好都人凡締姻賽社會親送葬經會獻神仕宦恩賞之經營禁省臺府之囑託貴璫要地大賈豪民買笑千金呼盧百萬以至癡騃子密約幽期無不在焉日糜金錢靡有紀極杭諺有銷金鍋兒之號此語不為過也蘇子瞻守杭州春時每遇休暇必約客湖上早食於山水佳處飯畢每客一舟令隊長一人各領數妓任其所適晡後鳴鑼集之復㑹望湖樓或竹閣極歡而罷至一二鼓夜市猶未散列燭以歸城中士女夾道雲集觀之故其詩云逰舫巳粧吳榜穩舞衫初試越羅新又云映山黃帽螭頭舫夾道青烟雀尾爐誠熙世樂事也西湖志餘都城自過收燈貴逰巨室皆爭先出郊謂之探春至禁烟為最盛龍舟十餘綵旗疊鼓旁午曼衍粲如織錦內有曾經宣喚者則錦衣花帽以自别于衆京尹為立賞格競渡爭標內璫貴客賞犒無算都人士女兩堤駢集幾於無置足地水靣畫楫櫛比如魚鱗亦無行舟之路歌歡簫鼓之聲振動逺近其盛可以想見若逰之次第則先南而後北至午則盡入西泠橋裏湖其外幾無一舸矣辨陽老人有詞云看畫船盡入西泠閒却半湖春色蓋紀實也既而小泊斷橋千舫駢聚歌管喧奏粉黛羅列最為繁盛橋上少年郎競縱紙鳶以相勾牽剪截以線絶者為負此雖小伎亦有專門爆仗起輪走線之戲多設於此至花影暗而月華生始漸散去綘紗籠燭車馬爭門日以為常張武子詩云帖帖平湖印晚天踏歌逰賞錦相牽都城半掩人爭路猶有胡琴落後船最能狀此景茂陵在御略無逰幸之事離宫别館不復增修黃洪詩云龍舟大半沒西湖此是先皇節儉圗三十六年安靜裏櫂歌一曲在康衢理宗時亦嘗製一舟悉用香楠木搶金為之亦極華侈然終於不用至景定間周漢國公主得㫖偕駙馬都尉楊鎮泛湖一時文物亦盛髣佛承平之舊傾城縱觀都人為之罷市然是時先朝龍舫久已沉沒小舟號小烏龍者以賜楊郡王故尚在其舟平底有柁製度簡朴或傳此舟每出必有風雨余嘗屢乘初無此異也周文璞趙師秀數詩人春日薄逰湖山極飲西湖林橋酒壚皆大醉熟睡忽有髽髻道人過睨之哂曰詩仙醉耶顧酒家善看客我當代償酒錢索水小盂以瓢中藥少投之入口略嗽噀之地上皆精銀也時逰人方盛皆環視駭歎忽失道人所在薄暮諸公始醒酒家具道所以皆悵然自失其家持銀往市得錢止可酬所直了無贏餘明日喧傳都下酒家圗其事於壁目為遇仙酒肆好事者競趨之遂為湖上旗亭之甲癸辛雜識林外字豈鹿泉南人瀟爽不羈在上庠暇日獨逰西湖幽寂處得小旗亭飲焉外美丰姿角巾羽氅飄飄然神仙中人豫市虎皮錢篋數枚藏腰間每出其一命酒家保傾倒使視其數償酒直即藏云酒且盡復出之一篋傾倒如初逮暮飲幾斗餘不醉而篋中錢若循環無窮者肆人皆驚異將去索筆題壁間曰藥爐丹竈舊生涯白雲深處是吾家江城戀酒不歸去老却碧桃無限花明日都下盛傳某家酒肆有神仙至云癸辛雜識西湖巨麗唐初未聞自相里君韓僕射輩繼作五亭而靈竺之勝始顯白樂天搜竒索隱江山風月咸屬品題而佳境彌章蘇子瞻昭曠𤣥襟追踪遐躅南渡後英俊叢集昕夕流連而西湖底藴表襮殆盡雖其時法禁舒假長民者得以適性徜徉而府庫充盈羡餘可舉閭閻康裕募化有資故寺觀日益且髙僧真士又得與達官長者倡和逍遙故妝㸃湖山愈加繁媚今法禁嚴眀動有掣肘為吏兹土者上畏督察下惕誹議汨沒簿書修職救愆猶慮不給尚敢盤桓山水之間哉至於道院禪林日就崩廢緇黃之流服役追呼與氓𨽻等即有募化無過升斗蓋盛極而衰亦循環之理也西湖志宋時湖船大者一千料約長十餘丈容四五十人小者二三百料長四五丈容三二十人賈似道車船不煩篙櫓但用關輪腳踏而行其速如飛他若大緑間緑十樣錦勝金羈等船皆民間物也今時湖船比宋差小而檻牖敞豁便于倚眺如水月樓烟水浮居湖山浪跡尤勝童巨卿以子漢臣貴封御史行樂湖山手搆一室棟宇略具護以箔幕小可卷舒出則携之或栁堤花塢當心處席地布屋吟酌其中題曰雲水行亭編巨竹為桴放湖中隨波流止渺然蓮葉也月眀風清墜露淅淅吹洞簫蘆葦間山鳴谷應聞者冷然有出塵之想題曰煙波釣筏一時風致良可尚也西湖志湖山佳麗及逰覽之盛張文東西湖行已見其槩詩云僑居武林城慣識西湖景佳麗冠東南清標勝松潁兩山環繞翠屏開百雉縈紆錦帶回對列雙峯類巫峽孤生一嶼像蓬萊鳳凰古號龍飛地眀聖繇來顯靈異水浸平堤十二橋雲鎖南朝四百寺珠宫迢遞碧霞鮮寶塔崢嶸日月懸幽境行行足巖石深郊處處蓄林泉時當上巳春之暮都人士女紛無數畫船輕載緑萍風絲騎遍尋芳草路夏首香蓮艷碧池秋髙眀月漾金陂三冬霽雪偏堪賞四時晴雨總相宜憶昔宋皇南渡日紫蓋黃麾曾駐蹕御舟嬉水伎尤多禁園聚景名非一只今殿闕盡銷沉秪見荆榛滿舊岑茂陵玉碗幾時出建鄴銅臺何處尋我思先賢有遺愛白渠李井經千代逋仙梅鶴人共傳蘇公桃栁今猶在始信繁華一旦休不若聲名萬古流人生立功須及早何為宴逰以終老窮居集放春蔣苑使有小圃不滿二畞花朩匼匝亭榭竒巧春時悉以所有書畫玩器冠花器㺯之物羅列滿前戲效關撲有珠翠冠僅大如錢者閙竿花籃之類悉皆鏤絲玉金為之極其精妙且立標竿射垜及鞦韆梭門鬬雞蹴踘諸戲事以娛逰客衣冠士女至者招邀杯酒往往過禁烟乃巳蓋效禁苑具體而微者也社會補一條二月八日為桐川張王生辰霍山行宫朝拜極盛百戲競集如緋緑社雜劇齊雲社蹴毬遏雲社唱賺同文社耍詞角抵社相撲清音社清樂錦標社射弩錦體社花繡英略社使棒雄辨社小說翠錦社行院繪革社影戲淨髮社梳剃律華社吟呌雲機社撮㺯而七寶馬二會為最玉山寶帶尺璧寸珠璀璨奪目而天驥龍媒絨韉寶轡競賞神駿好竒者至剪毛為花草人物厨行果局窮極肴核之珍有所謂意思作者悉以通草羅帛雕為樓臺故事飾以珠翠極其精緻一盤直數萬然皆浮靡無用物不過資一玩耳竒禽則紅鸚白雀水族則銀蟹金龜髙麗華山之竒松交廣海嶠之異卉不可縷數莫非動心駭目之觀若三月三日殿司真武會三月二十八日東嶽生辰社會之盛大率類此不暇贅陳三月三日俗傳為北極佑聖真君生辰佑聖觀中修崇醮事士女拈香是日觀中有雀竿之戲樹長竿於庭髙可三丈一人攀緣而上舞蹈其顛盤旋上下有鷂子翻身金雞獨立鍾馗抹額玉兔搗藥之類變態多方觀者目瞪神驚汗流浹背為此技者如蝶拍鴉翻蘧蘧然自若也男女皆戴薺花諺云三春戴薺花桃李羞繁華西湖志祭掃補一條清眀前三日為寒食節都城人家皆插栁滿簷雖小坊幽曲亦青青可愛大家則加棗䭅于栁上然多取之湖隄有詩云莫把青青都折盡眀朝更有出城人朝廷遣臺臣中使宫人車馬朝饗諸陵原廟薦獻用麥糕稠餳人家上塜者多用棗䭅薑豉南北兩山之間車馬紛然野祭者尤多如大昭慶九曲等處婦人淚裝素衣提携兒女酒壺肴疊村店山家分餕逰息至暮則花栁土宜隨車而歸若玉津聚景御園包家山之桃關東青門之菜市東西馬塍尼菴道院尋芳討勝極意縱逰隨處各有買賣趕趂等人野果山花别有幽趣蓋輦下驕民無日不在春風歌舞中而逰手末伎為尤盛也從冬至數至一百五日即其節也是日傾城上塜兩山間車馬闐集酒尊食罍或張幕藉草並舫隨波日暮忘返蘇堤一帶桃栁隂濃紅翠間錯走索驃騎飛錢拋鈸踢木撒沙吞刀吐火躍圈斤斗舞盤及諸色禽蟲之戲紛然叢集外方優妓歌吹覔錢者接踵承應又有綵粧傀儡蓮船戰馬餳笙鼗鼓瑣碎戲具誘悅童曹者在在成市是夜人家貼清明嫁九娘一去不還鄉之句于楹壁間謂夏月無青蟲撲燈之擾僧道採揚桐葉染飯謂之青精飯以饋施主西湖志浴佛四月八為佛誕日諸寺院各有浴佛會僧尼輩競以小盆貯銅像浸以糖水覆以花棚鐃鈸交迎遍往邸第富室以小杓澆灌以求施利是日西湖作放生會舟楫盛多略如春時小舟競賣龜魚螺蚌放生髙峯和尚偈云呱聲未絶便稱尊攪得三千海嶽昏惡水一年澆一度知他雪屈是酬恩迎新户部㸃檢所十三酒庫例於四月初開煮九月初開清先是提領所呈樣品嘗然後迎引至諸所𨽻官府而散每庫各用匹布書庫名髙品以長竿懸之謂之布牌以木牀鐵擎為仙佛鬼神之類駕空飛動謂之臺閣雜劇百戲諸藝外又為漁父習間竹馬出獵八仙故事妓家女使褁頭花巾為酒家保有花褁五熟盤架放生籠養等各庫爭為新好庫妓琤琤者皆珠翠盛飾銷金紅背乘繡韉寶勒駿騎各有皂衣黃號私身數對訶𨗳於前羅扇衣笈浮浪間客隨逐於後少年狎客往往簇飣持杯爭勸馬首金錢綵段霑及輿臺所經之地髙樓邃閣繡幕如雲纍足駢肩真所謂萬人海也端午補一條先期學士院供帖子如春日禁中排當例用朔日謂之端一或傳舊京亦然插食盤架設天師艾虎意思山子數十座五色蒲絲百草霜以大合三層飾以珠翠葵榴艾花蜈蚣蛇蝎蜥蜴等謂之毒蟲及作糖霜韻果糖蜜巧粽極其精巧又以大金瓶數十遍插葵榴梔子花環繞殿閣及分賜后妃諸閣大璫近侍翠葉五色葵榴金絲翠扇真珠百索叉符經筒香囊軟香龍涎佩帶及紫練白葛紅蕉之類大臣貴邸均被細葛香羅蒲絲艾朵彩團巧粽之賜而外邸節物大率效尤焉巧粽之品不一至結為樓臺舫輅又以青羅作赤口白舌帖子與艾人並懸門楣以為禳禬道宫法院多送佩帶符篆而市人門首各設大盆雜植艾蒲葵花上掛五色紙錢排飣果粽雖貧者亦然湖中是日逰舫亦盛蓋迤邐炎暑晏逰漸稀故也俗以此日為馬本命凡御廄邸第上乘悉用五綵為鬃尾之飾竒韉寶轡充滿道途亦可觀玩也西湖競渡自二月八日為始端午尤盛是日畫舫齊開逰人如蟻龍舟六隻俱裝十太尉七聖二郎神雜劇飾以綵旗錦傘花籃閙竿鼓吹之類帥守往一清堂彈壓立標竿於湖中挂錦綵銀碗官楮以賞捷者有一小節級披黃衫青帽插孔雀尾乘小舟橫節仗聲喏取指揮次以舟回朝龍舟以綵旗招之諸舟鳴鑼鼓分兩翼逺近排列成行再以綵旗引之諸舟競發先至標所者取賞聲喏而退其餘犒錢而已吳子和賦喜遷鶯云梅霖初歇正綘色海榴爭開佳節角黍包金香蒲切玉是處玳筵羅列鬭巧盡輸年少玉腕綵絲雙結艤畫舫見龍舟兩兩波心齊發竒絶難畫處激起浪花翻作湖間雪畫鼓轟雷紅旗掣電奪罷錦標方徹望中水天日暮猶自珠簾髙揭棹歸晚載荷香十里一鈎新月西湖志禁中納凉禁中避暑多御復古選德等殿及翠寒堂長松修竹濃翠蔽日層巒竒岫靜窈縈深寒瀑飛空下注大池可十畝池中紅白菡蓞萬柄蓋園丁以瓦盎别種分列水底時易新者美觀又置茉莉素馨建蘭麝香藤朱槿玉桂紅蕉闍婆薝蔔等南花數百盆於廣庭鼓以風輪清芬滿殿御笐兩旁各設金盆數十架積雪如山紗厨後先皆懸掛伽蘭木真蠟龍涎等香珠百餘蔗漿金碗珍果玉壺初不知人間有塵暑也聞洪景盧學士嘗賜對於翠寒堂當三伏中體粟戰栗不可久立上問故笑遣中貴人以北綾半臂賜之則境界可想見矣都人避暑六月六日顯應觀崔府君誕辰自東都時廟食已盛是日都人士女駢集炷香已而登舟泛湖為避暑之逰時物則新荔枝軍庭李二果産閩奉化項里之楊梅聚景園之秀蓮新藕蜜筒甜瓜椒核枇杷紫菱碧芡來禽金桃蜜漬昌元梅木瓜豆兒水荔枝膏金橘水糰麻飲芥辣白醪凉水氷雪爽口之物關撲香囊畫扇涎花珠佩而茉莉為最盛初出之時其價甚穹婦人簇帶多至七插所直數十劵不過供一餉之娛蓋入夏則逰船不復入裏湖多占蒲深栁密寬凉之地披襟釣水月上始還好事者則敞大舫設蘄簟髙枕取凉櫛髮快浴惟取適意或留宿湖心竟夕而歸乞巧立秋日都人戴楸葉飲秋水赤小豆七夕節物多尚果食茜雞及泥孩兒號摩㬋羅有極精巧飾以金珠者其直不資併以蠟印鳬雁水禽之類浮水上婦女夜對月穿針餖飣杯盤飲酒為樂謂之乞巧以小蜘蛛貯合內候結網踈密為得巧之多少小兒女多衣荷葉半臂手持荷葉效顰摩㬋羅七夕前修內司例進摩㬋羅十卓每卓三十枚大者髙三尺或用象牙雕鏤或用龍涎拂手香製造悉用鏤金珠翠衣帽金錢叉鋜佩環真珠頭鬚及手中所執戲具皆七寶為之各護以五色鏤金紗厨制閫貴臣及京府等處至有鑄金為貢者宫姬市娃冠花衣領皆以乞巧時物為飾中元補一條七月十五日道家謂之中元節各有齊醮等會僧寺則於此日作盂蘭盆齊人家亦以此日祀先例用新米新醬冥衣時果綵段麵棊茹素者幾十八九屠門為之罷市中元節俗傳地官赦罪之辰人家多持齊誦經薦奠祖考攝孤判斛屠門罷市僧家建盂蘭盆會放燈西湖及塔上河中謂之照冥官府亦祭郡厲邑厲壇張伯雨西湖放燈詩云共泛蘭舟燈火閙不知風露濕青冥如今池底休鋪錦此夕槎頭直掛星爛若金蓮分夜炬空於雲母隔秋屏却憐牛渚清狂甚苦欲燃犀走百靈劉邦彥詩云金蓮萬朵漾中流疑是潘妃夜出逰光射魚龍離窟宅影搖鴻鳥亂汀洲凌波未必通銀浦趂月偏憐近綵舟忽憶少年清泛處滿身風露獨憑樓西湖志中秋禁中是夕有賞月延桂排當如倚桂閣秋暉堂碧岑皆臨時取㫖夜深天樂直徹人間御街如絨線蜜煎香鋪皆鋪設貨物誇多競好謂之歇眼燈燭華燦竟夕乃止此夕浙江放一㸃紅羊皮小水燈數十萬盞浮滿水靣爛如繁星或謂此乃江神所喜非徒事觀美也觀潮補八條浙江之潮天下之偉觀也自既望以至十八日為最盛方其逺出海門僅如銀線既而漸近則玉城雪嶺際天而來大聲如雷霆震撼激射吞天沃日勢極雄豪楊誠齊詩云海濶銀為郭江橫玉繫腰者是也每嵗京尹出浙江亭教閲水軍艨艟數百分列兩岸既而盡奔騰分合五陳之勢并有乘騎㺯旗標搶舞刀於水靣者如履平地倐爾黃烟四起人物略不相覩水爆轟震聲如崩山烟消波靜則一舸無迹僅有敵舟為火所焚隨波而逝吳兒善泅者數百皆被髮文身手持十幅大綵旗爭先鼓勇泝迎而上出沒於鯨波萬仞中騰身百變而旗尾略不霑濕以此誇能而豪民貴宦爭賞銀綵江干上下十餘里間珠翠羅綺溢目車馬塞途飲食百物皆倍于常時而僦賃看幕雖席地不容間也禁中例觀潮於天開圖畫髙臺下瞰如在指掌都民遙瞻黃繖雉扇於九霄之上真若簫臺蓬島也淳熙十年八月十八日駕詣德夀宫迎上皇觀潮先期浙江亭􅎲縛席屋五十間用綵纈幕帟上皇至賜從官酒食並免侍班聽從便觀看先是澉浦金山都統司水軍五千人抵下江至是又命殿司新剌防江水軍臨安府水軍並行閲試軍船擺開西興龍山兩岸近千隻管軍官於江靣分布五陳乘騎㺯旗標舞刀如履平地㸃放五色烟炮滿江烟收炮息諸般皆不見自龍山以下貴邸豪民綵幕綿亘二十餘里幾無行路西興一帶亦縛幕次綵繡照江如鋪錦市井㺯水者憎兒留住等凡百餘人皆手持十幅綵旗踏浪爭雄直至海門迎潮又有踏滚木水傀儡水百戲撮㺯各呈伎藝上皇喜曰錢唐形勝天下所無上起奏曰江潮亦天下所獨宣諭侍官各賦酹江月一曲以吳琚為第一其詞云玉虹遙挂望青山隱隱如一抹忽覺天風吹海立好似春霆初發白馬凌空瓊鼇駕水日夜朝天闕飛龍舞鳳鬱葱環拱吳越此景天下應無東南形勝偉觀真竒絶好是吳兒飛綵幟蹴起一江秋雪黃屋天臨水犀雲擁看擊中流楫晚來波靜海門飛上眀月兩宫賞賜無限至月上始還西湖志江在郡城東南登西湖諸山則大略可瞰其源發自徽州曲折而東以入於海故名浙江亦曰浙河其潮晝夜再上諸家立說不同宋時郡志載姚寬西溪叢語及徐叔眀髙麗録二篇大抵皆云潮隨日而應月依隂而附陽元時褧伯宣作浙江潮候圗說文多不載西湖志白樂天看潮詩早潮才落晚潮來一月周流六十回不獨光隂朝復暮杭州老去被潮催羅隱江潮詩怒聲洶洶勢悠悠羅剎江邊地欲浮謾道往來存大信也知翻覆向平流任拋巨浸疑無地猛過西陵只有頭至竟朝昏誰主宰好騎赤鯉問陽侯蘇子瞻中秋看潮五絶定知玉兔十分圎已作霜風九月寒寄語重門休上鑰夜潮留向月中看萬人鼓譟懾吳儂猶似浮江老阿童欲識潮頭髙幾許越山渾在浪花中江邊身世兩悠悠久與滄波共白頭造物亦知人易老故教江水向西流吳兒生長狎濤淵冒利輕生不自憐東海若知明主意應教波浪變桑田江神河伯兩醯雞海若東來氣吐霓安得夫差水犀手三千强弩射潮低西湖志張文東江上四時歌碧水金沙麗逺天青堤翠栁染芳烟浪泛桃花如濯錦波開萍葉類投錢赤日丹江雲氣流蘭橈桂楫遡中洲捐珮已臨江女浦采蓮還並越人舟秋月輸光委玉波秋江騰影接銀河斗間海客年年至天漢仙槎嵗嵗過穹海𤣥雲晝亦昏黃風白雪遍江村山隂豪客堪乘興南汝髙人獨閉門瀕江人好踏浪翻波名曰㺯潮宋治平中郡守蔡襄作戒㺯潮文斗牛之分吳越之中惟江濤之最雄乘秋風而益怒乃其俗習於此觀逰厥有善泅之徒競作㺯潮之戲以父母所生之遺體投魚龍不測之深淵自為矜夸時或沉溺精魄永淪於泉下妻孥望哭於水濱生也有涯盍終於天命死而不弔重棄於人倫推豫不忍之心伸爾無窮之戒所有今年觀潮並依常例其軍人百姓輒敢㺯潮必行科罰西湖志錢唐江錢氏時為石隄隄外又植大材十餘行名曰滉柱蓋以折水之勢不與水爭力故隄得無患也寶元康定間人有獻議取滉柱者謂可得良材數十萬杭帥然之木出皆不可用而隄為濤激寖就摧决矣後人不知前人之用心輕變其制其患有如此者吁可戒哉杭州府志浙江一名錢唐一名羅剎所謂羅剎者江心有石即秦望山腳橫截波濤中商旅船到此多值風濤傾覆遂呼云事見吳越僧贊寧傳載中郎瑛七修類稿至正壬辰癸巳間浙江潮不波其時彭和尚以妖術為亂陷饒信杭徽等州未幾尅復又為張九四所據浙西不復再為元有昔宋末海潮不波而宋亡元末海潮不波而元亡亦天數之一終也蓋杭州是閙潮不閙是其變葉子竒草木子重九補一條禁中例於八日作重九排當於慶瑞殿分列黃菊燦然眩眼㸃菊燈略如元夕內人樂部亦有隨花賞如前賞花例蓋賞燈之宴權輿於此自是日盛矣或於清燕殿綴金亭賞橙橘遇郊祀嵗則罷宴都人是月飲新酒泛茰簪菊各以菊糕為饋以糖肉秫麵雜糅為之上縷肉絲鴨餅綴以榴顆標以綵旗又作蠻王獅子於上及糜栗為屑合以蜂蜜印花脫餅以為果餌又以蘇子微漬梅滷雜和蔗霜梨橙玉榴小顆名曰春蘭秋菊雨後新凉則已有炒銀杏梧桐子吟呌於市矣霜降日帥府致祭旗纛神因而張列軍器以金鼓𨗳之繞街迎賽謂之揚兵旗幟刀㦸弓矢斧鉞盔甲種種精明有飈騎數十飛轡往來逞㺯解數如雙燕綽水二鬼爭環隔肚穿針枯松倒掛魁星踢斗夜乂探海八蠻進寶四女呈妖六臂哪吒二仙傳道圯橋進履玉女穿梭擔水救火踏梯望月之屬窮態極變難以殫名騰躍上下不離鞍鐙間猶猿猱之寄木也西湖志開爐補二條是日御前供進夾羅御服臣僚服錦襖子夾公服授衣之意也自此御爐日設火至眀年二月朔止皇后殿開爐節排當是月遣使朝陵如寒食儀都人亦出郊拜墓用綿毬楮衣之類十月朔日人家祭奠祖考或舉掃松澆墓之禮十五日為下元節俗傳水官解厄辰亦有持齊誦經者立冬日以各色香草及菊花金銀花煎湯沐浴謂之掃芥西湖志冬至補一條朝廷大朝會慶賀排當並如元正儀而都人最重一陽賀冬車馬皆華整鮮好五鼓已填擁雜遝於九街婦人小兒服飾華炫往來如雲嶽祠城隍諸廟炷香者尤盛三日內店肆皆罷市垂簾飲博謂之做節享先則以餛飩有冬餛飩年􅻞飥之諺貴家求竒一器凡十餘色謂之百味餛飩冬至謂之亞嵗官府民間各相慶賀一如元日儀吳中最盛故有肥冬瘦年之說舂粢糕以祀先祖婦女獻鞋襪於尊長亦古人履長之義杭州府志賞雪禁中賞雪多御明逺樓禁中稱楠木樓後苑進大小雪獅子並以金鈴綵縷為飾作雪花雪燈雪山滴酥為花並金盆盛進以供賞玩并造雜煎品味如春盤餖飣羊羔兒酒以賜併於內藏庫支撥官劵數百萬以犒諸軍令臨安府分給貧民或皇后殿别自支犒貴家富室亦各以錢米犒閭里之貧者嵗除補一條禁中以臘月二十四為小節夜三十日為大節夜呈女童驅儺裝六丁六甲六神之類大率如夢華所載後苑修內司各進消夜果大合簇飣凡百餘種如蜜煎珍果花餳箕豆以至玉杯寶器珠翠花朵犀象博戲之具銷金斗葉諸色戲㺯物無不備具皆極小巧又於其上作玉輅髙至三四尺悉以金玉等為飾護以貼金龍鳳羅罩竒侈求勝一合之費不啻中人十家之産止以資天顔一笑耳后妃諸閣又各進嵗軸兒及珠翠百事吉利市袋兒小樣金銀器皿并隨年金錢一百二十文旋亦分賜親王貴邸宰臣巨璫至於爆仗有為果子人物等類不一而殿司所進屏風外畫鍾馗捕鬼之類內藏藥線一爇連百餘不絶簫鼓迎春雞人警唱而玉漏漸移金門巳啓矣除夕更深人靜或有禱竈請方抱鏡出門窺聽市人無意之言以卜來嵗休咎是日官府封印不復僉押至新正三日始開諸行亦皆罷市往來邀飲蓋杭人奢靡不論貧富俱競市什物以慶嘉節光飾門户塗潤婦女衣服叉環之屬更造一新皆故都遺俗也郡志嵗晚節物補一條臘月賜宰執親王三衙從官內侍省官并外閫前宰執等臘藥係和劑局方造進及御藥院特㫖製造銀合各一百兩以至五十兩三十兩各有差伏日賜暑藥亦同都下自十月以來朝天門內外競售錦裝新厯諸般大小門神桃符鍾馗狻猊虎頭及金綵縷花春帖幡勝之類為市甚盛八日則寺院及人家用胡桃松子乳菌柿栗之類作粥謂之臘八粥醫家亦多合藥劑侑以虎頭丹八神屠蘇貯以絳囊饋遺大家謂之臘藥至於餽嵗盤合酒擔羊腔充斥道路二十四日謂之交年祀竈用花餳米餌燒替代作糖豆粥謂之口數市井迎儺以鑼鼓遍至人家乞求利市除夜則比屋以五色錢紙酒果迎送六神於門至夜蕡燭籸盆紅映霄漢爆竹鼓吹之聲喧闐徹夜謂之聒㕔小兒女終夕博戲不寐謂之守嵗又眀燈牀下謂之照虛耗及貼天行帖兒財門於楣祀先之禮則或昏或曉各有不同如飲屠蘇百事吉膠牙餳燒术賣懵等事率多東都遺風守嵗之詞雖多極難其選獨楊守齊一枝春最為近世所稱併書於此竹爆驚春競喧闐夜起千門簫鼓流蘇帳暖翠鼎緩騰香霧停杯未舉奈剛要送年新句應自賞歌字清圎未誇上林鶯語從他嵗窮日暮縱閒愁怎減劉郎風度屠蘇辦了迤邐栁欣梅妬宫壺未曉早驕馬繡車盈路還又把花朝自今細數除夕先期具羊豕酒果或三牲報祀城隍百神至日致奠祖先并懸掛影像於堂以申瞻慕及夕先炳燭炷香於各神前焚楮幣以送舊神畢架松柴門外焚之有齊房簷者謂之籸盆有喪之家止焚于堂中爐內已而張燈熾炭合坐宴飲謂之分嵗古有守嵗之宴言為達曙飲也今至夜分而止故杭俗謂之分嵗杭俗崇尚釋老其來已久每值相傳仙佛誕辰多往炷香設會如正月六日南山法相寺九日城中宗陽宫玉皇殿十五日吳山三官廟七月十月望日同二月十九日西山天竺寺觀音殿三月三日城中佑聖觀二十八日古蕩東嶽廟六月二十四日北山雷院如此類者未能悉舉杭州府志增補武林舊事卷三
