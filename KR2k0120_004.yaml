body:
  text: 增補武林舊事巻四宋周宻原本明朱廷煥補故都宫殿補十條錢氏建國築城自秦望山繇夾城東亘江干薄錢唐湖霍山范浦凡七十里城門凡十曰朝天門在吳山下今鎮海樓曰龍山門在六和塔西曰竹車門在望僊橋東南曰新門在炭橋東曰南土門在薦橋門外曰北土門在舊菜市門外曰鹽橋門在舊鹽橋西曰西闗門在雷峯塔下曰北闗門在夾城巷曰寶徳門在艮山門外無星橋其城垣南北展而東西縮唐乾寧間楊行宻將攻杭州携僧祖肩宻来瞰城祖肩曰此腰鼓城也擊之終不可得又聞鼓角聲曰錢氏子孫當貴盛未可圗也其營屯凡六曰白壁營在城南上隅曰寶劍營在鍾公橋北曰青字營在鹽橋東曰福州營在梅家橋東曰馬家營在修文坊内曰大路營在褚家塘西湖志紹興因錢王宫以為行宫皇城九里入和寧門左進奏院玉堂右中殿外庫至北宫門循廊左序巨璫幕次列如魚貫祥曦殿朶殿接修廊為後殿對以御酒庫御藥院慈元殿外庫内侍省内東門司大内都巡檢司御厨天章等閣廊回路轉衆班排列乂轉内藏庫對軍器庫又轉便門垂拱殿五間十二架修六丈廣八丈四尺簷屋三間修廣各丈五朶殿四兩廊各二十間殿門三間内龍墀折檻殿後擁舍七間為延和殿右便門通後殿殿左一殿隨時易名明堂郊祀曰端誠䇿士唱名曰集英宴對奉使曰崇徳武舉及軍班授官曰講武東宫在麗正門内南宫門外本宫會議所之側入門垂楊夾道間芙蓉環朱闌二里至外宫門節堂後為財帛生料二庫環以官屬直舍轉外窑子入内宫門廊右為賛𨗳春坊直舍左講堂七楹扁新益外為講官直舍正殿向眀左聖堂右祠堂後凝華殿瞻箓堂環以竹左寢室右齊安位内人直舍百二十楹左彛齋太子賜號也接繡香堂便門通繹已堂重簷複屋昔楊太后垂簾於此曰慈明殿前射圃竟百步環修廊右博雅樓十二間左轉數十歩雕䦨花甃萬卉中出秋千對陽春亭清霽亭前芙蓉後朩樨玉質亭梅繞之繇繹已堂過錦臙廊百八十楹直通御前廊外即後苑梅花千樹曰梅崗亭曰氷花亭枕小西湖曰水月境界曰澄碧牡丹曰伊洛傳芳芍藥曰冠芳山茶曰鶴丹桂曰天闕清香堂曰本支百世祐聖祠曰慶和泗洲曰慈濟鍾吕曰得真橘曰洞庭佳味茅亭曰昭儉朩香曰駕雪竹曰賞靜松亭曰天陵偃盖以日本國松木為翠寒堂不施丹雘白如象齒環以古松碧琳堂近之一山崔嵬作觀堂為上焚香祝天之所吳知古掌焚修毎三茅觀鐘鳴觀堂之鐘應之則駕興山背芙蓉閣風帆沙鳥咸出履舄下山下一溪縈帶通小西湖亭曰清漣怪石夾列獻瑰逞秀三山五湖洞穴深杳豁然平朗翬飛翼拱凌虚樓對瑞慶殿損齋緝熈崇正殿之東為欽先孝思復古紫宸等殿木圍即福寧殿射殿曰選徳坤寧殿貴妃昭儀媫妤等位宫人直舍螘聚焉又東過閣子庫睿思殿儀鸞修内八作翰林諸司是謂東華門陳隨應南渡行宫記門麗正南門和寧北門東華東門西華西門苑東苑西北宫南宫南水門東水門會通上閤宣徳隔門斜門闗門玉華閣含和貽謨二門係天章閣殿垂拱常朝四參文徳六參宣布大慶明堂朝賀紫宸生夀集英䇿士以上謂之正朝亦有隨事更名者後殿延和宿齋避殿崇政即祥曦福寧寢殿復古髙宗建選徳孝宗建御屏有監司郡守姓名緝熈理宗建熈明即修政度宗建明華清燕膺福慶瑞即順慶理宗改射殿需雲大燕符寳貯恭膺天命之寶嘉明度宗以繹已堂改明堂即文徳合祭改坤寧皇后穠華皇后慈眀楊太后累朝母后皆旋更名慈元謝太后仁眀全太后進食即勤政欽先神御孝思神御清華堂翠寒髙宗以日本羅木建古松數十株澄碧觀堂芳春凌寒鍾美牡丹燦錦海棠燕喜靜華清賞稽古御書院清逺清徹澄碧水堂蘂淵環香山堂文圃御書院書林華館衍秀披香徳勤雲錦荷堂清霽蕚綠華梅堂度宗易名瓊姿碧琳凝光澄輝繡香呈芳會景青花石柱香楠袱額瑪瑙石砌正始后殿謝后改夀寧殿怡然恵順位信美婉容位齋損齋髙宗建彛齋謹習齋燕申齋樓博雅書樓觀徳萬景清暑清美眀逺倚香閣龍圗太祖太宗天章真宗並祀祖宗神御寶文仁宗顯謨神宗徽猷哲宗敷文徽宗煥章髙宗華文孝宗寶謨光宗寶章寧宗顯文理宗雲章度宗御書清華凌虚清漏倚桂來鳳觀音芙蓉萬春太后殿臺欽天奉天宴春秋芳天開圗畫舒嘯蹌臺軒晚清閣清華睿思怡真容膝受釐綠綺觀雲濤亭清泳清趣清暉清顥清逈清隠清寒清激放水清翫清興靜香靜華春妍春華春陽春信梅融春尋春映春餘春留春皆春寒碧寒香香瓊香玉梅香界碧岑灔碧魚池瓊英瓊秀明秀深秀假山衍秀濯秀錦煙錦浪桃花繡錦萬錦麗錦叢錦照粧海棠浣綺綴金橙橘綴瓊梨花穠香暗香晚節香菊巖香桂雲岫山亭映波含暉達觀秀野凌寒梅竹涵虚平津真實芳逺垂綸近池魚樂池上噴雪放水流芳芳嶼山子玉質此君竹聚芳延芳蘭亭激湍崇峻惠和浮醴泛羽並流杯亭凌穹山頂迎薫會英正已射亭丹暉凝光雪逕梅參月共樂迎祥瑩粧植杖村莊可樂文杏壺中天别是一家春度宗初剏或謂此非佳䜟也未幾果驗園小桃源杏塢梅岡瑶圃村莊桐朩園菴寂然怡真坡瑪瑙洗馬橋萬嵗清平春波玉虹泉穗泉御舟蘭橈荃橈旱船教塲南教塲北教塲禁中及徳夀宫皆有大龍池萬嵗山擬西湖冷泉飛來峯若亭榭之盛御舟之華則非外間可擬春時競渡及買賣諸色小舟並如西湖駕幸宣喚錫賚鉅萬大意不欲數蹕勞民故以此為奉親之娛耳御園聚景園清波門外孝宗致養之地堂扁皆孝宗御書淳熈中屢經臨幸嘉泰間寧宗奉成肅太后臨幸其後並皆荒蕪不修髙踈寮詩云翠華不向苑中來可是年年惜露臺水際春風寒漠漠官梅却作野梅開會芳殿瀛春堂攬逺堂芳華堂花光亭八角瑶津翠光桂景灔碧凉觀瓊芳彩霞寒碧栁浪橋學士橋玉津園嘉會門外紹興間北使燕射於此淳熈中孝宗兩幸紹熈中光宗臨幸富春園新門外孝宗奉太后臨幸不一俗呼東花園屏山園錢湖門外以對南屏山故名理宗朝改名翠芳園餘見西湖門玉壺園錢塘門外本劉鄜王園有明秀堂餘見西湖門集芳園葛嶺元繫張婉儀園後歸太后殿内有古梅老松甚多理宗賜賈平章舊有清勝堂望江亭雪香亭等餘見西湖門瓊華園小隠園延祥園西依孤山為林和靖故居花寒水潔氣象幽古三朝臨幸餘見西湖門瀛嶼在孤山之椒舊名涼堂四壁蕭照畫山水理宗易今名今為太一宫黄庭殿挹翠堂舊名黑漆堂理宗御書清新舊六椽堂香月倚裏湖舊名水堂理宗御書香逺舊秀蓮亭白蓮堂六一泉堂檜亭梅亭上船亭東西車馬門西村水閣御舟港林逋墓陳朝檜有御書詩金沙井瑪瑙坡六一泉髙疎寮詩云水眀一色抱神州雨壓輕塵不敢浮山北山南人喚酒春前春後客凭樓射熊館暗花扶屐下鵠池深栁拂舟白髪邦人能道舊君王曾奉上皇逰徳夀宫孝宗奉親之所聚逺樓髙宗雅愛湖山之勝恐數蹕煩民乃於宫内鑿大池引水注之以象西湖冷泉疊石為山作飛來峯因取坡詩頼有髙樓能聚逺一時収拾與人間名之周益公進端午帖子云聚逺樓髙靣靣風冷泉亭下水溶溶人間炎熱何繇到真是瑶臺第一重孝宗御製冷泉亭詩以進髙宗和韻真盛事也香逺堂荷清深堂竹松菊三徑菊芙蓉竹梅坡月榭清妍荼􅐘清新桂芙蓉岡已上並東地分射㕔載忻堂御宴之所臨賦荷池粲錦金林檎至樂池上清曠半綻紅郁李瀉碧金魚池已上並南地分冷泉堂古梅文杏館靜樂牡丹浣溪海棠已上並西地分絳華羅朩堂旱船俯翠茅亭已上並北地分重華宫孝宗内禪所居即徳夀宫慈福宫憲聖夀成二太后所居即重華宫夀慈宫即慈福宫初改重夀宫東宫資善堂鳳山樓榮觀堂玉淵堂清賞堂新益堂繹已堂射圃行都之山肇自天目清淑扶輿鍾而為吳儲精發祥肇應宅緯負山之址門曰朝天南循其陿為太宫又南為相府斗抜起數峯為萬松八盤嶺下為鈞天九重之居右為複嶺設周廬之衛止焉朝天之東橋曰望僊仰眺吳山如卓馬立顧紹興間望氣者以為有鬱葱之符秦檜顓國心利之請為賜第東偏即檜家廟西則一徳格天閣故居也非望挻凶鬼瞰其室檜卒於位熺猶戀戀不能决去請以姪常州通判烜為光祿丞留涖家廟為復居之萌芽言者風聞遂請罷烜併遷廟主扵建康遂空其居髙宗倦勤詔即其所築新宫賜名徳夀居之膺天下養者二十有七年清蹕躬朝嵗時燁奕重華繼御更慈福夀慈凡四侈鴻名宫室皆無所更稍北連甍為今祐聖觀盖普安故邸莊文魏王光宗皇帝實生是間今上亦於此開甲觀之祥益知天瑞地靈章明有待斗筲負乗固莫得而妄據云岳珂桯史光宗内禪議修泰安宫太上重於趍御太學錄湯璹貽書趙汝愚引唐武徳九年八月甲子太宗即位於東宫顯徳殿至貞觀二年四月乙亥太上皇徙居泰安宫甲午太宗始御太極殿則是聴政於東宫者三年不遽遷髙祖也今日或可仿比别營聴政之所上皇仍居大内事體順甚汝愚答書稱其援據精博深合事宜越九日有㫖秋暑方隆太上皇帝皇后宜用唐武徳貞觀故事仍還宫因名宫以夀康泰安之役遂寢吁璹能引古義以處大事汝愚能用善以安國家璹之學汝愚之徳共可與也夫使無學而不能用善者處此能不失天性之懿乎姜南蓉塘詩話杭城佑聖觀宋孝宗邸開元宫寧宗邸後為理宗端孝公主之第龍翔宫理宗潜邸舊在後市街元至元中遷於城西北隅宗陽宫度宗邸郎瑛七修類稿淳熈九年八月十五日孝宗過徳夀宫起居上皇釣魚為樂遂留賞月宴香逺堂堂東有萬嵗橋橋皆白玉石雕欄瑩徹上作四靣亭皆新羅白朩與橋一色大池十餘畝植千葉白蓮御榻屛几酒器俱用水晶南岸列女樂北列男樂月上簫韶齊作稍止上皇召小劉妃獨吹白玉笙霓裳中序時侍燕官開府曾覿進壺中天詞云素颷漾碧看天衢稳送一輪明月翠水瀛壺人不到比似世間秋别玉手瑶笙一時同色小按霓裳疊天津橋上有人偷記新闋當日誰幻銀橋阿瞞兒戲一笑成痴絶肯信羣僊髙宴處移下水晶宫闕雲海塵清山河影滿桂冷吹香雪何勞玉斧金甌千古無缺上皇大喜曰從来月詞不曾用金甌事可謂新竒賜金束帶紫畨羅水晶碗上亦賜寶盞至一更五㸃還宫是夜西興亦聞天樂焉孝宗退居重華宫有淨室終日宴坐其間几上惟書籍一部及筆硯楮墨而已近璫嘗奏髙宗皇帝留下寶器圗畫陛下盍時取觀夀皇云先帝中興功徳盛大故宜享此朕豈敢自比先帝皆鏁閉不開近璫奏修重華宫舊例須闗朝廷出錢下臨安府轉運司應辦夀皇曰此間無用錢處所積甚多只用重華庫錢不必闗聞南内暨役成更不官差一匠一夫髙宗南渡駐蹕臨安草剏禁苑為行在所適造一殿無瓦而值雨臨安府與漕司皆憂之忽一吏白曰多差兵士以錢鏹分俵闗廂鋪席賃借樓屋腰簷瓦若干候旬月新瓦到照數陪還府司從之殿瓦咄諾而辦以上西湖志臨安玉牒殿災延及殿門宰臣以門字有勾脚帶火筆故招火厄遂撒額投火中乃息後書門額者多不勾脚馬氏日抄孤山凉堂規模壯麗下植梅數百株以備㳺幸堂成中有素壁四堵幾三丈髙宗翌日命駕有中貴人相語曰官家所至壁乃素耶宜繪壁亟令御前蕭照圖繪山水照受命即乞尚方酒四斗昬出孤山毎一鼔即飲一斗盡一斗則一堵已成畫若此者四畫成蕭亦醉駕至周行視壁間為之歎賞知為照畫賜以金帛杭州府志增補武林舊事卷四
