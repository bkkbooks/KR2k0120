body:
  text: 增補武林舊事巻七宋周宻原本明朱廷煥補湖山勝槩下北山吴山北山路補二十條自豐樂樓北沿湖至錢塘門外入九曲路至徳勝橋南印道堂小溜水橋黄山橋掃帚塢鮑家田青芝塢玉泉駞巘棲霞嶺東山衕霍山昭慶教塲水磨頭葛嶺九里松靈隠寺石人嶺西溪路止三天竺附栁洲龍王廟名會靈所謂栁洲五龍王也惠明院舊名資福今呼栁洲寺其地舊為通元菴上船亭養魚荘楊郡王府環碧園楊郡王府堂扁皆御書迎光樓張循王府劉氏園内侍劉公正所居一清堂後改玉蓮競渡争標於此菩提院舊名惠嚴與昭慶寺相連有靈感大悲像閣綠野白蓮堂碧軒四觀軒南漪迎薰澄心涵碧玉壺氍毺今廢玉壺御園楊和王水閣賈府上船亭錢塘門上船亭秀邸新園謝府園有一碧萬頃堂隠秀園劉鄜王府先得樓即古望湖樓坡詩云望湖樓下水連天是也擇勝園秀邸有御書擇勝愛閒二堂九曲城下法濟院舊名觀音院有明爽二軒五聖廟有蘇漢臣畫壁妙因院元係慈光菴寳嚴院真覺尼院元係隠静菴錢氏園華亭錢府新嶽廟東湖道院關王廟舊滿路種桃號半道紅古北關楊府廨宇楊郡王府今捨為寺玉虛觀崇果院徳勝橋南舊名羅漢印道堂趙郭園羅漢院史府今為慧日寺水丘園西隠精舍豐樂院鐵佛寺梅岡御園張氏園王氏園小溜水橋精進院齋官舊名精修延慶院澄寂院桃花衕黄山橋掃帚塢萬花小隠謝府園常清宫沂王功徳聚秀園楊府鮑家田秀野園謝府南禪資福尼寺極樂尼寺思故塔屠虛聖昭廟廣慧侯資夀院元係大聖菴明覺院舊名報先有虚心軒永菴閻府萬安院舊名清化永安慈聖院舊名慈雲潘李二貴妃殯所有聖水池大旱不涸羅寺妙智院舊名報國觀音玉泉淨空院泉色清澈蓄大金魚有龍王祠西觀音山青芝塢愍忠資福普向院楊和王建専充殿前諸軍功徳及為諸軍葬上關寺内侍閻少師功徳名崇先顯慶竹所杜北山墓汝能字叔謙太后諸孫居麴院能詩有聲天清宫女冠靈峰院裴氏功徳裴墳有雙節亭駝巘嶺靈耀觀西峰净嚴院感義郡王功徳大明院圓眀崇福禪寺岩阿有井泉極清冽内侍霍汝弼功徳棲霞嶺神仙宫有偃松如龍名御愛松乾濕水洞有一寺在側净元觀妙明院東山衕不空院舊名傳經永安院元係吴秦王府香火菴有青芬亭䕶國仁王禪寺後有龍洞龍王祠在焉西靖宫女冠寧國院廣照院霍山長慶院舊名華嚴菴主張王香火張王廣惠廟永慶院光相塔院山水甚竒湧泉髙宗嘗取瀹茗清心院舊名湧泉瑶池園吕氏金輪梵天院舊名金輪寺後即巾子峰寳勝院舊名應天金牛䕶法院洞明菴天龍洞道者開無門所居雲洞園楊和王府有萬景天全方壺雲洞瀟碧天機雲錦紫翠間濯纓五色雲玉龍玲瓏金粟洞天砌臺等處花朩皆蟠結香片極其華潔盛時凡用園丁四十餘人監園使臣二名大昭慶寺與前菩提寺相連舊名菩提寺有戒壇昭慶律寺晉天福間吴越王建宋乾徳二年重修太平興國三年建戒壇於寺中每嵗三月三日海内緇流雲集於此推其長老能通五宗諸典者登壇説法敷陳具戒其徒跪而聽之名曰受戒至今行之天禧初有圓浄法師學廬山慧逺結白蓮社縉紳之士與會者二十餘人運使孫和為之記南渡後以其地為策選鋒軍教場尋復為寺西湖志策選鋒教塲古栁林錢塘縣尉司舊有平湖軒英遊閣又有片石周益公字之曰竒俊盖相傳為王子髙舊居故也葛嶺路水磨頭石函橋有水閘泄湖水入下湖唐刺史李泌建有水閘泄湖水以入下湖沿東西馬塍羊角埂至歸錦橋凡四派白樂天記畧云北有石函南有筧決湖水一寸可溉田十五餘頃每一復時可溉五十餘頃其去郡别州民詩云耆老遮歸路壺漿滿别筵甘棠無一樹那得淚澘然税重多貧戸農饑足旱田惟留一湖水與汝救荒年西湖志放生亭徳生堂理宗御書泳飛亭理宗御書總宜園本張太尉後歸趙平逺淇今為西太乙宫大吴園小吴園水月園紹興中賜楊和王孝宗撥賜嗣秀王水月瀛燕堂玉林堂皆御書兠率院葛嶺葛仙常往來於此故得名亦名葛塢十三間樓相嚴院舊名十三間樓石佛院東坡守杭日每治事於此有冠勝等軒大石佛院舊傳為秦王纜船石俗名西石頭宣和中僧思净就石鐫成大佛半身或云下通海眼僧思净當兒時見之作念曰異日出家當鐫此石為佛及長為僧妙行寺遂鐫石為半身佛像飾以黄金構殿覆之遂名為大石佛院至元間院燬永樂間重建西湖志保叔塔崇夀院咸平中僧永保修故得名有應天塔極樂菴落星石石獅峰又名巾子峰及石屏風在焉碑刻舊有屏風院記封山記寳稷山敷惠廟多寳院舊名寳積有綠隂堂嘉澤廟祠水仙有薦菊泉及亭孫花翁墓惟信字季蕃隠居湖山棄官自放詩詞尤工趙節齋葬之劉後村為誌杜清獻為文以祭普安院挹秀園楊駙馬秀野園劉鄜王有四并堂上智果院有参寥泉東坡題梁廣王殯所智果院舊有参寥僧其時有僧道者號参寥子於潜人通内外典能詩蘇子瞻守黄州参寥子自吴中訪之夢與賦詩有寒食清明都過了石泉槐火一時新後七年子瞻守杭州参寥子始卜居智果院有泉出石縫間甘冷宜茶寒食之眀日子瞻與客泛舟自孤山來訪参寥子汲泉鑚火烹黄栢茶適符所夢遂記以刻石為之銘云西湖志治平寺有錦塢烟雲閣夀星院有寒碧軒此君軒觀臺杯泉平秀軒明逺堂東坡祠及詩刻江湖偉觀即觀臺舊址盡得江湖之勝寳雲菴舊名千光王寺邳王殯所有寳雲菴清軒月窟澄心閣南隠堂妙思堂雲巢今不復存又有靈泉井寳雲菴初陽臺亦廢瑪瑙寳勝院昔在孤山後改為四聖觀遂遷于此有中庸子陶器墓乃法恵法師智圓自號也有髙僧閣僕夫泉舊有閒泉僕夫泉僧智圓所鑿也智圓字無外錢塘人博學勵行號中庸子時王文穆公罷相知杭州諸僧出迓慈雲禪師邀之皆往圓以疾辭曰傾山倒壑奔走紅塵暫留坐鎮諸僧赧服與處士林逋為友臨化命門人即後山歛陶器而䕶葬之名陶器塚自為銘曰清净本然無變無遷為藏陶器宻邇閒泉西湖志養樂園賈平章有光淥閣春雨觀瀟然養樂堂嘉生堂生意生物之府玉清宫有葛仙鍊丹井半春園史衞王府小隠園史府集芳御園後賜賈平章内有假山石洞通出湖濵名曰後樂園有蟠翠雪香翠巖倚繡挹露玉蘂清勝巳上皆髙宗御題亦集芳舊物也西湖一曲竒勛理宗御書秋閣遂初容堂度宗御書又有初陽精舍警室熙然臺無邊風月見天地心琳琅步歸舟等不一香月鄰廖瑩中園後歸賈相嘉徳永夀教寺毛娘娘功徳有翔泳堂芝巖喜鵲寺即禪宗院以鳥窠禪師得名魏婉儀殯所白樂天有紫楊花詩鳯林寺俗呼喜鵲寺唐長慶初禪師圓修居此四十餘年棲息松上有鵲搆巢其傍人遂呼為鳥窠禪師白樂天守杭州時嘗往叅之曰大師居處甚險禪師曰大守險樂天曰弟子位鎮山河何險之有禪師曰心火相搆識浪不停得非險乎樂天服之西湖志寳嚴院舊名垂雲有垂雲亭借竹軒無量福海趙紫芝墓名師秀在寳嚴院後定業院烏窠禪師道塲有君子泉石甑山環峯堂襲夢軒虎頭巖介于寳嚴定業之間施夢川墓名字仲山吴人能詞精于律吕楊守齋為寺後樹梅作亭以葬薛梯飈為誌李篔房書周艸窗題盖仁夀尼菴招賢寺上官良㬰墓在招賢寺後良史字季長號淇園報恩院舊名報先即孤山六一泉寺後以其地為延祥觀遂遷於此徳國公主殯所廣化院舊名永福自孤山遷於此舊有白公竹閣栢堂水鑑堂涵暉亭凌雲閣金沙井辟支佛骨塔慧琳塔白公祠堂黄宜山詩云移自孤山占此山荒凉老屋萬琅玕櫻桃楊栁空花夢千古清風滿閣寒快活園趙氏水竹院落賈平章園御書閣曰奎文之閣有秋水觀第一春思剡亭道院顯明院舊名興福保清儀王仲湜殯所有鑑空閣綠净堂北新路口棲霞嶺口嶺上桃花爛燦色如凝霞其北有古劒關盖左寳雲右仙姑兩山夾峙若劒門然宋立巡司于此有水一道名桃溪經岳墳前入湖西湖志古劒關棲霞嶺下岳王墓岳武穆王飛所葬其子雲亦祔焉葉靖逸詩云萬古知心只老天英雄堪恨復堪憐如公少緩湏㬰死彼土安能八十年漠漠凝塵空偃月堂堂遺像在凌烟早知埋骨西湖路悔不鴟夷理釣船林弓寮詩云天意只如此将軍足可傷忠無身報主寃有骨封王苔雨樓牆暗花風道路香沉思百年事揮淚灑斜陽王修竹詩云埋骨西湖土一丘殘陽荒艸㡬經秋中原望㫁因公死北客猶能説舊愁武穆王墓自國初以來墳漸傾圮江州岳士廸於王為六世孫與宜興州岳氏通譜合力以起廢廟與寺復完美久之王諸孫有為僧者居墳西復為廢壊天台僧可觀訴於官時何頥貞為湖州推官柯九思以書白其事田之沒於人者復歸然廟與寺無寸椽片瓦會李君金初為杭總管府經厯慨然以興廢為已任而鄭元祐為作疏郡人王華父一力興建寺廟又復完美杭州申明浙省轉咨中書以求褒贈適趙子期在禮部倡義奏聞降命勅封並如宋止加保義二字自我元統一函夏以來名人佳士多有詩弔之不下數十百篇陶宗儀輟耕録褒忠演福院元係智果觀音院後充岳鄂王香火岳雲所用鐵鎗猶存冲虛宫舊名寧夀菴耿家步東山衕口福夀院旌徳寺子院有寧宗御書桂堂二字廖葯洲園有花香竹色心太平相在世綵愛君子習説等亭小石板口九里松一字門唐刺史袁仁敬守杭日植松於左右各三行門扁吴説書髙宗嘗欲易之自以不及但金飾其字吴説字𫝊朋錢塘人髙宗紹興以來雜書游絲書惟錢塘吴説説知信州日朝辭上謂曰朕有一事每以自歉卿書九里松牌甚佳向自書易之終不迨卿所書當令仍舊是日降㫖俾根尋舊牌張挂書史㑹要駝巘嶺口石板巷口麴院巷口行春橋小行春橋忠勇廟統制張祠左軍教場馬三寳墓在教場内傳云向曾欲去之有黑蜂數百自墓中出不可向遂止至元十五年六月内有軍厮名狗兒者因樵採墾土得一鐵劵上有字云鴈門馬氏葬於横衝橋云云後又有十字至元十五六狗兒壊我屋盖古人知數者耳始知行春橋本横衝橋云三藏塔院明真宫女冠今改為三藏寺資徳廟慕容貴妃香火萬夀院南山白雲宗建唐家衕後澗溪紫芝道院道士陳崇真瑞岡塢燕脂嶺以土色得名晉福教寺崇夀院崇親資福院張淑妃香火天申萬夀圓覺教寺舊為了義法師塔院有歸雲堂三昧正受閣並髙宗御書累朝臨幸有御座御榻理宗御書清凉覺地石獅子路香林園斑衣園韓府金沙澗靈竺之水自此東入於湖顯慈集慶教寺閻貴妃香火寺扁殿閣皆理宗御書有月桂亭甚佳金碧為湖山諸寺之冠閻氏鄞縣人明艷絶倫後宫為之奪寵寺額皆御書巧麗冠於諸刹經始之辰内司分市材朩於郡縣㫄緣為奸望青採斫鞭笞追逮雞犬不寧雖勲臣舊輔之墓皆不得自保或作詩諷之曰合抱長材卧壑深于今惟恨不空林誰知廣厦千斤斧斵盡人間孝子心其後恩數漸隆雖御前五山亦所不逮一日忽於法堂皷上得大字一聨云浄慈靈隠三天竺不及閻妃好面皮於是行下天府絹捕其人終不得西湖志靈隠天竺寺門俗呼二寺門袁居中書白樂天詩一山門作兩山門兩寺元従一寺分正此也合澗橋靈竺二山之水會合于此龍脊橋武林山又曰靈隠山又曰靈苑山又曰仙居山上有五峰曰飛來曰白猿曰嵇留曰月桂曰蓮華山前有澗即武林泉也呼猿洞龍浤洞有蒋之竒篆字前後諸賢題字極多二洞在飛來峰龍浤洞一名通天洞俗傳其底可通浙東有採乳石者入之聞江濤浪浪然櫓聲聒然壁間有蒋之竒篆書賈似道廖瑩中等題名宋咸通中有髙士丁飛者字翰之居洞中讀書採藥力田自給年七十二矣操綆缶斤斸陟峻如飛嘗月夜登巖鼓瑟流淙協奏天籟凄冷往往致鸞鶴之翔集西湖志飛來峰界乎靈隠天竺兩山之間盖支龍之秀演者髙不踰數十丈而怪石森立青蒼玉削若駭豹蹲獅筆卓劒植衡従偃仰益玩益竒上多異朩不假土壤根生石外矯若龍蛇鬰鬰然丹葩翠蕤蒙羃聨絡冬夏常青烟雨雪月四景尤佳其下巖扃窈窕屈曲通眀壁間布鐫佛像皆元浮屠楊璉真伽所為也晉咸和元年西僧慧理登而嘆曰此乃中天竺國靈鷲山之小嶺不知何以飛來仙靈隠窟今復爾否因樹錫結菴名曰靈隠命其峰曰飛來西湖志女兒山一名玉女巖青林巖理公巖乃靈隠開山慧理法師在靈鷲寺後冷泉有亭在泉上冷泉二字乃白樂天書亭字乃東坡續書詩扁充棟不能悉錄林丹山詩云一浤清可浸詩脾冷煖年來只自知流向西湖載歌舞囘頭不似在山時冷泉亭建於唐至宋郡守毛友拆去之今所建又不知起於何時其自叙云昔人加亭於冷泉如明鏡中加繪畫山翠水光去者過半拂拭菑翳舊觀還復夫冷泉亭之景白樂天極其褒頌而毛守以為去之乃佳好尚不同如此西湖志西湖今但知有冷泉而不知有温泉醴泉在冷泉之上楊㢘夫西湖竹枝詞家住西湖新婦磯又石新婦下水連空飛來峰前山萬重郯九成竹枝詞風篁嶺頭西日暉青龍港口新月微馮士頥詞請看雙投橋下水新開兩朶玉芙蓉皆遺逸隠蹟田藝衡留青日扎温泉醴泉二泉在冷泉之上葛塢朱墅候仙亭壑雷亭觀風亭又有虛白見山袁君紫薇翠微石橋月桂等亭及丹竈隠居許邁思真三堂連巖棧伏龍濺等今皆廢景徳靈隠禪寺相傳靈隠禪寺乃葛仙翁書或云宋之問書景徳中續加景徳二字有百尺彌勒閣蓮峰堂方丈曰直指堂千佛殿延賔水閣望海閣理宗御書覺玉寳殿妙荘嚴域又有巢雲亭見山堂白雲菴松源菴東菴等在山後尤幽寂可喜杭州内外及湖山間唐巳前三百六十寺錢氏立國宋南渡增為四百八十海内都會未有加於此者僧派三曰禪曰教曰律今講寺即宋之教寺也嘉定間品第江南諸寺以餘杭徑山寺錢塘靈隠寺净慈寺寧波天童寺育王寺為禪院五山錢塘中天竺寺湖州道塲寺温州江心寺金華雙林寺寧波雪竇寺台州國清寺福州雪峰寺建康靈谷寺蘇州萬夀寺虎丘寺為禪院十刹以錢唐上天竺寺下天竺寺温州能仁寺寧波白蓮寺為教院五山錢唐集慶寺演福寺普福寺湖州慈感寺寧波寳陀寺紹興湖心寺蘇州大善寺北寺松江延慶寺建康瓦棺寺為教院十刹杭州律院則昭慶寺六通寺法相寺菩提寺内外靈芝寺不在五山十刹之列大抵僧家以禪那為宗㫖而教所以致禪蘇子由有言我觀世教師皆謂教是實由謂教實故則為禪所訶禪雖訶乎教終以教致禪禪若不取教是杜所入門教而不知禪是不識家也律則慎攝威儀涵養智定禪與教所兼資焉西湖志北髙峰塔在靈隠寺山後絶頂比南髙峰尤髙上有五顯祠逺近祝香四時不絶唐天寳中建會昌中燬錢王修復之宋咸淳七年復燬羣山屏列湖水鏡净雲光倒垂萬象在下漁舟歌舫若鷗鳬出沒烟波逺而益微僅覿其影西望羅刹江若匹練新濯遥接海色茫茫無際郡城正值江湖之間委蛇曲折左右映帶屋宇鱗次艸朩雲蓊鬰鬰葱葱悉歸眉睫山頂舊有望海閣今廢蘇子瞻詩云言遊髙峰塔蓐食治野裝火雲秋未衰及此初旦凉霧霏巖谷暝日出艸朩香嘉我同來人久便雲水鄉相觀小舉足前路髙且長古松攀龍蛇怪石坐牛羊漸聞鐘磬音飛鳥皆下翔入門空無有雲海浩茫茫惟見聾道人老病時絶糧問年笑不答但指空藜床心知不復來欲歸更徬徨贈别留疋布今嵗天早霜西湖志法安院舊名廣嚴唐韜光禪師築菴于院後有清獻東坡題名保寧院舊名保安無量夀資聖院舊名大明開山咸澤禪院韜光菴韜光禪師道塲與樂天同時周伯弜有詩前後諸賢留題甚多舊有僧嘗於此降仙請至釋子蘭以下十人凡七十三釋皆唐人能詩者各書一詩語極奇絶曲盡其景今詩尚存壁間韜光禪師蜀人唐太宗時辭師出遊師囑曰遇天可前逢巢即止師遊靈隠山巢溝塢值白樂天守郡悟曰此吾師之命我也遂卓錫焉樂天聞之遂與為友題其堂曰法安嘗以詩招之入城云白屋炊香飯葷饘不入家濾泉澄葛粉洗手摘藤花青芥除黄葉紅薑帶紫芽命師相伴食齋罷一甌茶韜光不赴報之詩云山僧野性好林泉每向巖阿倚石眠不解栽松陪玉勒惟能引水種金蓮白雲乍可來青嶂明月難教下碧天城市不能飛錫去恐妨鶯囀翠樓前内有金蓮池烹茗井壁間有趙閱道蘇子瞻題名西湖志永福寺隆國黄夫人功徳咸淳九年建在靈隠西石筍山下石筍普圓院天福二年黄氏重修舊名資嚴山有石如筍髙數十丈故名石筍寺有超然臺金沙白沙二泉鄴公菴杭守祖無擇愛此山之勝結菴于此取公所封名之方丈左右金漆板扉皆趙清獻諸賢蘇秦陳黄留題及文與可竹數枝如張總得父子吴傅朋等題字甚多嵗久暗淡猶隠隠可見寺極清古幽邃為湖山諸刹之冠後隆國黄夫人以超然臺為葬地遂移此院于山之西而古意不復存矣天聖靈夀院僧徳賢建鐵舌菴隆親永福院温國成夫人香火今廢時思薦福寺吴益王墳寺舊以下竺為墳寺後以古刹遂别建于此髙宗嘗臨幸吴太后手書金剛經有楊太后䟦及髙宗御書心經竝刻石藏下竺靈山塔下益王神道碑蒋燦書甚佳墓前二石馬琢刻如生舊傳夜輒馳驟其鞦轡光瑩如玉至今苔蘚不侵寺有宜對亭雙珠亭萬玉軒湖山至此極幽邃矣黄妃墓錢王妃卓筆峰明惠尼院舊名定恵錢王孫妃香火石人嶺一名馮公嶺形如人狀雙髻宛然海峰菴無著禪師塔舊有無垢院韓平原以為夀地遷院於靈石山側後楊郡王復取為夀地遂唘其塔乃陶龕容色如生髪垂至眉指爪皆遶身舍利無數留三日不壊竟荼毗之僧肇淮海有詩云一定空山五百年不湏惆悵唘頽甎路邊多少麒麟塚過眼無人贈紙錢今地為永福所有西溪路畢宫師墓畢再遇之父子皆葬于此三天竺自靈鷲至上竺郎當嶺止陳明大王廟漢熹平餘杭令陳渾後唐長興中封太平靈衞王靈鷲興聖寺惠理法師卓錫之地吴越王建有靈山海會閣理宗御書理公巖滴翠軒九品觀東坡祠東坡題名隋觀法師塔下竺開山祖師真觀下天竺靈山教寺在隋號南天竺五代時號五百羅漢院祥符初號靈山寺天禧復名天竺寺紹興改賜天竺時思薦福為吴秦王香火慶元復今額有御書閣藏仁宗及中興五朝御書曲水亭前塔跳珠泉枕流亭適安亭清暉亭九品觀堂石面靈桃石蓮花水波石悟侍者塔並祠草堂西嶺卧雲石石門澗神尼舍利塔日觀菴方丈曰佛國山法堂二字乃雲房鍾離權書甚竒古金光眀三昧堂神御殿瑞光塔普賢殿無量夀閣囘軒亭七葉堂客兒亭大悲泉重榮檜葛仙丹井白少傅烹茶井石梁翻經臺望海閣香林亭香林洞無根藤鬭雞巖夜講堂登嘯亭靈山後塔慈雲懴主榻七寳普賢閣旃檀觀音瑞像有記大抵靈竺之勝周回數十里巖壑尤美實聚於下天竺寺自飛來峰轉至寺後諸巖洞皆嵌空玲瓏瑩滑清潤如虬龍瑞鳯如層華吐萼如皺縠疊浪穿幽透深不可容貌林朩皆自巖骨㧞起不土而生傳言兹巖韞玉故腴潤若此石間波紋水迹不知何時有之其間唐宋遊人題名不可殫記覽者顧景興懐云天竺桂子之説起自唐時然宋慈雲式公月桂詩序云天聖丁卯秋八月十五夜月有濃華雲無纎迹靈隠寺殿堂左右天降靈實其繁如雨大如豆圓如珠白者黄者黑者殻如芡實味辛識者曰此月中桂子也拾以封呈好事者餘播種林下越數月移植白猿峰凡二十五株遂改囘軒亭為月桂亭又張君房為錢塘令夜宿月輪山寺僧報曰桂子下塔遽起望之紛如烟霧囘旋成穗散墜如牽牛子黄白相間咀之無味則桂子之落往往有之但人不識耳漢武洞㝠記云有逺飛雞朝往夕還嘗銜桂子歸于南土南土月路固其宜也所以北方無之又本草圖經云江東諸處多於衢路拾得桂子北土獨無者非月路也西湖志吴越孝獻世子墓文穆王子楓林塢永清寺薛開府居正香火中天竺天寧萬夀永祚禪寺隋開皇千嵗寳掌和尚開山建寺吴越時名崇夀院政和中改賜今名有摩利支天像華嚴閣如意泉彌陀興福教院皇子兖州二王殯所顯親多福院舊名光福大明寺元係興國菴上天竺靈感觀音院天福中建名天竺看經院咸平初賜今名淳祐中賜廣大靈感觀音教寺舊寺額蔡襄書後理宗易以御書外山門乃蔡京書紹興乾徳淳熙皆嘗臨幸有十六觀堂應真閣超諸有海理宗御書有雲漢之閣藏累朝所賜御書兩峰堂白雲堂中即堂清華軒延桂閣秋芳閣伴雲閣前後賜珠冠玉爐珍玩甚多每水旱朝廷必禱焉外古跡有肅儀亭梅峰菴琮老橋金佛橋復菴流虹澗夢泉植杖亭謝履亭凝翠泉觀音泉雲液池孫公亭無竭泉上天竺寺觀音像長不盈五尺而疊著靈異官民信奉甚恭凡旱潦禱之必應嘗攷釋氏紀錄云後晉天福已亥僧道翌一日見山間光明往視之得竒香朩命良工刻成觀世音菩薩像白光煥發繼以晝夜後漢乾祐戊申有僧従勲以古佛舍利置毫相中舍利時現冠頂宋咸平庚子浙西自春徂夏不雨給事中知杭州張去華率僚屬具幡盖皷吹迎禱于梵天寺繼時霔雨四境沛足如此則自有像已四百餘年其所由來逺矣陶宗儀輟耕錄紹興五年夏大旱朝廷遍禱山川祠廟不應遣臨安守往上天竺迎靈感觀音於法惠寺建道塲滿三七日又弗應時六月過半矣苦行頭陀潘法慧者黙禱于佛乞焚右目以施取鐵彈投諸火煆置眼中燃香其上香焰纔起大雨傾注法慧眼即枯後三日夢白衣女子來欲借一隔珠拒不許二僧在傍曰與伊不妨自令六六送還既覺不曉所謂又夢二僧來請赴六通齋白衣女子亦至在前引𨗳稍前進則山川蔚然百果皆熟紛紛而墜慧就地拾果食之覺心地清凉非常日比又俯首欲拾間女子忽面擲一彈正中所燃目失聲大呼而寤枯睚内已有物若鵞眼瞻視如初漸亦復舊數其再眀之時恰三十六日始悟六六送還之兆善惡記雙檜峰白雲峰乳竇峰楊梅嶺郎當嶺出湧金門北為豐樂樓錢塘門瀕湖為玉蓮堂北為來鵲樓西過流水橋為昭慶律寺寺北為慶忌塔寺西過石函橋為放生亭又北過羊坊橋小溜水橋為靈衞廟過石函橋西為寳石山崇夀禪寺寳所塔夀星石石屏風獅子峰屯霞石看松臺乳泉井一勺泉寳石山麓為大佛禪寺沁雪泉西為智果禪寺参寥泉又西為顯功廟為錦塢初陽臺葛翁井又西為寳雲山瑪瑙講寺後僕夫泉又西為葛嶺葛稚川墓前為四聖延祥觀竹閣西為虎頭巖嘉徳永夀講寺又西為鳯林禪寺君子泉嶺西為履泰山棲霞嶺桃溪棲霞洞紫雲洞輔文侯牛臯墓妙智菴嶺下為岳武穆王墓翊忠祠分屍檜流芳亭祠後為掃箒塢黄龍洞䕶國仁王禪寺西為净性禪寺履泰西為仙姑山張烈文侯墓仙姑西為青芝塢玉泉講寺後為靈峰禪寺又北為法華山秦亭山方井佛禪寺智勝菴東嶽廟青芝塢西南為慶化山水竹塢神霄雷院仙姑西南為駝巘嶺過行春橋入九里松折而南為仙芝嶺普福講寺葛翁井西為黑觀音堂又西為集慶山顯慈集慶講寺又西南過合澗橋為飛來峰龍浤洞青林洞玉乳洞射旭洞靈鷲塔過囘龍橋為石門澗冷泉亭靈隠山北髙峰靈隠禪寺山半為石笋峰茯苓泉韜光菴靈隠寺西為栗山石人嶺玉女巖過嶺為西溪飛來峰西為呼猿洞自合澗橋折而南度佛國山門為下天竺講寺靈鷲峰月桂峰稽留峯蓮花峰三生石翻經臺香林洞葛塢葛井北山葛井凡三相傳此獨為得道處也神尼舍利塔寺畔舊有七寳普賢閣日觀菴西嶺艸堂七葉堂九品觀堂俱不可復尋又南為楓朩塢中天竺禪寺千嵗巖對中竺為永清塢心菴西南過肅儀亭為上天竺講寺乳竇峰獅子峰雙柱峰白雲峰天香巖夢泉大悲泉如意池出寺折而東南為幽淙嶺捫壁嶺活沙塢再上為天門此北山之勝也張淶北名山勝紀吴山增春秋時為吴南界以别于越故曰吴山或曰以伍子胥故訛伍為吴故郡志亦稱胥山在鎮海樓之右盖天目為杭州諸山宗翔舞而東結局鳯凰山其支山左折遂為吴山派分西北為寶月為蛾眉為竹園稍南為石佛為七寳為金地為瑞石為寳蓮為清平總曰吴山竒㠋危峰澄湖靚壑江濤海門囘環拱固扶輿淑麗之氣鍾焉是以邑居叢集華艷工巧殆十萬餘家聲甲寰宇恢然一大都會也其陟山之徑有門曰登髙覽勝石磴斗折可數百級許元時平章達爾罕托歡所甃也立而環眺則官司廨署衞鎮崇嚴闤闠街衢紅塵霧起市聲隠振漏盡猶喧道院僧廬晨鐘暮鼓青樓畫閣雜以笙歌升其巔則縹緲凌虛碧天四匝山川包界脉絡縷分或昻而為首或穹而為脊或掉而為尾若斷若聨運掌可數楊仲宏吴山晚眺詩云山椒翬構四垂寛上相旌旗會覽觀旁近江湖天廣大上連星斗界清寒龍宫永鎖函書閟鳯嶺重嗟苑樹殘此際獨無雲蔽日正宜翹首望長安西湖志寳月山舊志叙城内諸山以此山為首盖以地蟠中輔對峙藩司為一城之鎮也東北為蛾眉山又東為淺山正東為金地山上有城隍廟杭州府志蛾眉山在寳月山西有八眼井竹園山在吴山西相接一脉獨趨而北隠隠隆起隂陽家謂為府治之主山宋臨安尹趙與􅊸建閣其上平瞰西湖扁曰竹閣理宗御書景定三年徙其閣而山亦漸夷為地杭州府志石佛山西聨寳山南面瑞石舊有大乗石佛寺宋嘉熙間僧鑿石為三佛元至正間河西僧多爾濟募緣荘嚴建寺居之改名智果院西湖志寳山東接石佛山蘇子瞻同秦仲二子遊寳山詩云平明巳報百吏散半日來陪二子閒立鶴低昻烟雨裏行人出沒樹林間西湖志七寳山在宋天慶觀後今白馬廟巷之西舊有寳嚴院廣嚴院櫻桃園竝廢西湖志寳嚴院唐清泰二年錢氏建名瑞龍宋治平二年改今額有垂雲亭借竹軒秦少游曾宿軒中夢天女以維摩像求賛淳祐間建佛閣理宗書無量福海四字扁之蘇子瞻佐郡時有雲闍黎者寓院中閉户十五年謝絶人事日禮觀音經忽一日留偈端逝偈云誦經一字禮一拜頭白眸眵坐塵界天雞臨夢啼一聲明月一輪觀自在蘇子瞻弔之詩云雲師來寳山一住十五秋讀書嘗閉户客至不舉頭去年造其室清坐忘百憂我初無言説師亦無對酬今來復扣户空房但飀飀云已滅無餘薪盡火不留却疑此室中常有斯人否所遇孰非夢事過吾何求西湖志三茅寧夀觀在七寳山東北本三茅堂相傳三茅君長盈次固季衰秦初咸陽人得道成仙自漢以來崇祀之宋紹興二十年因東京舊名賜額曰寧夀觀并畀古器其一漢鼎髙尺有九寸廣尺兩耳旁出曲上二尺牛首識云有漢建元三年八月作牛鼎祀太室銘曰惟甲午丙寅帝若稽古肇作宋器審厥象作牛鼎格于位室従用饗億寧神休惟帝時保萬世其永賴其一唐鐘識云丙辰九月二十四日常州澄清觀女冠王玉仙作河東薛泚為之銘曰上徳願而鑄洪鐘仙聖依而神仙従霜朝聞兮窈窕月夜聽而舂容蓮花生而腰浄頂銜繞于盤龍響上徹于天外聲下徹于九重庶長空于鬼獄魔屏跡而潜踪其後忽失所在紹興間有鐘震于太湖濵湖緇黄競舟迎之獨澄清觀舟至凌波而上一引出之視之乃本觀唐時物也守臣以獻賜之觀中聲徹雲表孝宗朝出金帛度牒易之置禁中洪武七年三月錢塘知縣朱復以廢銅鎔之其一禇遂良小楷隂符經景定庚申理宗以賈似道有江漢功賜金帛百鉅萬不受詔就觀取隂符經酬之觀燬於元至元辛已洪武初重建成化十年建昊天寳閣棟宇翬飛金碧騰煥環盻江湖渺歸睫底西湖志雲居聖水雲居菴者宋元祐間僧了元建聖水寺者元元貞間僧明本建明本立約其徒不置恒産惟資化緣為僧家風味至大間沙門指月拓基廣之掘地四尋得眢井甓甃堅好中有佛首三枚諸相具足遂塗金事之名曰三佛泉巴西鄧文原為之銘曰我觀大地積水所載孰疏鑿是太虛無外掘地及泉視之縈帶如履㝠塗破諸障礙其源淵谷其瀉湍瀨不止不流以與井會瑞相見前示我三昧彼壊者石實相不壞是實相故遍恒沙界以一勺甘除世渇愛是相是水無在不在我作銘詩以警盲瞶洪武二十四年併聖水于雲居賜額曰雲居聖水了元號佛印善詼諧以禪為戲明本號中峰又號幻住博涉經史洞徹法源為文操筆立就祝髪時有故宋宫人楊妙錫者以香盒貯髪舍利叢生遂建塔寺中久廢成化間僧文紳修復有小像一幅神氣如生相傳為中峰自寫上有賛云幻人無此相此相非幻人若喚作中峰鏡面添埃塵西湖志金地山舊有妙果尼寺今廢瑞石山秀石玲瓏巖竇䆗窱寒泉㳙瀝匯為澄浤者往往而有清幽徹骨空翠撥肌湖山奥區罕與倫比槖駝峰峭削凌空雪風洞谽閉曲徑履舄所涉栩栩然覺有仙風焉西湖志紫陽菴宋嘉定間邑人胡傑居此建集慶堂元至元間道士徐洞陽得之改為紫陽菴其徒丁野鶴棄俗全真一日召其妻王守素入山付偈云嬾散六十年妙用無人識順逆兩俱忘虛空鎮長寂抱膝而逝守素遂奉其屍而漆之端坐如生亦束髪為女冠不下山者二十年薩天錫贈之詩云不見遼東丁令威舊逰城郭昔人非鏡中人去青鸞老華表山空白鶴歸石竹淚乾斑雨在玉簫聲斷綵雲飛洞門花落無人掃獨坐蒼苔補道衣其菴久廢西湖志寳蓮山與七寳山相連舊有寳蓮寺宋嘉定間楊節使廢而為園徙寺于豐豫門外青衣洞吴山重陽菴有泉曰青衣洞泉臨安志杭州府志皆以為唐開成間道士韓道古遇青衣童子入洞故名按洞宋為寧夀觀地韓侂胄鑿山為園作流觴曲水自青衣下注于壑十有二折瀦於閱古堂前即名泉為閱古見説郛故當時言官論侂胄有剏造亭館震驚太廟之語盖宋太廟正當泉下之山也又考陸放翁閱古泉記記中但言泉之甘寒清冽鋪叙地景無青衣事又曰泉壁有開成五年道士諸葛鑑元八分書癸辛雜識載為元年六月南嶽道士邢令開錢塘令錢華題名道士諸葛鑑元書俱不言道士韓道古事作記時寧宗嘉泰三年青衣事必見於嘉泰後咸淳前故陸記無而臨安志有也二志以為開成非矣洞記以為見於大徳丁酉尤非也恐韓閱古訛而為韓道古未可知若建菴之日必開成年間鑿石字可證但恐名非重陽至大徳間始有重陽名故石壁又有廣微子書大重陽菴字廣微元時天師也今菴記曰韓建菴無嵗月是考之不精未知有八分題名石刻故泛云耳惜八分刻嵗久石長今不明白未有諸葛鑑元書止有元書二字郎瑛七修類藁至元丁亥九月四日周公謹偕錢菊泉至天慶觀訪禇伯透遂同道士王盤隠遊寳蓮山韓平原故園山四環皆秀石絶類香林冷泉等處石多穿透嶄絶互相附麗有如玉色者取以為環珥之類中有石谼杳而深泉㳙㳙自内流出疑此即所謂閱古泉也谼旁有開成元年六月南嶽道士邢令開錢塘縣令錢華題名道士諸葛鑑元書鐫之石上又南石壁上鐫佛像及大字心經甚竒古不知何時為火所燬佛又殘缺又一洞甚竒山頂一大石墜下傍有一石承之如餖飣然又前一巨石不通路中鑿一門門上横石梁又有一枯池間石壁皆細小水波紋不知何年水直至此處然則今之城市皆當深在水底數十丈深谷為陵非寓言也其餘磴道石池亭館遺址厯厯皆在雖草朩殘毁殆盡而巖石秀潤可愛大江横陳于前時正見潮上如疋練然其下俯視太廟執政府在焉山頂更覺奇峭必有可喜可噩者以足憊不果往且聞近日多虎往往白晝出沒不常遂不能盡討此山之勝故書以示好事尋游者觀此篇所序閱古泉諸勝與今不同而石壁鐫字亦漫滅不可讀矣西湖志清平山山在仁孝坊舊有烟霞閣四壁畫古賢像多名人題詠今廢增補武林舊事卷七
