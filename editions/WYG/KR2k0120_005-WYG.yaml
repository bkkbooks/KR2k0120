body:
  text: 増補武林舊事巻五宋周宻原本明朱廷煥補乾淳教坊樂部附五條雜劇色徳夀宫劉景長使臣王喜保義郎頭名都管使臣又名公謹號玩隠老人茅山重茅芽頭盖門貴盖門慶末侯諒次末侯大頭張順曹辛宋興燕子頭李泉現引兼舞三􅄗衙前龔士美使臣都管劉恩深都管陳嘉祥節級吴興祐徳夀宫引兼舞三臺吴賦金彦昇管幹教頭王青孫子貴引潘郎賢引兼末部頭王賜恩引吴慶全蠟燭頭周泰次郭名顯引宋定次徳夀宫蚌蛤頭劉信副部頭成貴副陳烟息副大口王侯喜副孫子昌副末節級焦色金楊名髙末宋昌榮副歡喜頭前教坊伊朝新王道昌前鈞容直杵榖豐五味粥李外善和顧劉慶次劉衮梁師孟朱和次貼衙前鱔魚頭寗貴宿钁蒋寧次貼衙前利市頭司進孫瓜兒郝成次貼衙前小鍬髙門興髙門顯羔兒頭髙明燈搭兒張舜朝趙民歡司政仙鶴兒劉貴段世昌段子貴龔安節嚴父訓宋朝清宋昌榮二名守衙前周旺丈八頭卞疇宋吉伊俊汪泰王原全次貼衙前王景鄭喬王來宣張顯守闕祗應黒俏焦喜焦梅頭歌板色徳夀宫李行髙笛兼衙前王信拍兼拍板色衙前笛色王均觱篥色鄭彦周賢良兼拍板徳夀宫劉益使臣謝春澤衙前吴興祖節級趙永部頭花成時世俊守闕節級前鈞容直崔喜琵琶色衙前豪師古兼琵琶徳夀宫胡永年武功大夫謝聖澤衙前焦進部頭趙昌祖段従容和顧吴良輔豪士英曹彦國簫色衙前曾延慶部頭劉珦周濟部頭和顧朱世昌兼筝王謹劉宗旺周亨陳籥嵇琴色徳夀宫曹友聞承節郎守闕都管衙前楊春和人員守闕都管魏國忠節級兼舞孫良佐石俊馮師賢和顧劉運成趙進杖鼔兼恵和馮師賢王處仁筝色徳夀宫朱邦直忠訓郎衙前張行福部頭豪士良髙俊前教坊聶廷俊前鈞容直李吉笙色徳夀宫湯士成孫顯祖衙前宋世寧節級豪師古兼琵琶傅紹管幹人鄧孝仁趙福兼徳夀宫前鈞容直吴勝前教坊劉永顯和顧張世宗康彦和王興祖觱篥色徳夀宫田正徳教坊大使鞠思忠孫慶祖劉舜俞陳永良衙前李祥守闕節級􅄷彦節級王恩節級李和部頭時世榮部頭王正徳王道和慢守恭李遇金宗信兼徳夀宫鄭彦兼拍板張勻劉道曹彦興吴良佐朱貴管幹人孟誠陳祐丘彦管幹人鄧孝元王永周賢良陳師授兼徳夀宫陳永良前教坊戚興道李彦美郭席珍前鈞容直王宣唐政和顧于慶兼舞馮宣王椿倪潤李祥守闕節級陳繼祖季倫張彦明陳良璹馮異商翼時世顯王文信王延慶謝潤張榮第三名守闕衙前時顯祖費仍裕任再興李樂正秦邦彦鄭彬時允恭金潤王夀王思齋于成孫良輔崔顯盧茂春王師忠宋康寧張端顧宣王仲禮郭建宗劉順守闕衙前笛色徳夀宫元守正忠翊郎孫福使臣孫繼祖張行謹衙前都管孫福使臣朱榛人員守闕都管張守忠楊勝節級王喜節級張師孟部頭岳興部頭李智友段従禮朱順陳俊雷興祖王仕寧時寳部頭兼徳夀宫孫進郭彦楊選兼徳夀宫金儀趙俊守闕節級趙順楊元慶時定趙興祖隂顯祖丘遇徐識孫顯王筠兼徳夀宫拍板張榮郭亨元舜道前教坊金宗訓俞徳謝祖良曽延廣李進前鈞容直王喜俞徳冀恩和顧張億茆慶張師顔劉國臣趙昌張廣元舜臣沈琮杖鼔胡良臣王師仲徐亨張義林顯鄭青陳士恭巫彦朱世榮朱紹祖翟義張孝恭汪定費興李昇馮士恭陳寳楊善尹師授張介賀宣朱榮朱元守闕衙前軒定鼔板張成鼔板閻興鼓板王和鼓板陳煥張世亨許珍張淵孫顯宗崔成守闕衙前方響色徳夀宫齊宣田世榮衙前葛元徳部頭于喜齊宗亮管幹人前鈞容直髙福和顧馬仲榮尹朝于通劉才髙杖鼓色徳夀宫張明髙孟清衙前髙宣節級時思俊守闕節級部頭兼板程盛齊喜孟文叔守闕節級時和鄧友端徐宗旺吴興福兼徳夀宫鄧世榮張興祿管幹人葉喜前教坊鞠端前鈞容直閻興邢智和顧張士成張潤張義張世昌張世顯孫榮段錦新蔡顯忠齊宗景郭興祖時康寧髙潤張臯傅良佐李晉臣思芸范琦段錦大鼓色徳夀宫張佑李吉衙前董福部頭李進周均小唱張佑兼徳夀宫和顧趙慶鼓兒劉成孫成鼓兒習學大鼔王富勾般習學大鼓尹師聰鼓兒張守道唱道情張昇鼓兒宋棠掌儀下書寫文字喻祥小唱錢永守闕衙前舞旋嵇琴魏國忠琵琶豪士英並兼舞三臺徳夀宫劉良佐武徳郎衙前杜士康和顧于慶雜劇三甲劉景長一甲八人戲頭李泉現引戲吴興佑次净茆山重侯諒周泰副末王喜装旦吴子貴盖門慶進香一甲五人戲頭孫子貴引戲吴興佑次浄侯諒副末王喜内中祗應一甲五人戲頭孫子貴引戲潘浪賢次净劉衮副末劉信潘浪賢一甲五人戲頭孫子貴引戲郭名顯次浄周泰副未成貴築毬三十二人左軍一十六人毬頭張俊蹺毬王憐正挾朱選副挾施澤左竿網丁詮右竿網張林散立胡椿等右軍一十六人毬頭李正蹺毬朱珍正挾朱選副挾張寧左竿網徐賔右竿網王用散立陳俊等雜班雙頭侯諒散耍劉衮劉信小樂器嵇琴曹友聞簫管孫福􅌙劉運成拍侯諒鼔板衙前一火笛楊勝張師孟鼔兒尹師聰拍張順和顧二火笛張成老僧閻俊望拍張喜皷兒張昇笛王和小四皷兒孫成換僧拍張榮狗兒馬後樂拍板吴興祖觱篥田正徳孫慶祖陳師授笛孫福時寳元守正提鼓孫子貴札子孟清時世俊髙宣吴興福張興祿内中上教博士王喜劉景長曹友聞朱邦直孫福吴永年各支月銀一十兩雜劇王喜侯諒吴興福吴興佑劉景長張順拍板田正徳謝春澤琵琶胡永年舞劉良佐嵇琴曹友聞楊春和筝朱邦直方響齊宣笙楊士成􅌙劉運成觱篥孫慶祖笛孫福時寳掌儀範等合干人掌儀範朱邦直曹友聞元守正孫福朱榛守闕衙前都管劉思深孫福王公謹守闕管幹教頭朱貴張興祿丘彦傅紹齊宗亮逐色劉信趙永焦進周濟楊春和宋世寧李和時世榮時寳岳興葛元徳髙宣董福時世俊杜士康潘浪賢思陵朝掖庭有菊夫人者善歌舞妙音律為仙韶院之冠宫中號為菊部頭然頗以不獲際幸為恨既稱疾告歸宦者陳源以厚禮聘歸蓄于西湖之適安園一日徳夀按梁州曲舞屢不稱㫖提舉官開禮知上意不樂因従容奏曰此事非菊部頭不可上遂令宣喚於是再入九禁陳遂感悵成疾有某士者頗知其事演而為曲名菊花新獻之陳大喜酬以田宅金幣甚厚其譜則教坊都管王公謹所度也陳每聞歌詠淚下不勝情未㡬物故癸辛雜識吴郡王及平原郡王皆豪貴以奢侈相髙争華競靡有崇愷風吴府後翠堂七楹全以石青為飾故得名専為諸姬教習聲伎之所一時伶官樂師皆棃園國工吹彈舞拍各有總者號為部頭每遇節序生辰則旬日外依月律按試名小排當雖中禁教坊所無也只笙一部二十餘人自十月旦至二月終日給焙笙炭五十觔用錦燻籠藉笙於上復以四和香燻之盖笙簧必用髙麗銅為之靘以綠蠟簧煖則字正而聲清越故必用焙而後可陸天隨詩云妾思冷如簧時時望君煖樂府亦有簧煖笙清之語舉此一事餘可想見癸辛雜識理宗朝張循王府獻白玉簫管長二尺者中空而瑩薄韓蘄王府獻白玉笙一攅其薄如鵝管其聲清越皆希世之寳也二物云在北方軍中日得之盖宣和故物耳西湖志南渡諸将韓世忠楊沂中張俊俱封王享富貴而俊尤善治生罷兵歸嵗收租米六十萬斛紹興内宴優人作善天文者云世間貴官必應星象我悉能窺用渾儀設玉衡對其人窺之見星而不見人玉衡不能卒辦用銅錢一文亦可令窺光堯云帝星秦師垣云相星韓蘄王曰将星張循王曰不見星衆皆駭復令窺曰中不見星只見張郡王在錢眼内坐殿上大笑俊最多貲故譏之西湖志北兵入杭廟朝為墟金某世為伶官流離無歸一日道遇左丞范文虎向為宋殿帥将熟其為人憐之謂金曰來日公宴汝來獻伎不愁貧賤也如其言往為優戲云某寺有鐘寺奴不敢擊者數日主僧問故乃言鐘樓有大神怖不敢登耳主僧亟往視之神即跪伏投拜王僧曰汝何神也答曰鐘神主僧曰既是鐘神如何投拜衆皆大笑文虎不懌其人亦不顧卒以不遇識者莫不多之西湖志餘增補武林舊事巻五
