body:
  text: 增補武林舊事巻六宋周宻原本明朱廷煥補湖山勝槩上南山孤山南山路補十九條自豐樂樓南至暗門錢湖門外入赤山烟霞石屋止南髙峰方家峪大小麥嶺並附於此豐樂樓舊為衆樂亭又改聳翠樓政和中改今名淳祐間趙京尹與􅊸重建宏麗為湖山冠又甃月池立秋千梭門植花朩構數亭春時遊人繁盛舊為酒肆後以學館致争但為朝紳同年會拜鄉㑹之地林暉施北山皆有賦梢趙忠定栁梢青云水月光中烟霞影裏湧出樓臺空外笙簫雲間笑語人在蓬萊天香暗逐風囘正十里荷花盛開買箇小舟山南遊遍山北歸來吴夢窗嘗大書所賦鶯啼序於壁一時為人傳誦湖堂舊在聳翠樓側又有集賢亭今並不存吕洞賔祠舊傳洞賔嘗至此靈芝崇福寺錢王故苑以芝生其間捨以為寺故名靈芝髙宗孝宗凡四臨幸有浮碧軒依光堂亦為新進士㑹拜題名之所朱静佳有詩云黄金匝地小橋通四面清平納逺空雲氣長扶天子座日光浮動梵王宫殘碑㡬字莓苔雨清磬一聲楊栁風沙鳥不知行樂事背人飛過夕陽東顯應觀祀磁州神崔府君六月六日生朝遊人甚盛咸淳間改昭應今歸靈芝寺舊有蕭照山水及蘓漢臣畫壁今不復存府君名子玉唐􅇭陽令卒為神靖康間髙宗為康王避金冦走鉅鹿馬斃望南獨行值路三岐莫知所向忽有白馬導之暮至祠下有土馬赭汗如雨因假寐廡下夢神人以杖擊地促其行白馬復導至斜橋谷會耿南仲來迎馬忽不見及即位復夢神将白羊饋之曰得孝子實兆孝宗由是累朝崇奉西湖志楊郡王府上船亭聚景園詳見御園門靈應堂俗呼包道堂寳蓮院紫霄宫廨院寳成院舊名釋伽興福院永隆院慧光尼菴張循王府省馬院船步内有正覺超化二院長橋長橋宋誌俗名雙投橋西湖竹枝集元富春馮士頤詞曰與郎情重得郎容南北相看只兩峰請看雙投橋下水新開兩朶玉芙蓉註言常有情人雙投於橋故長橋名雙投郎寳七修類纂妙净院寳徳寺楊和王重建充三衙建聖節道塲希夷道堂劉簔衣建於南屏園左今移於此真珠園有真珠泉髙寒堂杏堂水心堂御港曾經臨幸今歸張循王府南園中興後所剏光宗朝賜平原郡王韓侂胄陸放翁為記後復歸御前改名慶樂賜嗣榮王與芮又改勝景有許閒堂和容射㕔寒碧臺藏春門凌風閣西湖洞天歸耕荘清芳堂嵗寒堂夾芳豁望矜春鮮霞忘機照香堆錦逺塵幽羣紅香多稼晚節香等亭秀石為山内作十様錦亭并射圃流杯等處弁陽翁詩云清芳堂下千株桂猶是韓家舊賜園白髪老翁和淚説百年中見兩平原又云舊事凄凉尚可尋㫁碑空卧艸深深凌風閣下槎牙樹當日人疑似水沉雷峰顯嚴院郡人雷氏所居故名雷峰錢王妃建寺築塔名皇妃塔或云地産黄皮遂譌為黄皮塔山頂有通𤣥亭望樓舊名中峰穹窿迴映亦曰廻峰林逋詩中峰一逕分盤折上幽雲夕照前村見秋濤隔岸聞長松標古翠疎竹動微薰自愛蘇門嘯懐賢事不羣西湖志普寧寺又名白蓮有鐵塔一石塔二雲濤觀浄相院舊名瑞相有無盡意閣娱客軒一段竒軒幽深可喜今皆不存上清宫葛仙鍊丹舊址道士胡瑩微祖築菴鄭丞相清之曽此讀書淳祐中重建賜今額理宗御書清浄道院甘園内侍甘昇園又名湖曲曾經臨幸至今有御愛松望湖亭小蓬萊西湖一曲後歸趙觀文又歸謝節使弁陽翁詩云小小蓬萊在水中乾淳舊賞有遺踪園林㡬換東風主留得庭前御愛松御船坊理宗御舟在焉净慈報恩光孝禪寺孝宗嘗臨幸山曰南屏有慧日峰舊名慧日永明太宗賜夀寧院額孝宗御書慧日閣有千佛閣五百羅漢堂理宗御書華嚴法界正徧知閣等額梁貞明大鐵鍋存焉畫壁作五十三叅等寺後菴宇甚幽大抵規模與靈隠相若故二寺號南北山之最蘇東坡詩云卧聞禪老入南山浄掃風塵五百間其宏壮自昔巳然今益侈大矣周顯徳元年錢王俶建號慧日永明院迎衢州道潜禪師居之潜嘗欲従王求金鑄十八阿羅漢未白也王忽夜夢十八巨人隨行翌日道􅅗以請王異而許之始作羅漢堂宋建隆初禪師延夀以佛祖大意經綸正宗撰宗鏡錄一百巻遂作宗鏡堂太宗改賜夀寧院熙寧中郡守陳襄延禪師宗本居之屬嵗旱湖水盡涸寺西隅甘泉出有金色鰻魚遊焉因鑿為井寺衆千餘飲之不竭名曰圓照井南渡時燬而復興僧道容實鳩工焉西湖志寺為祖宗功徳院側有五百尊羅漢别創一田字殿安頓装塑雄偉殿中有千手千眼觀音一位尤為精製其第四百二十二位阿濕毘尊者獨設一龕用黄羅為幙幙􅅖置籖筒一座其像側身偃蹇便腹斜目覩人而笑臨安婦人祈嗣者必詣此炷香黙禱以手摩其腹云有感應日積月久汗手加於泥粉之上其腹黑光可鑒李有古杭雜録南山昭慶院恵照寺後為齋宫今歸净慈南屏御園正對南屛又名翠芳南屏興教寺舊名善慶有齊雲亭清曠樓米元章書琴臺及唐人磨崕八分家人卦中庸樂記篇後人於石􅅖刋右司馬温公書六字其實非也廣法院齊王功徳院有清曠亭法因院景獻太子殯所有古鐵塔錢王井寳林院莊文太子殯所舊有總持有可賦軒赤山殯宫舊瑞龍寺後為安穆成恭慈懿恭淑四后殯所今為熾盛光寺修吉寺舊瑞龍寺移于此有西湖竒艷正濟寺又名普門法雨寺舊名水心又改雲龍有趙清獻楊無為題名等安福尼寺極樂尼寺髙麗寺舊名恵因寺湖山間惟此寺無勅額元豐間髙麗王子僧統義天入貢學賢首教於此因施金建華嚴閣有易菴期懴堂皇姑成國公主殯所玉岑山相傳其山産玉故潤媚異常孤峯秀㧞層巒繚繞中有古朩倒植森翠凌冬崕上玉岑二字許采書山門玉岑宋理宗書西湖志恵因橋秦少游龍井紀游所謂濯足于恵因澗即此廣果寺開化尼寺六通慈徳院舊名恵徳塔法興寺保福院長耳相院舊名法相定光菴有定光泉永慶院延長真如院延夀山浄梵院舊名瑞峯崇教院石屋洞大仁院有石菴天成石羅漢其洞後又一洞名蝙蝠洞洞髙敞虛朗衍迤二丈六尺状如軒榭可布筵几其底邃窄通幽闇然宻室周鐫羅漢五百十六身仇仁近詩誰劈空青露石坳遊龍伸臂下南髙鬼神穿鑿地脉碎風雨支撐天柱牢峭壁蒼苔侵佛髻懸崕滴乳濕僧袍伽藍聞是香山叟燈暗祠荒沒野蒿西湖志水樂洞院名西關浄化即滿覺院山孝宗時賜李隶慈明殿賜楊郡王後歸賈平章山石奇秀中一洞嵌空有聲以此得名有聲在堂界堂愛此留照獨喜玉淵潄石宜晚諸亭及金蓮池洞在烟霞嶺下洞􅅖錢氏建有西關浄心院宋淳熙六年以賜内侍李隶仍建佛宇巖石盤峙洞壑虛窈泉味清甘聲如金石熙寧二年郡守鄭獬名之曰水樂洞後二年蘇子瞻來為倅遂賦詩云君不學白公引涇東注渭五斗黄泥一鍾水又不學哥舒横行西海頭歸來羯鼓打梁州但向空山石壁下愛此有聲無用之清流流泉無絃石無竅强名水樂人人笑慣見山僧巳厭聴多情海月空留照聞道磬襄東入海遺聲澗谷含宫徴聲奏未成君獨喜不湏寫入薰風絃縦有此聲無此耳西湖志滿覺院舊名圓興今在水樂洞嶺傍石佛接待菴烟霞洞清修院有象鼻石佛手巖石羅漢東坡留題歸雲菴寧宗時水庵清禪師坐禪石窟中聞南峰鐘鳴遂大悟今改永興菴關真人道院小龍井井側有龍王祠南髙峰塔榮國寺有白龍祠五顯祠險峻甚於北峰中有墜石相傳云昔有道者鎮魔於此又有潁川泉峰在南北諸山之界羊腸詰曲松篁葱蒨非芒鞋布襪努䇿笻杖不可登也塔居峰頂晉天福間建宋崇寧乾道兩度崇修元季毁舊七級今存五級塔中四望則東瞰平蕪烟消日出盡湖山之景南頫大江波濤洄洑舟楫隠見杳靄間西接巖竇怪石翔舞洞穴邃宻其側有瑞應泉巧若鬼工北曯陵阜陂陁曼衍箭櫪叢出麰麥連雲山椒巨石屹如峩冠者名先照壇相傳道者鎮壓之所峰頂有鉢盂潭潁川泉大旱不涸大雨不盈潭側有白龍洞龍王祠今廢西湖志方家峪自方家峪至冷泉峪慈雲嶺泥路嘉會門外至大慈山龍山遇真道院悟真道院崇真道院廣教院號小南屏褒親崇夀寺在鳯凰山劉貴妃功徳有鳯凰泉瑞應泉松雲亭觀音洞筆架池偃松交枝檜壁間有陳公儲畫龍甚竒弁陽翁詩云翟羽鸞綃事巳空奉華遺事對髙松宫斜鳯去無人見且看門前粉壁龍奉華劉妃閤名西蓮瑞相院黄貴妃功徳地藏尼寺慈光尼寺張府功徳廣慈院舊名廣福寳藏院有烏龍井錢武肅廟碑今錢氏五王廟在焉寧親廣福院陳淑妃香火院雖小而幽邃可喜福全尼寺廣嚴院舊名妙嚴有徐正節墓浄教院蔡貴妃殯所安福禪院内侍陳都知香火名小陳寺水月寺路口有靈固石崇教院舊名薦福有珍珠泉華津洞趙冀王府園水石甚竒勝有仙人棋臺西林法恵院舊名興慶錢王建有雪齋秦少游記東坡詩冷水峪梯子嶺慈雲嶺浄眀院郊壇齋宫有易安齋梅巖髙孝兩朝御和詩滿山皆㯶梠有江月菴笻舄亭龍華寳乗院本錢王瑞萼園捨建有傅大士塔并栢板門槌猶存有温公祠堂題名天華寺鏡清禪師道塲舊名千春龍冊有頤軒妙因樓化生池感業寺舊名天龍有朩觀音像勝相院舊名龍興千佛有五丈觀音像二并閣釋迦丈六金身像大通院舊名顯明天真院舊名登雲臺有靈化泂龍華山有石如龍與兩石龍寺接下石龍浄勝院上石龍永夀院舊名資賢石崖刻仁宗佛牙賛郊臺錢王郊臺亦近焉道林院舊名普濟大慈寺般若院寳惠院舊名普濟錢王墳文穆忠獻二王墳在此長慶崇福院皇祖叔太師和王功徳窑池一名烏菱池聖果寺在包家山真覺院舊名奉慶有東坡瑞香花詩包家山桃花關桃花甚盛舊有蒸霞二字春日遊人甚多張淶有詩云龍飛鳯舞舊時山仙嶺桃花更作關武陵源上流水急王母臺前日月閒霞色紛紛披絳樹春光煜煜照紅顔若教禹錫重遊此應道𤣥都觀裏還張文東集法雲寺舊名資崇大慈山舊有廣福金書院額虎跑寺舊傳性空禪師居此無泉二虎跑地而出蘇東坡詩云虎移泉眼趂行脚龍作浪花供撫掌乾溪寨小楊寺香嚴寺小麥嶺飲馬橋前後至龍井止九溪十八澗道人山有石洞飲馬橋地名放馬塲旌徳顯慶教寺咸淳甲戍冬改旌徳襲慶慈明太后香火方丈有軒曰雲扉後山有泉石甚奇曰林泉有清壑凝紫静雲等諸亭南山禪關舊名龍井路今又改南天竺仰妃墓吴越錢王妃梅坡園楊郡王園又名總秀靈隠觀寧宗朝張知宫剏御書冲隠菴淳祐中道士范善遷重建賜名今額今菴在觀右而觀改仁夀院矣太清宫寧宗時朱靈寳守固建楊太后書道徳經石幢有嵗寒軒養性凝神二堂後為賈貴妃功徳今改觀音院松庵楊郡王府崇徳顯慶院舊名棲真章楶質夫功徳後為永王祈王殯所章司徒墓名得象樞使楶之祖棲真院碑可考翁五峰墓名孟寅字賔暘徐典章墓名申字幹臣號青山翁强金紫墓名至字㡬聖今石羊虎猶存其子文憲公淵明墓在西溪鄉諸子亦多附此陳拾遺墓唐人嵗久莫可名字在積慶山下氷壑書堂金樞宻淵號氷壑嘗作書堂于此因葬焉積慶永清二山在後平鼎山在左湖山在前凡錢塘城邑江湖之勝皆近在几席間乃南北二峰中之最髙一山也有君子天一二泉理宗御書積慶山怡顔藏書農圃以賜又賜功徳寺名曰積慶教忠後不及建而止賛寧塔天聖間葬此靈石山薛開府墓名居正諡貞顯崇因報徳院有靈石泉又名嵗寒泉甚清髙宗嘗臨幸院與積慶山後永清院皆薛開府功徳此院巳廢獨靈石塔猶存浄林廣福院開府楊慶菴祖墳上人呼為上楊菴有松關南泉芳桂亭姜白石與恬朴翁等四人來遊詩云四人松下共盤桓筆硯花壺石上安今昔興懐同此味老仙留字在潺湲後為演福寺遂廢無垢寺舊名無著乃無著禪師道塲舊在石人嶺慶元中韓平原以寺為生墳遂移寺于此嘉定十一年重修有鴉雞巖仙人臺清音軒􅅯松下有茯苓因名泉為茯苓泉後為演福寺遂廢崇恩演福教寺寳祐丁巳重建咸淳中改禪寺徳祐後復為教寺賈貴妃殯所周漢國端孝公王祔焉舊山門有妙莊嚴域及生清净心亭真如亭諸天閣羅漢閣雞籠山金鐘峰禇家坎漢末禇盛族舊有居此者白蓮院相傳晉肇法師講經于此風篁嶺嶺多篬筤篠簜風韻凄清至此林壑深沉逈出塵表流淙活活自龍井而下四時不絶嶺故叢薄荒宻元豐中僧辯才淬治潔楚名曰風篁蘇子瞻訪辯才龍井送至嶺上左右驚曰逺公過虎溪矣辯才笑曰杜子有云與子成二老來往亦風流遂作亭嶺上名曰過溪亦曰二老子瞻紀之詩云日月轉雙轂古今同一丘惟此鶴骨老凛然不知秋去住兩無家人事争挽留去如龍出水雷雨捲潭湫來如珠還浦魚鼈争駢頭此生暫寄寓常為名實浮我比陶令媿師為逺公優送我過虎溪溪水常逆流聊使此山人永記二老遊大千在掌握寧有别離憂西湖志小水樂福邸園二老亭後改徳威舊在風篁嶺頭東坡辯才往來於此皆有詩今移於龍井祠下龍井吴赤烏中葛稚川嘗鍊丹於此在風篁嶺上巖壑林樾幽古石竇一浤清澈翠寒甘羙可愛雖久旱不涸石上流水處其色如丹遊者視久水輙溢人去即減其深不可測相傳與江海通有龍居之每禱雨必應或見小蟹班魚蜥蜴之類井傍有恵濟龍王祠陳寺丞墓名剛中紹興中以言事與張狀元九成連坐謫知䖍州安逺縣而卒後葬風篁嶺沙盆塢胡侯墓名則知杭州廟在墓前劉菴孝宗朝劉婉容殯所今歸龍井寺龍井延恩衍慶寺辯才故地舊名報恩看經院後改夀聖東坡書額猶存又改廣福元祐以來諸賢留題甚多及東坡竹石㢘宣仲枯朩寺前有過溪橋又名歸隠橋又名二老橋寺有方圓菴寂照閣清獻趙公閒堂訥齋潮音堂滌心沼鏡清堂冲泉薩埵石辯才清獻東坡三賢祠辯才塔諸天閣山有獅子峰葉苔磯墓元索字唐卿詩人五雲山中有真際院嶺上有天井大旱不竭九溪十八澗大麥嶺法空寺舊名資慶南資聖院濮王墳花家山盧園内侍盧允昇園景物奇秀西湖十景所謂花港觀魚即此也浄安院内侍董宋臣香火崇真宫昔為女冠今為永浄尼寺茆家步獨􅊁門浄嚴廣報院内侍董永仲功徳隆興菴揚寺廨院黄泥嶺水陸菴楊寺廨院後名慶安院妙心寺水竹塢錢塘湧金清波三門皆濵湖而湧金介其中且余家去郭門不盈咫竹杖芒鞋尋山問水必自湧金出出門稍南為洪襄惠公兩峰書院又南為靈芝崇福律寺經清波門過流福水橋濵湖為夾字港折而南為茶坊嶺西南過長橋為南屛山净慈禪寺萬工池寺後有蓮花洞居然亭寺前之右為雷峰塔左為藕花居倪尚書墓南屏西為九矅山法因寺今即其地為發祥祠西南為太子灣折而南為石屋嶺石屋洞蝙蝠洞大仁禪寺又南過烟霞嶺為水樂洞烟霞洞磴道曲折而上為南髙峰榮國禪寺太子灣西為玉岑山其對為赤山惠因澗恵因講寺寺北為六通律寺法相律寺赤山之隂有筲箕泉合於恵因澗山北為三台山于肅愍公墓三台前為栗山八盤嶺周思得真人墓三台北為小麥嶺其地宜麥故名有東嶽行宫靈應廟永福橋即飲馬橋也嶺西支境可通大麥嶺盖積慶山之陂陁迤􅆔者又西為大麥嶺傍為花家山永福橋折而西北為靈石山元道士張伯雨及明尚書徐公墓在焉又西北為雞籠山風篁嶺一片雲石楊梅塢獅子峰延恩衍慶講寺龍井神運石嶺北為棋盤山龍井上為老龍井南為九溪西為十八澗自南屏山而南過錢糧司嶺折而西為廣澤禪寺舊名甘露有泉甘澄可啜又西南為大慈山定惠禪寺虎跑泉又西南為崇先襲慶禪寺真珠泉自清波門折而南為筆架山方家峪祀宋太學徐應鑣忠節祠褒親崇夀教寺又西南為華津洞梯雲嶺折而南為慈雲嶺永夀禪寺嶺南為龍山上為天真禪寺登雲臺下為天真書院天龍禪寺天華禪寺勝相禪寺龍華禪寺宋籍田稍南為妙因山吴越國文穆忠獻兩王墓稍北為玉厨山善恵禪寺妙因之陽為江文昭墓自清波門折而東南為鳯凰山其麓為萬松書院八蟠嶺留月玉壺二臺又東經鳯山門折而南過萬松坊為報國講寺宋行宫又南折而西為梵天講寺梵天北更折而西迴繞松磴為勝果禪寺月巖巖左為中峰右為宋殿前司營又西為棲雲菴南為包家山山川壇壇左為正崇菴右為三一菴又南為大慈禪寺此南山之勝也張淶南山名勝紀西湖三堤路蘇公堤自南新路直至北新路口小新堤自麴院至馬蝗橋蘇公堤元和中東坡守杭日所築起南屹北横截湖面夾道雜植花栁中為六橋九亭坡詩云六橋横絶天漢上北山始與南屏通忽驚二十五萬丈老葑席捲蒼烟空後守林希榜之曰蘇公堤章子厚詩云天面長虹一鑑痕直通南北兩山春張淶蘇堤行樂詩云長湖開玉鏡雙堤夾彩虹氣横萬頃上光摇一水中栁分隋岸綠桃借漢林紅路入烟花界山圍錦繡叢淡粧西子態玉樹麗華容葉度歌姬扇楊穿俠客弓酒依金谷飲遊與曲江同今日樂相樂年光不易逢又觀錢塘令王龍江蘇堤植桃栁詩云本以花為縣重将錦散堤五栽彭澤左萬樹武陵西偶值談移玉因知氣若霓看來無異谷行處巳成蹊每見春猶在何期路易迷攀條言是綬執葉亦為珪霞取中流映烟従綠水棲棠隂誰不愛寧獨有周黎窮居集第一橋港通赤山教塲名映波旌徳觀元係定香寺舊址寳慶間京尹袁韶改建為觀有西湖道院虛舟雲錦二亭今復為定香寺先賢堂名仰髙祠許由以下共四十人刻石作賛具載事迹中以寳慶初巴陵之事謂潘閬有従秦王之嫌遂去之及節孝婦孫夫人以下五人今止三十有九人焉中有振衣古香清風堂山亭流芳花竹縈紓小山曲逕今歸旌徳堂宇皆廢第二橋通赤山麥嶺路名鎖瀾湖山堂旁有水閣尤宏麗三賢堂祠白樂天林和靖蘇東坡後有三堂曰水西雲北月香水影晴光雨色後有小亭曰虛舟曰雲錦第三橋通花家山港名望仙第四橋通茒家步港名壓堤北新路第三橋施水菴名圓通有石臺籠燈以照夜船雪江書堂胡賢良侊所居新水仙王廟龍王祠與葛嶺者為二崇真道院賈平章建後有閣今改為僧寺松牕張濡别墅第五橋通麴院港名東浦北新路第二橋第六橋通耿家步港名跨虹北新路第一橋孫太初詩云十里飛花送酒巵六橋兒女蹋春詞無人會得漁翁意獨立晴湖照影時張淶蘇堤六橋詩云湖心一徑長南北架虹梁十二中流影三千水月塘桃分兩岸色栁接數堤芳今日平津賞宜開杜預觴小新堤淳祐中趙京尹與􅊸自北新路第二橋至麴院築堤以通靈竺之路中作四面堂三亭夾岸花栁比蘇堤或名趙公堤履泰将軍廟有天澤井葛仙翁所植虬松将軍錢塘人姓孫名顯忠仕吴越時淳熙中趙與懽京尹禱雨有騐奏聞因勅封天澤侯楊園楊和王府永寧崇福院又名小隠寺元係内侍陳源適安園近世所歌菊花新曲破之事正係此處獻重華宫為小隠園孝宗撥賜張貴妃寺前有澗曰雙峰又曰金沙裴園裴禧園誠齋詩云岸岸園亭傍水濵裴園飛入水心横傍人莫問遊何處只揀荷花開處行喬園喬㓜閒園史園史屏右徽孫資國園舊名報國有東坡書隠秀齋趙令畤徳麟䟦語淳固先生墓斌姓宋號庸齊師晦菴先生馬蝗橋孤山路西陵橋又名西林橋又名西泠橋又名西村元張輿詩云紅藕花深逸興饒一雙鸂􅈑避鳴橈曉風凉入桃花扇臘酒香分椰子瓢狂客醉欹眀月上羙人歌㫁綠雲消數聲漁笛知何處疑在西泠第一橋劉邦彦湖上花開報劉廷美詩云白鷗遥待酒船來芳艸汀洲去復囘為惜杏花寒勒住西泠昨夜一枝開西湖志孤山舊有栢堂竹閣四照閣巢居閣林處士廬今皆不存孤山巋介湖中碧波環遶勝絶諸山唐宋間樓閣参差彌布椒麓白樂天西湖晚歸回望孤山寺贈客詩云栁湖松島蓮花寺晚動歸橈出道塲盧橘子低山雨重棕櫚葉戰水風凉烟波淡蕩摇空碧樓閣参差倚夕陽到岸請君囘首望蓬萊宫在水中央又孤山寺遇雨詩云拂波雲色重灑葉雨聲繁水鷺雙飛起風荷一向翻空濛連北岸蕭颯入東軒或擬湖中宿留船在寺門林君復孤山寺詩云低處凭欄思渺然孤山塔後閣西偏隂沉畫軸林間寺零落棋枰葑上田秋景有時飛獨鳥夕陽無事起寒烟遲歸更愛吾廬近祗向重來看雪天又孤山寫望詩水墨屏風状總非作詩除是謝元暉溪橋裊裊穿黄落樵斧丁丁隔翠微返照未沉僧獨往長烟初淡鳥横飛南峰有客鋤園罷閒倚林間忘却歸栢堂宋僧志銓作陳文帝天嘉二年有植兩檜於孤山寺中至宋時猶存其一號陳朝檜志銓作堂其側曰栢堂與竹閣連屬蘇子瞻作詩紀之云道人手種㡬生前鶴骨龍姿尚宛然雙榦一先神物化九朝三見太平年忽驚華厦依巖出乞與嘉名到處傳此栢未枯君記取灰心聊伴小乗禪後孝宗嘗書此詩勒石竹閣白樂天作在孤山寺中杭人因貌公像而祀之今為四賢堂址其詩云晚坐松簷下宵眠竹閣間清虛當服藥幽獨抵歸山巧未能勝拙忙應不及閒無勞别修道只此是𤣥關蘇子瞻詩云海山兠率兩茫然古寺無人竹滿軒白鶴不留歸後語蒼龍猶是種時孫兩叢却似蕭郎筆千畝空懐渭上村欲把新詩問遺像病維摩詰更無言僧道􅅗四照閣懐少游學士詩云猿鳥投林已寂然芭蕉過雨小樓前雲移絶壁中間破月自遥峰缺處圓照坐不湏紅炬蠟可人惟有蕙爐烟校讐御府圖書客疇昔還同此夜禪俱西湖志四聖延祥觀有韋太后沉香四聖像小蓬萊閣瀛嶼堂金沙井六一泉餘見御園類宋時四聖觀前每至昏後有一燈浮水上其色青紅自施食亭南至西陵橋復囘風雨中光愈盛月明則稍淡雷電時則與電争光閃爍此湖光也蘇子瞻湖中夜泛詩云新月生魄迹未安纔破五六漸盤桓今夜吐艷如半璧遊人得向三更看三更向䦨月漸垂欲落未落景特竒明朝人事誰料得看到蒼龍西沒時蒼龍巳沒牛斗横東方芒角升長庚漁人收筒及未曉船過惟有菰蒲聲菰蒲無聲水茫茫荷花夜開風露香漸見燈明出逺寺更待月黑看湖光湖光非鬼亦非仙風恬浪静光滿川湏􅁷兩兩入寺去就視不見空茫然其曰湖光豈即水燈之類歟髙疎寮詩云水明一色抱神州雨壓輕塵不敢浮山北山南人喚酒春前春後客凭樓射熊館暗花扶屐下鵠池深栁拂舟白髪邦人能道舊君王曾奉上皇遊西湖志西太乙宫舊四聖觀園理宗朝建今黄庭殿乃昔凉堂也兩壁蕭照畫尚存亭觀名並見御園類弁陽詩云蘂宫廣殿號黄庭突几浮雲最上層五福貴神留不住水堂空照九枝燈有和靖墓瑪瑙坡陳朝栢林逋墓在孤山之隂紹興十六年建四聖延祥觀盡徙諸院刹及士民之墓獨逋墓詔存之勿徙咸淳間賈似道題石曰和靖先生墓命金華王庭書之元胡僧楊璉真伽發其墓惟端硯一枚玉簮一枝成化十年郡守李端葺治逋嘗作梅花詩一聨為士林羡頌而他詩亦多清逸比其卒也四壁蕭然題詩云湖外青山對結廬墳前修竹亦蕭疎茂陵他日求遺稿且喜曾無封禪書時人咸重其節介而范公希文與公雅厚贈詩云巢由不願仕堯舜豈遺人又云風俗因君厚文章到老醇其激賞如此西湖志逋仙所養鶴名鳴臯所養鹿名呦呦雖不甚竒亦是西湖故實逋鳴臯詩云臯禽名祗有前聞孤引圓吭夜正分一唳便驚寥泬破亦無閒意到青雲又呦呦詩云深林槭槭分行響淺葑茸茸疊浪痕春雪滿山人起晚數聲低呌喚籬門茅元儀青先四面堂處士橋以和靖得名涵碧橋菊磵墓名九萬葬孤山後談家山㫁橋又名段家橋萬栁如雲望如裙帶白樂天詩云誰開湖寺西南路草綠裙腰一道斜增補武林舊事巻六
