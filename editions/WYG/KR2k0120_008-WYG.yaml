body:
  text: 明朱廷煥補諸市藥市炭橋花市官巷珠子市融和坊南官巷米市北闗門外黒橋頭肉市大瓦脩義坊菜市新門外東青門霸子頭鮮魚行候潮門外魚行北闗門外水冰橋南猪行候潮門外北猪行打猪巷布行便門外横河頭蟹行新門外南上門花團官巷口錢塘門内青果團候潮門内泥路柑子團後市街鮝團便門外渾水閘書房橘園亭瓦子勾欄南瓦清冷橋熈春樓中瓦三元樓大瓦三橋街亦名上瓦北瓦衆安橋亦名下瓦蒲橋瓦亦名東瓦便門瓦便門外候潮門瓦候潮門外小􅅯門瓦小􅅯門外新門瓦亦名四通觀瓦薦橋門瓦薦橋門外菜市門瓦菜市門外錢湖門瓦省馬院前赤山瓦後軍寨前行春橋瓦北郭瓦又名大通店米市橋瓦舊瓦石板頭嘉會門瓦嘉會門外北闗門瓦又名新瓦艮山門瓦艮山門外羊坊橋瓦王家橋瓦龍山瓦城内𨽻脩内司城外𨽻殿前司如北瓦羊棚樓等謂之邀棚外又有勾欄甚多北瓦内勾欄十三座最盛或有路岐不入勾欄只在要閙寛濶之處做場者謂之打野呵此又藝之次者酒樓和樂樓昇陽宫南庫和豐樓武林園上庫中和樓銀甕子中庫春風樓北庫太和樓東庫西樓金文庫太平樓豐樂樓南外庫北外庫西溪庫巳上並官庫屬戸部㸃檢所每庫設官妓數十人各有金銀酒器千兩以供飲客之用每庫有祗直者數人名曰下畨飲客登樓則以名牌㸃喚侑樽謂之㸃花牌元夕諸妓皆併番互移他庫夜賣各戴杏花冠兒危坐花架然名娼皆深藏邃閤未易招呼凡肴核杯盤亦各隨意㩦至庫中初無庖人官中趂課初不藉此聊以粉飾太平耳往往皆學舍士夫所據外人未易登也熙春樓三元樓五間樓賞心樓嚴厨花月樓銀馬杓康沈店翁厨任厨陳厨周厨巧張日新樓沈厨鄭厨只賣好食雖海鮮頭羮皆有之虼䗫眼只賣好酒張花巳上皆市樓之表表者每樓各分小閤十餘酒器悉用銀以競華侈每處各有私名妓數十輩時粧袪服巧笑争妍夏月茉莉盈頭香滿綺陌凭檻招邀謂之賣客又有小鬟不呼自至歌吟强聒以求支分謂之擦坐吹簫彈阮息氣鑼板歌唱散耍等人謂之趕趂老嫗以小爐炷香為供者謂之香婆有以法製青皮杏仁半夏縮砂荳䓻小蠟茶香藥韻薑砌香橄欖薄荷至酒閤分俵得錢謂之撒又有賣玉面貍鹿肉糟决明糟蟹糟羊蹄酒蛤蜊柔魚鰕茸􅤤乾者謂之家風又有賣酒浸江􅠪章舉蠣肉龜脚鎖管蜜丁脆螺鱟醤法鰕子魚䱥魚諸海味者謂之醒酒口味凡下酒羮湯任意索喚雖十客各欲一味亦自不妨過賣鐺頭記憶數十百品不勞再四傳喝如流便即製造供應不許少有違誤酒未至則先設看菜數楪舉杯則又換細菜如此屢易愈出愈奇極意奉承或少忤客意食次少遲則主人隨逐去之歌管歡笑之聲每夕逹旦往往與朝天車馬相接雖暑雨風雪不少減也歌館補十四條平康諸坊如上下抱劒營漆器牆沙皮巷清河坊融和坊新街太平坊巾子巷獅子巷後市街薦橋皆羣花所聚之地外此諸處茶肆清樂茶坊八仙茶坊珠子茶坊潘家茶坊連三茶坊連二茶坊及金波橋等兩河以至瓦市各有等差莫不靚粧迎門争妍賣笑朝歌暮絃摇蕩心目凡初登門則有提瓶獻茗者雖杯茶亦犒數千謂之㸃花茶登樓甫飲一杯則先與數貫謂之支酒然後呼喚提賣隨意置宴趕趂祗應撲賣者亦皆紛至浮費頗多或欲更招他妓則雖對街亦呼肩輿謂之過街轎前輩如賽觀音孟家蟬吴憐兒等甚多皆以色藝冠一時家甚華侈近世目擊者惟唐安安最號富盛凡酒器沙鑼冰盆火箱粧合之類悉以金銀為之帳幔茵褥多用錦綺器玩珍竒它物稱是下此雖力不逮者亦競鮮華盖自酒器首飾被卧衣服之屬各有賃者故凡佳客之至則供具為之一新非曾遊者不察也蘇小小錢塘名娼南齊時人其墓或云湖曲或云江干古詞云妾乗油璧車郎跨青驄馬何處結同心西陵松柏下今西陵乃在錢塘江之西則云江干者近是李賀蘇小小墓歌幽蘭露如啼眼無物結同心烟花不堪剪草如茵松如盖風為裳水為珮油璧車久相待冷翠燭勞光彩西陵下風吹雨白樂天栁枝詞蘇州楊栁任君誇更有錢塘勝館娃若解多情尋小小緑楊深處是蘇家蘇家小女舊知名楊栁風前别有情剝條盤作銀環様捲葉吹為玉笛聲商玲瓏餘杭歌者白樂天作郡日賦歌與之云罷胡琴掩秦瑟玲瓏再拜歌初畢誰道使君不能歌聽唱黄雞與白日黄雞催曉丑時鳴白日催年酉時沒腰間赤綬繫未穏鏡裏朱顔看易失玲瓏玲瓏奈老何使君歌了汝還歌時微之在越厚幣邀去月餘始遣還贈之詩因寄樂天云休遣玲瓏唱我詞我詩多是寄君詩明朝又向江頭别月落湖平是去時蘇子瞻倅杭日府僚湖中髙會羣妓畢集惟秀蘭不來營将督再三乃來子瞻問故荅曰沐浴倦卧忽有叩門聲急起詢之乃營将催督也整籹趨命不覺稍遲時府僚多屬意於蘭者見其不来恚恨不已云必有私事秀蘭含淚力辯而子瞻亦従旁冷語隂為之解府僚終不釋然適榴花開盛秀蘭以一枝藉手獻座中府僚愈怒責其不恭秀蘭進退無據低首垂淚子瞻乃作一曲名賀新凉令秀蘭歌以侑觴聲容絶妙府僚大悦劇飲而罷其詞云乳燕飛華屋悄無人槐隂轉午晚凉新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟簾外誰來推繡戸枉教人夢斷瑶臺曲又却是風敲竹石榴半吐紅巾蹙待浮花浪蕋都盡伴君幽獨穠􅃩一枝細看取芳心千重似束又恐被秋風驚綠若待得君來向此花前對酒不忍觸共粉淚兩􅉡􅉡蘇子瞻通判杭州權領郡事新太守将至有營妓投牒乞従良子瞻判曰五日京兆判狀不難九尾野狐従良任便又有周妓色藝超絶為一郡之魁聞判亦來投牒欲援例脱籍子瞻惜其去不許判云慕周南之化此意誠可嘉空冀北之羣所請宜不允其敏㨗善謔如此蘇子瞻守杭時毛澤民為法曹公以衆人遇之澤民與妓瓊芳善秩滿辭去作惜分飛詞以贈妓云淚濕闌干花著露愁到眉峰碧聚此恨平分取更無言語空相覷細雨殘雲無意緒寂寞朝朝暮暮今夜山深處㫁魂分付潮囘去子瞻一日宴客聞妓歌此詞問誰所作妓以澤民對子瞻嘆曰郡僚有詞人而不及知某之罪也翊日折簡追囘欵洽數月琴操頗通佛書解言辭子瞻喜之一日遊西湖戲語琴操曰我作長老汝作叅禪琴操敬諾子瞻問曰何謂湖中景對曰落霞與孤鶩齊飛秋水共長天一色何為景中人對曰裙拖六幅湘江水髻挽巫山一段雲何謂人中意對曰隨他楊學士鱉殺鮑叅軍如此究竟何如子瞻曰門前冷落車馬稀老大嫁作商人婦琴操言下大悟遂削髪為尼唐宋間郡守新到營妓皆出境迎既出猶得以鱗鴻往返靦不為異白樂天湖上醉中代諸妓寄嚴郎中詩云笙歌盃酒正歡娱忽憶仙郎望帝都借問連宵直南省何如盡日醉西湖蛾眉久别心知否雞舌含多口厭無還有些些惆悵事春來山路見蘼蕪又聞歌妓唱嚴郎中詩因以絶句寄之詩云已畱舊政布中和又付新詞與􅃩歌但是人家有遺愛就中蘇小感恩多蘇子瞻送杭妓往蘇州迎新守菩薩蠻詞云玉童西迓浮丘伯洞天冷落秋蕭瑟不用許飛瓊瑶臺空月眀清香凝夜燕借與韋郎看莫便過姑蘇扁舟下五湖又西湖席上代諸妓送陳述古詞云姢姢缺月西南落相思撥㫁琵琶索枕淚夢魂中覺來眉暈重華堂堆燭淚長笛吹新水醉客各西東應思陳孟公杭妓周韶胡楚龍靚皆有詩名韶好蓄奇茗嘗與蔡君謨鬬勝題品風味君謨屈焉蘓子容過杭太守陳述古飲之召韶佐酒韶因子容求落籍子容指簷間白鸚鵡曰可作一絶韶援筆揮云隴上巢空嵗月驚忍看囘首自梳翎開籠若放雪衣女長念觀音般若經時韶有服衣白一座笑賞述古遂令落籍時楚靚皆同席楚贈之詩云淡粧輕素鶴翎紅移入朱闌便不同應笑西湖舊桃李强勻顔色待春風靚詩云桃花流水本無塵一落人間㡬度春解佩暫酧交甫意濯纓還見武陵人胡楚有贈所歡詩云不見當時丁令威年來處處是相思若将幽恨同芳草却恐青青無盡時時張子野老於杭多為杭妓作詞而不及靚靚獻詩云天與羣芳十様葩獨憐顔色不堪誇牡丹芍藥人題遍自分身如鼓子花子野甚喜為之賦詞一闋云陳述古守杭時齋閣中有絶句二首綽約新嬌生眼底侵尋舊事上眉尖問君别後愁多少好似春潮夜夜添又云長垂玉筯殘粧臉肯為金釵露指尖萬斛閑愁何日盡一分真態為誰添盖為佳人叙幽思也蘇子瞻嘗書此詩并周胡龍三妓詩作一巻元時柯敬仲得之虞邵菴伯生題其後云祗今誰是錢塘守頗解湖中宿畫船曉起鬬茶龍井畔花開陌上載嬋娟又云三生石上舊精魂邂逅相逢莫重論縦有繡囊留别恨巳無明鏡著啼痕又云能言學得妙蓮華贏得春風對客誇乞食衲衣渾未老為誰靈塔向金沙蘇小娟錢塘名妓也俊麗工詩其姊盻奴與太學生趙不敏甚洽欵久之不敏日益貧盻奴周給之使篤於業遂㨗南省得官授襄陽府司戸盻奴未落籍不得偕老不敏赴官三載想念成疾而卒有祿俸餘貲囑其弟趙院判均分之一以膳院判一送盻奴且言盻奴有妹小娟俊雅能吟可謀致之佳耦也院判如言至錢塘託宗人倅錢塘者召盻奴其家云盻奴一月前死矣小娟亦為盻奴所歡以於潜官絹誣攀繫府獄倅従獄中召小娟出詰之曰汝誘商人官絹百疋何以償之小娟叩頭言此亡姊盻奴事乞賜周旋非惟小姢感荷更生盻奴亦蒙恩泉下也倅喜其辭宛順因問汝識襄陽趙司戸否小娟曰趙司戸未仕時與姊盻奴交好後中科授官去盻奴相思致疾而死倅曰趙司戸亦謝世矣遣人附一緘及餽物一罨外有其弟院判一緘付爾開之小娟自謂不識院判何人及拆書惟一詩云當時名妓鎮東吴不好黄金只好書借問錢塘蘇小小風流還似大蘇無小娟得詩黙然倅索和之小娟以不能辭倅强之且曰不和即償官絹小娟不得巳索紙援筆書云君住襄江妾住吴無情人寄有情書當年若也來相訪還有於􅅗絹也無倅大喜盡以所寄物與之免其償絹且為脱籍歸院判偕老錢唐道士洪丹谷與一妓通因娶為室病且革顧謂洪曰妾死在旦夕卿湏自執薪還肯作一轉語否妾歌兒也卿能集曲調於妾未死之前使預聞之死無憾矣洪固滑稽遂作文曰二十年前我與伊只因彼此太癡迷忽然四大相離後你是何人我是誰共惟娘子秀鍾谷水聲遏楚雲玉交枝堅一片心錦纒頭餘二十載遽成如夢令休憶少年遊哭相思兩手託空意難忘一筆勾㫁且道如何是一筆勾㫁孝順哥終無孝順逍遥樂永遂逍遥聽畢一笑而逝甲妓朱觀奴居鹽橋頗通文義嘗欲搆室而募緣於人求題詞於瞿宗吉宗吉援筆書云傾國傾城美貌為雲為雨芳年金沙灘上舊因緣重到人間示現欲搆雲牕霧閣奈慳寳鈔金錢諸公有意與周旋請看桃花好面人以宗吉故喜捐貲焉陳煥章錢塘人譁誕浮薄而聰明爽闓嘗痛飲妓館醉為羣妓所侮作中吕滿庭芳樂府云羊羔玉斚灌翻老漢嬉笑加加小丫鬟欺侮喒年髙大兩三箇扳倒扛咱白髪上黄花亂插赤骨立黑墨偷搽慣得他無髙下也是俺醉鄉豁達笑殺我也繇他西湖志賃物花檐酒檐首飾衣服被卧轎子布囊酒器幃設動用盤合喪具凡吉凶之事自有所謂茶酒厨子専任飲食請客宴席之事凡合用之物一切賃至不勞餘力雖廣席盛設亦可咄嗟辦也作坊熟藥圓散生藥片飲麫子饅頭爊炕鵝鴨爊炕猪羊糖蜜棗兒諸般糖金橘團灌肺饊子萁豆印馬蚊烟都民驕惰凡賣買之物多於作坊行販已成之物轉求什一之利或有貧而愿者凡貨物盤架之類一切取辦於作坊至晚始以所直償之雖無分文之儲亦可糊口此亦風俗之美也驕民都民素驕非惟風俗所致盖生長輦下勢使之然若住屋則動蠲公私房賃或終嵗不償一鐶諸務税息亦多蠲放有連年不收一孔者皆朝廷自行抱認諸項窠名恩賞有黄㮄錢雪降則有雪寒錢久雨久晴則又有賑恤錢米大家富室則又隨時有所資給大官拜命則有所謂搶節錢病者則有施藥局童幼不能自育者則有慈㓜局貧而無依者則有養濟院死而無殮者則有漏澤園民生何其幸歟游手浩穰之區人物盛夥㳺手奸黠實繁有徒有所謂美人局以娼優為姬妾誘引少年為事櫃坊賭局以博戲撲結黨手法騙財水功徳局以求官覔舉恩澤遷轉訟事交易等為名假借聲勢脱漏財物不一而足又有買賣物貨以偽易真至以紙為衣銅鉛為金銀土朩為香藥變換如神謂之白日賊若闤闠之地則有剪脱衣囊環珮者謂之覔貼兒其他穿窬胠篋各有稱首以至頑徒如攔街虎九條龍之徒尤為市井之害故尹京政先彈壓必得精悍鈎距長於才術者乃可都轄一房有都轄使臣總轄供申院長以至廂巡地分頭項火下凡數千人専以緝捕為職其間雄駔有聲者往往皆出羣盜而内司又有海巡八廂以察之湖産增湖中物産殷富聽民間自取故捕魚攪草之艇擾擾烟水間夜火徹旦濵湖多植蓮藕菱芰茭芡之屬或蓄魚鮮日供城市諺云西湖日銷寸金日生寸金盖謂此也湖中多雜魚而鯽魚最美骨輭肉鬆不數鰣鯿獨無鱖魚盖地氣絶産者正徳中有魚黄而無鱗肉翅能飛一日㝠雨飛至羊壩頭而墜舊時湖中産蟹林和靖詩云草泥行郭索又云水痕秋落蟹螯肥今湖蟹絶無盖宋時禁採捕傍多葑田今值澄波徹底旦旦而攪之亦難乎其生育矣其螺蚌鰕鼈之屬生生尤夥網簎交錯宋諺云南柴北米東菜西水今改西魚者盖城中水不藉西湖而魚産之富嵗嵗不減也藕出西湖者甘脆爽口與䕶安村同匾眼者尤佳其花有紅白二種白者香而結藕紅者豔而結蓮瞿宗吉詩云畫閣東頭納晚凉紅蓮不及白蓮香者是也宋時聚景園有繡蓮紅瓣而黄緣結實如飴兩角為芰四角為菱紅者皮薄而鮮美東坡詩云烏菱白芡不論錢烏菱老而沉泥者頗不佳且非西湖所有芡名雞壅亦曰鴈頭梁渚臨平在在咸有而湖産特佳香輭而粒大茭白本秋實惟西湖四時有之茭田之直可十餘金利倍禾稼逺湖數里則此種雖植不茂矣湖中藴藻蘋荇諸水草牽風演漾彌蔓不絶土人取之以供魚食嵗計亦不下數百金西湖志餘市食鵪鶉餶飿兒肝臟􅥪子香藥灌肺灌腸猪胰胡餅羊脂韭餅窩絲薑豉剗子科斗細粉玲瓏雙條七色燒餅雜煠金錠裹蒸市羅􅥪兒寛焦薄脆糕糜旋炙􅘣兒八糙鵝鴨炙雞鴨爊肝鑵裏爊爊鰻鱔爊團魚煎白腸水晶膾煎鴨子臟駞兒焦蒸餅海蟄鮓薑蝦米辣虀粉糖葉子豆糰麻糰螺頭膘皮辣菜餅炒螃蟹肉葱虀羊血鹿肉􅘣子果子皂兒膏宜利少瓜蔞煎鮑螺裹蜜糖絲線澤州􅄳蜜麻酥炒團澄炒團子十般糖甘露餅玉屑膏爊木𤓰糖脆梅破核兒查條橘紅膏荔枝膏蜜薑豉韻薑糖花花糖二色灌藕糖豌豆芽豆栗黄烏李酪麫蓼花􅁡彈彈望口消桃穰酥重劑蜜棗兒天花餅烏梅糖玉柱糖乳糖獅子薄荷蜜琥珀蜜􅄳角兒諸色糖蜜煎菜蔬薑油多薤花茄兒辣𤓰兒倭菜藕鮓冬瓜鮓笋鮓茭白鮓皮醤糟瓊枝蓴菜笋糟黄芽糟瓜虀淡鹽虀鮓菜醋薑脂麻辣菜拌生菜諸般糟淹鹽芥粥七寳素粥五味粥䅇米粥糖豆粥糖粥糕粥饊子粥菉豆粥肉盫粥犯鮓筭條界方條線條魚肉影戲胡羊􅘣削脯槌脯鬆脯兎􅘣麞􅘣鹿脯糟猪頭乾鹹豉皂角鋌臘肉炙骨頭旋炙荷包荔枝皮鵝鮓荷包旋鮓三和鮓切鮓骨鮓桃花鮓雪團鮓玉板鮓鱘鰉鮓春子鮓黄雀鮓銀魚鮓􅒕鮓凉水甘豆湯椰子酒豆兒水鹿梨漿滷海水薑蜜水木瓜汁茶水沉香水荔枝膏水苦水金橘團雪泡縮脾飲梅花酒五苓大順散香薷飲紫蘇飲糕糖糕蜜糕栗糕粟糕麥糕豆糕花糕糍糕雪糕小甑糕蒸糖糕生糖糕蜂糖糕線糕間炊糕糕乾乳糕重陽糕社糕蒸作従食子母蠒春蠒大包子荷葉餅芙蓉餅夀帶龜子母龜歡喜撚尖剪花小蒸作駱駞蹄大學饅頭羊肉饅頭細饀糖饀豆沙饀蜜辣饀生饀飯饀酸饀笋肉饀麩蕈饀棗栗饀薄皮蟹黄灌漿卧爐鵝項棗䭅仙桃乳餅菜餅秤錘蒸餅睡蒸餅千層雞頭籃兒鵝彈月餅餣子炙焦肉油酥燒餅火棒小蜜食金花餅市羅蜜劑餅餤春餅胡餅韭餅諸色􅥪子諸色包子諸色角兒諸色従食諸色果食諸色酒名薔薇露流香並御庫宣賜碧香思春堂三省激賞庫風泉殿司玉練槌祠祭有美堂中和堂雪醅真珠泉皇都春出賣常酒出賣和酒出賣並京醖皇華堂浙西倉爰咨堂浙東倉瓊花露揚州六客堂湖州齊雲清露雙瑞並蘇州愛山堂得江並東總留都春静治堂並江閫十洲春玉醅並海閫海岳春西總籌思堂江東漕清若空秀州蓬萊春越州第一江山北府兵厨錦波春浮玉春並鎮江秦淮春銀光並建康清心堂豐和春蒙泉並温州瀟洒泉嚴州金斗泉常州思政堂龜峰並衢州錯認水婺州縠溪春蘭谿慶逺堂秀邸清白堂揚府藍橋風月吴府紫金泉楊郡王府慶華堂楊駙馬府元勲堂張府眉夀堂萬象皆春並榮邸濟美堂勝茶並謝府㸃檢所酒息日課以數十萬計而諸司邸第及諸州供送之酒不與焉盖人物浩繁飲之者衆故也小經紀他處所無有班朝錄供朝報選官圖諸色科名開先牌寫牌額裁板尺諸色指揮織經帶棋子棋盤蒱捭骰子交牀試籃賣字本掌記冊兒諸般簿子諸色經文刀冊兒紙畫兒扇牌兒印色盝剪字纒令耍令琴阮絃開笛靘笙鞔鼓口簧位牌諸般盝兒屋頭掛屏剪簇花様簷前樂見成皮鞵提燈齪燈頭鬚編掠香櫞絡兒香櫞坐子拄杖粘竿風旛釣鈎釣竿食罩弔掛拂子蒲坐椅褥藥焙烘籃風袋烟帚糊刷鞵楦桶鉢搭羅兒薑擦子帽兒鞵帶修皮鞵穿交椅穿罣罳鞵結底領抺釵朶牙梳穿珠洗翠修冠子小梳兒染梳兒接補梳兒香袋兒面花兒絹孩兒符袋兒畫眉七香丸膠紙穏步膏手皺藥凉藥香藥膏藥髪垜兒頭髪磨鏡弩兒弩絃彈弓箭翎射帖壺籌鵓鴿翎風筝藥線象棋鞬子斗葉香爐灰紕刷兒笓子剔剪截段尺出洗衣服簇頭消息提茶瓶鼓爐釘鉸釘看忩札熨斗供香餅使綿打炭墼補鍋子泥竈整漏篐桶襻膊兒竹猫兒消息子老䑕藥蚊烟閙鵝兒凉筒兒紐扣子接縧修扇子錢索麻索紅索兒席草雞籠脩竹作使法油油紙油單氊坐子修砧頭磨刀磨剪子擂搥俗諺云杭州人一日吃三十丈木頭以三十萬家為率大約每十家吃擂搥一分合而計之則三十丈矣棒搥舂米劈柴淘井猫窩猫魚賣猫魚改猫犬雞食魚食蟲食蟲蟻食諸般蟲蟻魚兒活虼蚪兒促織兒小螃蟹金麻馬蚻兒蝍蟟蟲蟻籠促織盆麻花子荷葉燈草發燭肥皂團茶花子買瓶掇舊鋪襯圪伯紙竹釘淘灰土淘河剔撥叉黄牛糞灰挑疥蟲賣烟火鏇影戲若夫兒戲之物名什甚多尤不可悉數如相銀杏猜糖吹呌兒打嬌惜千千車輪盤兒每一事率數十人各専藉以為衣食之地皆他處之所無也諸色伎藝人補九條御前應制姜梅山特立觀察使周葵忩端臣曹松山陳藏一郁徐良陳愛山程奎耿待聘御前畫院馬和之蘇漢臣李安中陳善林春吴炳夏圭李廸馬逺馬璘耿聽聲兼能嗅衣物知吉凶貴賤徳夀聞其名取宫人扇百柄雜以上及中宫所御令小黄門持叩之耿嗅至后扇云此聖人也然有隂氣至上扇乃呼萬嵗上竒之呼入北宫取嬪妃珠冠十數示之至一冠奏曰此有尸氣時張貴妃巳薨此其故物也後居候潮門内夏震微時嘗為殿巖饋酒於耿耿聞聲知其必貴遂以女妻其子子復娶其女時郭棣為殿帥耿謁之曰君部中有三節使他日皆為三衙叩為何人則曰周虎彭輅夏震也虎輅時皆為将官獨震為帳前佩印官郭曰周彭地步或未可知震安得遽爾耿曰吾所見如此可必也耿因與三人結為義兄弟一日耿謂虎曰吾數夜聞軍中金皷有殺聲兵将動君三人皆當顯矣未㡬開禧出師虎守和州輅為金州統戎皆以功受賞震則以誅韓功相繼獲殿巖虎亦叅馬跡皆立節度使班悉如其言癸辛雜識陸象山少年時嘗坐臨安市肆觀棋如是者累日棋工曰官人日日來看必是髙手願求教一局象山曰未也三日後却來乃買棋局一幅歸懸之室中卧而仰觀者兩日忽悟曰此河圖數也遂往與棋工對棋工連負二局起謝曰某是臨安第一手凡來著者皆饒一先今官人棋反饒得某一先天下無敵手矣象山笑而去鶴林玉露賈似道有異志一術士能拆字賈以䇿畫地作竒字與之拆術者曰公相志不諧矣道立又不可道可又立不成公黙不語禮遣之恐泄其事使人害之於途西湖志夏巨源精卜筮居臨安紹熙三年冬禹之自贑受代造朝其子价侍行既至㸃檢勅告文書遺其一札同詣夏肆卜之夏書紙上曰事千里外繼書一食字一堯字合讀之則饒字也問是乎曰然文書現在係一多口人收得而鴛鴦為之看守無足慮也既而僕従饒州來持所遺至言當日打併行李時忘失在房小妾福安拾得藏在鴛字篋中盖价房有十篋以泥融飛燕子沙暖睡鴛鴦為字號方悟卜者言鴛鴦看守之説而福字上一口字下田字是四口所謂多口人也卜相紀傅立以占筮起東南時杭州初附世皇以故都之地生聚浩繁貲力殷盛得無有再興者命占其将來如何卦既成對曰其地六七十年後會見城市生荆棘不如今多也今杭連厄於火自至正壬辰以來又數毁於兵昔時歌舞之地悉為草莽之墟軍旅填門畜豕載道乃知立之占亦神矣陶宗儀輟耕錄錢唐羅貫中本南宋時人編撰小説數十種而水滸傳叙宋江等事姦盗脱騙機械甚詳然變詐百端壊人心術其子孫三代皆啞天道好還之報如此西湖志杭州男女瞽者多學琵琶唱古今小説平話以覔衣食謂之陶真大抵説宋時事盖汴京遺俗也瞿宗吉過汴梁詩云歌舞樓臺事可誇昔年曾此擅豪華尚餘艮嶽排蒼昊那得神霄隔紫霞廢苑草荒堪牧馬長溝栁老不藏鴉陌頭盲女無愁恨能撥琵琶説趙家其俗殆與杭無異若紅蓮栁翠濟顛雷峰塔雙魚扇墜等記皆杭州異事或近世所擬作者也西湖志陶宗儀在杭州見一弄百禽者蓄龜七枚大小凡七等置龜几上擊鼓以使之則第一等大者先至几心伏定第二等者従而登其背直至第七等小者登第六等之背乃竪身直伸其尾向上宛如小塔狀謂之烏龜叠塔又見蓄蝦䗫九枚先置一小墩於席中其最大者踞坐之餘八小者左右對列大者作一聲衆亦作一聲大者作數聲衆亦作數聲既而小者一一至大者前㸃首作聲如作禮状而退謂之蝦䗫説法陶宗儀輟耕録杭人削松朩為小片其薄如紙鎔硫黄塗朩片頂分許名曰發燭又曰焠兒盖以發火也史載周建徳六年齊后妃貧者以發燭為業豈即杭人所製與宋翰林學士陶公榖清異録云夜有急苦作燈之緩有批杉條染硫黄置之待用一與火遇得燄穂然既神之呼引光奴今遂有貨者易名火寸按此則焠寸聲相近字之譌也然引光奴之名為新同前灾異增杭民尚淫奢男子誠厚者十不二三婦人多以口腹為事不習女工至如日用飲膳惟尚新出而價貴者稍賤便鄙之縦欲買又恐貽笑隣里至正已亥冬十二月金陵遊軍斬關而入突至城下城門閉三月餘各路糧道不通城中米價湧貴一斗直二十五緡越數日米盡糟糠亦與常日米價等有貲力人則得食貧者不能也又數日糟糠亦盡乃以油車家糠餅搗屑啖之老㓜婦女三五為羣行乞於市雖姿色豔麗而衣裳濟楚不暇自愧至有合家父子夫婦兄弟結袂把臂共沉於水者一城之人餓死十六七軍退吴淞米航輻輳藉以活而又大半病疫死豈平昔浮靡暴殄之過造物有以警之與陶宗儀輟耕錄元大徳十一年杭大饑官設粥仙林寺中饑民殍死不為衰止何長者敬徳以施民振乏為事乃請杭好善而有財智者五七人即菩提寺作粥夜鬻置大甕中明旦饑民以至先後列堂無下或溢出門外道上相向坐虛其前以行粥用二人舁一人執杓以注器中食已以次去日鬻米七八石至十石始六月至八月凡七十日饑民無死者石塘胡長孺云往嵗湖州作糜食饑人糜脱釡猶沸湧器中人急得食食已輙仆死百步間長者夜作粥貯大罋中盖懲湖州事也有意哉姜南蓉塘詩話杭城多火宋時已然其一民居稠比竈突連綿其二板壁居多磚垣特少其三奉佛太盛家作佛堂徹夜燒燈幡幢飄引其四夜飲無禁童婢酣倦燭燼亂抛其五婦女嬌惰篝籠失檢宋建都城中大火二十一度其尤烈者五度紹興二年五月大火頃刻飛燔六七里被灾者一萬三千家六年十二月被火灾者一萬餘家嘉泰元年辛酉三月二十八日寳蓮山下御史臺吏楊浩家失火延燒御史臺司農寺将作監進奏文思院太史局皇城司法物庫及軍民五萬二千四百家綿亘三十里四晝夜乃滅時術者言年號嘉之文如三十五萬口泰之文如三月二十八又都民市語多舉紅藕二字藕有二十八絲紅者火也皆為䜟云嘉泰四年甲子三月四日糧料院後劉慶家失火延燒糧料院右丞相府尚書省中書省樞宻院左右司諫院尚書六部南至清平山萬松嶺和寧門西及太廟三茅觀下及軍民七千家二晝夜乃滅西湖志紹定辛卯臨安火比辛酉加五分之三雖太廟亦不免而史丞相府獨全洪舜俞詩云殿前将軍猛如虎救得汾陽令公府祖宗神靈飛上天可憐九廟成焦土時殿帥馮榯也人言籍籍迄今不免責鶴林玉露增補武林舊事巻八
